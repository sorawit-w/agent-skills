<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="team-composer — every role earns its seat" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>team-composer — every role earns its seat</title>
  <desc>Pixel-art banner for the team-composer Claude Code plugin: title at top, five color-coded team members in a row with speech bubbles, two "zigzag" disagreement marks between them, a shielded (non-droppable) role, and a prominent three-round process ribbon below representing Opening, Rebuttals, Synthesis.</desc>

