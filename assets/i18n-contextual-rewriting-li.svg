    <text x="100" y="72" font-family="DejaVu Sans Mono, ui-monospace, monospace" font-size="28" font-weight="700" fill="#fdf7ea" text-anchor="middle">Salut !</text>
    <text x="100" y="94" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="10" fill="#fed7aa" text-anchor="middle" letter-spacing="1">nbsp before : ; ! ?</text>
  </g>

