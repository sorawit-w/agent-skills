    <text x="100" y="94" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="10" fill="#a5f3fc" text-anchor="middle" letter-spacing="1">keigo · counters</text>
  </g>

  <!-- ko -->
  <g transform="translate(607, 392)">
    <rect x="0" y="0" width="200" height="110" fill="#0e7490"/>
    <rect x="0" y="0" width="200" height="4" fill="#0891b2"/>
    <rect x="0" y="106" width="200" height="4" fill="#134e4a"/>
    <rect x="196" y="0" width="4" height="110" fill="#134e4a"/>
    <rect x="0" y="26" width="200" height="2" fill="#134e4a"/>
    <text x="16" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="12" fill="#a5f3fc" letter-spacing="2">ko</text>
    <text x="100" y="74" font-family="Noto Sans KR, DejaVu Sans Mono, monospace" font-size="26" font-weight="700" fill="#ecfeff" text-anchor="middle">안녕하세요</text>
    <text x="100" y="94" font-family="Noto Sans KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a5f3fc" text-anchor="middle" letter-spacing="1">합니다 / 해요 · SOV</text>
