    <text x="100" y="72" font-family="DejaVu Sans Mono, ui-monospace, monospace" font-size="28" font-weight="700" fill="#fdf7ea" text-anchor="middle">¡Hola!</text>
    <text x="100" y="94" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="10" fill="#fed7aa" text-anchor="middle" letter-spacing="1">es-ES · es-419 · es-MX</text>
  </g>

  <!-- fr -->
  <g transform="translate(821, 268)">
    <rect x="0" y="0" width="200" height="110" fill="#c2410c"/>
    <rect x="0" y="0" width="200" height="4" fill="#ea580c"/>
    <rect x="0" y="106" width="200" height="4" fill="#7c2d12"/>
    <rect x="196" y="0" width="4" height="110" fill="#7c2d12"/>
    <rect x="0" y="26" width="200" height="2" fill="#7c2d12"/>
