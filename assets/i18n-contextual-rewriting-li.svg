    <text x="100" y="94" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="10" fill="#a5f3fc" text-anchor="middle" letter-spacing="1">tu / Lei · accents matter</text>
  </g>

