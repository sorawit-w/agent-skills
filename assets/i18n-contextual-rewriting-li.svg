    <text x="16" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="12" fill="#a5f3fc" letter-spacing="2">th</text>
    <text x="100" y="74" font-family="Noto Sans Thai, DejaVu Sans Mono, monospace" font-size="28" font-weight="700" fill="#ecfeff" text-anchor="middle">สวัสดี</text>
    <text x="100" y="94" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="10" fill="#a5f3fc" text-anchor="middle" letter-spacing="1">no plurals · classifiers</text>
  </g>

