    <text x="100" y="64" font-family="Noto Sans Thai, DejaVu Sans Mono, monospace" font-size="24" font-weight="700" fill="#faf5ff" text-anchor="middle">ออเจ้า</text>
    <text x="100" y="84" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="10" fill="#e9d5ff" text-anchor="middle" letter-spacing="1">Ayutthaya · casual court</text>
