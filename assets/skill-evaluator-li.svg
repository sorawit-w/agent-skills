<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="skill-evaluator — do the rules actually land?" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>skill-evaluator — do the rules actually land?</title>
  <desc>Pixel-art banner for the skill-evaluator Claude Code plugin: title at top, a SKILL.md source card on the left with a list of rules, a FINDINGS audit card in the center with pass/fail badges and a magnifier zoomed on a failing rule, and a RULE-TEXT FIX card on the right showing a before/after diff. Chapter labels SOURCE · EVALUATE · FIX below.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-li" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#scan-li)"/>

