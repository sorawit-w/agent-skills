    <text x="600" y="124" font-size="20" fill="#6b7280">do the rules actually land?</text>
    <text x="600" y="154" font-size="12" fill="#9ca3af" letter-spacing="4">AUDIT · GAP FINDING · RULE-TEXT FIX</text>
