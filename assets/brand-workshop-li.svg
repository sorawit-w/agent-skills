<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="brand-workshop — logo, tagline, brief" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>brand-workshop — logo, tagline, brief</title>
  <desc>Pixel-art banner for the brand-workshop Claude Code plugin: title at top, three color-coded workshop roles (strategist, copywriter, visual designer) with themed speech bubbles, creative sparkles between them, a prominent brand-identity deliverable card on the right showing a minimalist logo + tagline + 5-swatch palette, and a three-phase process ribbon below representing Discovery, Concept, Creation.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-li" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#scan-li)"/>

