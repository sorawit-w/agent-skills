    <text x="600" y="108" font-size="20" fill="#6b7280">logo + tagline + brief, built by a team.</text>
  </g>

  <!-- =========== CHARACTER SCENE (left cluster) =========== -->
  <!-- 3 characters, 80w x 128h. Spaced 180 apart, left side -->

