      <text x="1282" y="200" font-size="14" font-weight="700" fill="#1f2937" letter-spacing="1">RULE-TEXT FIX</text>
      <text x="1520" y="200" font-size="10" fill="#9ca3af" text-anchor="end" letter-spacing="2">R3</text>
    </g>
    <rect x="1278" y="210" width="244" height="2" fill="#c9b58a"/>

    <!-- diff gutter: line numbers -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#9ca3af">
      <text x="1286" y="236">12</text>
      <text x="1286" y="256">13</text>
      <text x="1286" y="286">12</text>
      <text x="1286" y="306">13</text>
      <text x="1286" y="326">14</text>
    </g>

    <!-- BEFORE block (red/minus) -->
    <rect x="1308" y="224" width="212" height="20" fill="#fee2e2"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#b91c1c">
      <text x="1314" y="238">-</text>
    </g>
    <rect x="1328" y="229" width="176" height="3" fill="#b91c1c"/>
    <rect x="1328" y="236" width="120" height="3" fill="#b91c1c" opacity="0.55"/>

    <rect x="1308" y="246" width="212" height="16" fill="#fee2e2"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#b91c1c">
      <text x="1314" y="258">-</text>
    </g>
    <rect x="1328" y="252" width="140" height="3" fill="#b91c1c" opacity="0.55"/>

    <!-- divider between before/after -->
