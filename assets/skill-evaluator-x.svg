    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#15803d">
      <text x="1314" y="290">+</text>
    </g>
    <rect x="1328" y="281" width="188" height="3" fill="#15803d"/>
    <rect x="1328" y="288" width="148" height="3" fill="#15803d" opacity="0.55"/>

    <rect x="1308" y="298" width="212" height="16" fill="#dcfce7"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#15803d">
      <text x="1314" y="310">+</text>
    </g>
    <rect x="1328" y="304" width="164" height="3" fill="#15803d" opacity="0.55"/>

    <rect x="1308" y="316" width="212" height="16" fill="#dcfce7"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#15803d">
      <text x="1314" y="328">+</text>
    </g>
    <rect x="1328" y="322" width="152" height="3" fill="#15803d" opacity="0.55"/>

    <!-- footer: classification + why -->
