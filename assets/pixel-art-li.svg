      <rect x="0" y="0" width="12" height="12" fill="#c2410c"/>
      <rect x="2" y="2" width="2" height="2" fill="#fdf7ea"/>
      <rect x="6" y="2" width="4" height="2" fill="#fdf7ea"/>
