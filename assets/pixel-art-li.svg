<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="pixel-art — hi-density pixel-art studio with built-in design system, model-agnostic prompts, and a code-based title-card SVG path" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>pixel-art — hi-density pixel-art studio</title>
  <desc>Pixel-art banner for the pixel-art Claude Code plugin: title at top, three panels in a row (brief → design system → output mini-scene with lighthouse, ships, dock), pixel-art arrows between panels, footer tagline.</desc>

  <defs>
    <pattern id="paper-pa" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#paper-pa)"/>

