      <rect x="116" y="8" width="4" height="4" fill="#f7f0e0"/>
      <rect x="104" y="12" width="4" height="4" fill="#f7f0e0"/>
      <rect x="112" y="12" width="4" height="4" fill="#f7f0e0"/>
      <rect x="100" y="16" width="4" height="4" fill="#f7f0e0"/>
      <rect x="108" y="16" width="4" height="4" fill="#f7f0e0"/>
      <rect x="116" y="16" width="4" height="4" fill="#f7f0e0"/>
      <rect x="120" y="0" width="20" height="20" fill="#f7f0e0"/>
      <rect x="140" y="0" width="20" height="20" fill="#f7f0e0"/>
