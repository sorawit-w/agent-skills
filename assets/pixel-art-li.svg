    <!-- highlighted phrase: "harbor at dusk" -->
    <rect x="20" y="92" width="200" height="14" fill="#fde68a"/>
    <g fill="#3a2a1a">
      <rect x="26" y="96" width="6" height="6"/>
      <rect x="34" y="96" width="6" height="6"/>
      <rect x="42" y="96" width="6" height="6"/>
