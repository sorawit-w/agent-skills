<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="i18n-contextual-rewriting — surgical edits, cultural rewrites" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>i18n-contextual-rewriting — surgical edits, cultural rewrites</title>
  <desc>Pixel-art banner for the i18n-contextual-rewriting Claude Code plugin. Left block: plugin title, tagline, a small diff motif alluding to surgical edits on large translation files, and a footer line saying every string sounds native. Right block: a 4-by-3 grid of pixel string cards, each with a locale code header and a native greeting — en-genz, de, es, fr, it, ja, ko, th, th-bupphe, zh-CN, zh-TW, zh-HK — grouped visually into Western (orange), Asian (teal), and classical CJK (purple) families.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan)"/>

  <!-- =========== TITLE BLOCK (left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace">
    <text x="64" y="72" font-size="34" font-weight="700" fill="#1f2937" letter-spacing="1">i18n-contextual-rewriting</text>
    <text x="64" y="104" font-size="18" fill="#6b7280">surgical edits. cultural rewrites.</text>
    <text x="64" y="130" font-size="11" fill="#9ca3af" letter-spacing="3">JSON · YAML · TS · JS</text>
  </g>

  <!-- summary copy on the left, under title -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" fill="#374151">
    <text x="64" y="186" font-size="13" letter-spacing="1">never rewrite the full file.</text>
    <text x="64" y="206" font-size="13" letter-spacing="1">never machine-convert the voice.</text>
    <text x="64" y="226" font-size="13" letter-spacing="1">every locale gets a team.</text>
  </g>

  <!-- pixel decoration: a diff motif alluding to surgical edits -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="13" letter-spacing="1">
    <rect x="64" y="270" width="380" height="22" fill="#e5e7eb"/>
    <text x="74" y="286" fill="#6b7280">&#160;&#160;"home.title": "Home",</text>
    <rect x="64" y="292" width="380" height="22" fill="#dcfce7"/>
    <text x="74" y="308" fill="#166534">+ "home.subtitle": "Welcome",</text>
    <rect x="64" y="314" width="380" height="22" fill="#fee2e2"/>
    <text x="74" y="330" fill="#991b1b">- "home.tagline": "Old copy",</text>
  </g>

  <!-- CTA label -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" fill="#c2410c" font-weight="700">
    <text x="64" y="374" font-size="14" letter-spacing="2">REVIEW · REWRITE · RECONCILE</text>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" fill="#9ca3af">
    <text x="64" y="394" font-size="11" letter-spacing="2">three roles per locale. clarity wins ties.</text>
  </g>

  <!-- footer tagline left -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" fill="#9ca3af">
    <text x="64" y="440" font-size="11" letter-spacing="3">EVERY STRING SOUNDS NATIVE</text>
  </g>

  <!-- ============================================== -->
  <!-- GRID OF LOCALE CARDS (4 cols x 3 rows)         -->
  <!-- Card dims: 180x95, gap 12, origin (760, 70)    -->
  <!-- ============================================== -->

  <!-- ============ ROW 1 — Western (orange) ============ -->

  <!-- en-genz -->
  <g transform="translate(760, 70)">
    <rect x="0" y="0" width="180" height="95" fill="#c2410c"/>
    <rect x="0" y="0" width="180" height="4" fill="#ea580c"/>
    <rect x="0" y="91" width="180" height="4" fill="#7c2d12"/>
    <rect x="176" y="0" width="4" height="95" fill="#7c2d12"/>
    <rect x="0" y="22" width="180" height="2" fill="#7c2d12"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#fed7aa" letter-spacing="2">en-genz</text>
    <text x="90" y="60" font-family="DejaVu Sans Mono, ui-monospace, monospace" font-size="22" font-weight="700" fill="#fdf7ea" text-anchor="middle">hey bestie</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#fed7aa" text-anchor="middle" letter-spacing="1">[shelf-life: short]</text>
  </g>

  <!-- de -->
  <g transform="translate(952, 70)">
    <rect x="0" y="0" width="180" height="95" fill="#c2410c"/>
    <rect x="0" y="0" width="180" height="4" fill="#ea580c"/>
    <rect x="0" y="91" width="180" height="4" fill="#7c2d12"/>
    <rect x="176" y="0" width="4" height="95" fill="#7c2d12"/>
    <rect x="0" y="22" width="180" height="2" fill="#7c2d12"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#fed7aa" letter-spacing="2">de</text>
    <text x="90" y="60" font-family="DejaVu Sans Mono, ui-monospace, monospace" font-size="24" font-weight="700" fill="#fdf7ea" text-anchor="middle">Hallo!</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#fed7aa" text-anchor="middle" letter-spacing="1">+30% length</text>
  </g>

  <!-- es -->
  <g transform="translate(1144, 70)">
    <rect x="0" y="0" width="180" height="95" fill="#c2410c"/>
    <rect x="0" y="0" width="180" height="4" fill="#ea580c"/>
    <rect x="0" y="91" width="180" height="4" fill="#7c2d12"/>
    <rect x="176" y="0" width="4" height="95" fill="#7c2d12"/>
    <rect x="0" y="22" width="180" height="2" fill="#7c2d12"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#fed7aa" letter-spacing="2">es</text>
    <text x="90" y="60" font-family="DejaVu Sans Mono, ui-monospace, monospace" font-size="24" font-weight="700" fill="#fdf7ea" text-anchor="middle">¡Hola!</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#fed7aa" text-anchor="middle" letter-spacing="1">es-ES · es-419</text>
  </g>

  <!-- fr -->
  <g transform="translate(1336, 70)">
    <rect x="0" y="0" width="180" height="95" fill="#c2410c"/>
    <rect x="0" y="0" width="180" height="4" fill="#ea580c"/>
    <rect x="0" y="91" width="180" height="4" fill="#7c2d12"/>
    <rect x="176" y="0" width="4" height="95" fill="#7c2d12"/>
    <rect x="0" y="22" width="180" height="2" fill="#7c2d12"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#fed7aa" letter-spacing="2">fr</text>
    <text x="90" y="60" font-family="DejaVu Sans Mono, ui-monospace, monospace" font-size="24" font-weight="700" fill="#fdf7ea" text-anchor="middle">Salut !</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#fed7aa" text-anchor="middle" letter-spacing="1">nbsp before : ; ! ?</text>
  </g>

  <!-- ============ ROW 2 — Asia + Italy (teal) ============ -->

  <!-- it -->
  <g transform="translate(760, 177)">
    <rect x="0" y="0" width="180" height="95" fill="#0e7490"/>
    <rect x="0" y="0" width="180" height="4" fill="#0891b2"/>
    <rect x="0" y="91" width="180" height="4" fill="#134e4a"/>
    <rect x="176" y="0" width="4" height="95" fill="#134e4a"/>
    <rect x="0" y="22" width="180" height="2" fill="#134e4a"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#a5f3fc" letter-spacing="2">it</text>
    <text x="90" y="60" font-family="DejaVu Sans Mono, ui-monospace, monospace" font-size="24" font-weight="700" fill="#ecfeff" text-anchor="middle">Ciao!</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#a5f3fc" text-anchor="middle" letter-spacing="1">tu / Lei</text>
  </g>

  <!-- ja -->
  <g transform="translate(952, 177)">
    <rect x="0" y="0" width="180" height="95" fill="#0e7490"/>
    <rect x="0" y="0" width="180" height="4" fill="#0891b2"/>
    <rect x="0" y="91" width="180" height="4" fill="#134e4a"/>
    <rect x="176" y="0" width="4" height="95" fill="#134e4a"/>
    <rect x="0" y="22" width="180" height="2" fill="#134e4a"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#a5f3fc" letter-spacing="2">ja</text>
    <text x="90" y="62" font-family="Noto Sans JP, DejaVu Sans Mono, monospace" font-size="22" font-weight="700" fill="#ecfeff" text-anchor="middle">こんにちは</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#a5f3fc" text-anchor="middle" letter-spacing="1">keigo · counters</text>
  </g>

  <!-- ko -->
  <g transform="translate(1144, 177)">
    <rect x="0" y="0" width="180" height="95" fill="#0e7490"/>
    <rect x="0" y="0" width="180" height="4" fill="#0891b2"/>
    <rect x="0" y="91" width="180" height="4" fill="#134e4a"/>
    <rect x="176" y="0" width="4" height="95" fill="#134e4a"/>
    <rect x="0" y="22" width="180" height="2" fill="#134e4a"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#a5f3fc" letter-spacing="2">ko</text>
    <text x="90" y="62" font-family="Noto Sans KR, DejaVu Sans Mono, monospace" font-size="22" font-weight="700" fill="#ecfeff" text-anchor="middle">안녕하세요</text>
    <text x="90" y="82" font-family="Noto Sans KR, DejaVu Sans Mono, monospace" font-size="9" fill="#a5f3fc" text-anchor="middle" letter-spacing="1">합니다 / 해요</text>
  </g>

  <!-- th -->
  <g transform="translate(1336, 177)">
    <rect x="0" y="0" width="180" height="95" fill="#0e7490"/>
    <rect x="0" y="0" width="180" height="4" fill="#0891b2"/>
    <rect x="0" y="91" width="180" height="4" fill="#134e4a"/>
    <rect x="176" y="0" width="4" height="95" fill="#134e4a"/>
    <rect x="0" y="22" width="180" height="2" fill="#134e4a"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#a5f3fc" letter-spacing="2">th</text>
    <text x="90" y="62" font-family="Noto Sans Thai, DejaVu Sans Mono, monospace" font-size="24" font-weight="700" fill="#ecfeff" text-anchor="middle">สวัสดี</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#a5f3fc" text-anchor="middle" letter-spacing="1">no plurals · classifiers</text>
  </g>

  <!-- ============ ROW 3 — Classical / CJK variants (purple) ============ -->

  <!-- th-bupphe -->
  <g transform="translate(760, 284)">
    <rect x="0" y="0" width="180" height="95" fill="#7e22ce"/>
    <rect x="0" y="0" width="180" height="4" fill="#a855f7"/>
    <rect x="0" y="91" width="180" height="4" fill="#4a044e"/>
    <rect x="176" y="0" width="4" height="95" fill="#4a044e"/>
    <rect x="0" y="22" width="180" height="2" fill="#4a044e"/>
    <text x="14" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="11" fill="#f3e8ff" letter-spacing="2">th-bupphe</text>
    <text x="90" y="62" font-family="Noto Sans Thai, DejaVu Sans Mono, monospace" font-size="24" font-weight="700" fill="#faf5ff" text-anchor="middle">ออเจ้า</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#e9d5ff" text-anchor="middle" letter-spacing="1">Ayutthaya · casual court</text>
  </g>

