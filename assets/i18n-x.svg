    <text x="90" y="64" font-family="Noto Sans TC, DejaVu Sans Mono, monospace" font-size="26" font-weight="700" fill="#faf5ff" text-anchor="middle">你好</text>
    <text x="90" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, DejaVu Sans Mono, monospace" font-size="9" fill="#e9d5ff" text-anchor="middle" letter-spacing="1">no OpenCC from zh-CN</text>
