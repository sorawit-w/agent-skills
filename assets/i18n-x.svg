  <!-- zh-HK -->
  <g transform="translate(1336, 284)">
    <rect x="0" y="0" width="180" height="95" fill="#7e22ce"/>
    <rect x="0" y="0" width="180" height="4" fill="#a855f7"/>
    <rect x="0" y="91" width="180" height="4" fill="#4a044e"/>
