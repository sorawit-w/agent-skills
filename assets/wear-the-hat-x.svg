<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="wear-the-hat — one hat per task, no panel needed" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>wear-the-hat — one hat per task, no panel needed</title>
  <desc>Pixel-art banner for the wear-the-hat Claude Code plugin: title at top-left, a HAT RACK card showing four labeled hats (security, architect, data-viz, copy), a PICK card showing one hat being put on with a disclosure line, and a VOICE card showing the role's signature phrases.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-wth-x" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan-wth-x)"/>

  <!-- =========== TITLE BLOCK (top-left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="64" y="72" font-size="38" font-weight="700" fill="#1f2937" letter-spacing="1">wear-the-hat</text>
    <text x="64" y="104" font-size="18" fill="#6b7280">one hat per task, no panel needed</text>
    <text x="64" y="130" font-size="11" fill="#9ca3af" letter-spacing="3">RACK · PICK · VOICE</text>
  </g>

  <!-- =========== SECTION LABELS =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="620" y="436" font-size="11" fill="#1f2937" letter-spacing="3">RACK</text>
    <text x="1000" y="436" font-size="11" fill="#c2410c" font-weight="700" letter-spacing="3">PICK</text>
    <text x="1400" y="436" font-size="11" fill="#1f2937" letter-spacing="3">VOICE</text>
  </g>

  <!-- =========== CARD 1: HAT RACK =========== -->
  <g>
    <!-- card paper -->
    <rect x="520" y="168" width="200" height="240" fill="#f3e7c9"/>
    <rect x="520" y="168" width="200" height="4"  fill="#b79a5c"/>
    <rect x="520" y="404" width="200" height="4"  fill="#b79a5c"/>
    <rect x="520" y="168" width="4"   height="240" fill="#b79a5c"/>
    <rect x="716" y="168" width="4"   height="240" fill="#b79a5c"/>

    <!-- title bar "THE RACK" -->
    <rect x="524" y="180" width="192" height="26" fill="#fdf7ea"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1f2937">
      <text x="540" y="198" font-size="14" font-weight="700">THE RACK</text>
    </g>
    <rect x="524" y="206" width="192" height="2" fill="#b79a5c"/>

    <!-- wooden rack bar -->
    <rect x="540" y="244" width="160" height="4" fill="#8b6f3c"/>
    <rect x="558" y="248" width="2"  height="4" fill="#6b7280"/>
    <rect x="600" y="248" width="2"  height="4" fill="#6b7280"/>
    <rect x="642" y="248" width="2"  height="4" fill="#6b7280"/>
    <rect x="684" y="248" width="2"  height="4" fill="#6b7280"/>

    <!-- HAT 1: HARDHAT (security) -->
    <g transform="translate(548, 224)">
      <rect x="2"  y="4"  width="18" height="2" fill="#fbbf24"/>
      <rect x="0"  y="6"  width="22" height="6" fill="#fbbf24"/>
      <rect x="10" y="1"  width="2"  height="3" fill="#c2410c"/>
      <rect x="-2" y="12" width="26" height="2" fill="#fbbf24"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
      <text x="560" y="276" font-size="8" font-weight="700" fill="#1f2937" letter-spacing="1">SECURITY</text>
      <text x="560" y="288" font-size="6" fill="#6b7280">@security_specialist</text>
    </g>

    <!-- HAT 2: TOP HAT (architect) -->
    <g transform="translate(590, 220)">
      <rect x="4"  y="0"  width="14" height="14" fill="#1f2937"/>
      <rect x="4"  y="10" width="14" height="2"  fill="#c2410c"/>
      <rect x="0"  y="14" width="22" height="2"  fill="#1f2937"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
      <text x="600" y="276" font-size="8" font-weight="700" fill="#1f2937" letter-spacing="1">ARCH</text>
      <text x="600" y="288" font-size="6" fill="#6b7280">@senior_software_arch</text>
    </g>

    <!-- HAT 3: VISOR (data-viz) -->
    <g transform="translate(632, 232)">
      <rect x="2"  y="0"  width="18" height="4" fill="#0e7490"/>
      <rect x="0"  y="4"  width="22" height="3" fill="#bae6fd"/>
      <rect x="0"  y="6"  width="22" height="2" fill="#0e7490"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
      <text x="642" y="276" font-size="8" font-weight="700" fill="#1f2937" letter-spacing="1">DATA-VIZ</text>
      <text x="642" y="288" font-size="6" fill="#6b7280">@dataviz_engineer</text>
    </g>

    <!-- HAT 4: BERET (copywriter) -->
    <g transform="translate(674, 224)">
      <rect x="2"  y="4"  width="18" height="2"  fill="#b91c1c"/>
      <rect x="0"  y="6"  width="22" height="6"  fill="#b91c1c"/>
      <rect x="10" y="0"  width="2"  height="4"  fill="#1f2937"/>
      <rect x="0"  y="12" width="22" height="2"  fill="#1f2937"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
      <text x="684" y="276" font-size="8" font-weight="700" fill="#1f2937" letter-spacing="1">COPY</text>
      <text x="684" y="288" font-size="6" fill="#6b7280">@senior_copywriter</text>
    </g>

    <!-- footer chip: CATALOG -->
    <rect x="538" y="368" width="164" height="26" fill="#fdf7ea"/>
    <rect x="538" y="368" width="164" height="2"  fill="#b79a5c"/>
    <rect x="538" y="392" width="164" height="2"  fill="#b79a5c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="548" y="380" font-size="8" font-weight="700" fill="#c2410c" letter-spacing="2">CATALOG</text>
      <text x="548" y="390" font-size="7" fill="#6b7280">team-composer/role-personas</text>
    </g>
  </g>

  <!-- =========== ARROW 1 =========== -->
  <g transform="translate(740, 280)" fill="#6b7280">
    <rect x="0"  y="6" width="80" height="4"/>
    <rect x="72" y="2" width="4"  height="4"/>
    <rect x="76" y="6" width="4"  height="4"/>
    <rect x="72" y="10" width="4" height="4"/>
  </g>

  <!-- =========== CARD 2: PICK =========== -->
  <g>
    <rect x="852" y="168" width="296" height="240" fill="#ffffff"/>
    <rect x="852" y="168" width="296" height="4"   fill="#c9b58a"/>
    <rect x="852" y="404" width="296" height="4"   fill="#c9b58a"/>
    <rect x="852" y="168" width="4"   height="240" fill="#c9b58a"/>
    <rect x="1144" y="168" width="4"  height="240" fill="#c9b58a"/>
    <rect x="860" y="176" width="280" height="224" fill="#fdf7ea"/>

    <!-- title -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="874" y="200" font-size="14" font-weight="700" fill="#1f2937" letter-spacing="1">PICK ONE</text>
      <text x="1112" y="200" font-size="10" fill="#9ca3af" text-anchor="end" letter-spacing="2">SOLO</text>
    </g>
    <rect x="870" y="210" width="260" height="2" fill="#c9b58a"/>

    <!-- figure head -->
    <g transform="translate(960, 250)">
      <rect x="14" y="6"  width="22" height="30" fill="#fde68a"/>
      <rect x="12" y="10" width="26" height="22" fill="#fde68a"/>
      <rect x="17" y="18" width="3"  height="3" fill="#1f2937"/>
      <rect x="30" y="18" width="3"  height="3" fill="#1f2937"/>
      <rect x="21" y="26" width="8"  height="2" fill="#1f2937"/>
      <rect x="14" y="4"  width="22" height="2" fill="#1f2937"/>
      <rect x="12" y="8"  width="2"  height="2" fill="#1f2937"/>
      <rect x="36" y="8"  width="2"  height="2" fill="#1f2937"/>
      <rect x="12" y="32" width="26" height="2" fill="#1f2937"/>
    </g>

    <!-- hardhat on head -->
    <g transform="translate(960, 222)">
      <rect x="4"  y="4"  width="42" height="3" fill="#fbbf24"/>
      <rect x="0"  y="7"  width="50" height="8" fill="#fbbf24"/>
      <rect x="23" y="0"  width="4"  height="4" fill="#c2410c"/>
      <rect x="0"  y="15" width="50" height="3" fill="#c2410c"/>
      <rect x="-4" y="18" width="58" height="3" fill="#fbbf24"/>
    </g>

    <!-- glow markers around hat -->
    <g fill="#c2410c">
      <rect x="922" y="232" width="3" height="3"/>
      <rect x="916" y="246" width="3" height="3"/>
      <rect x="916" y="260" width="3" height="3"/>
      <rect x="1076" y="232" width="3" height="3"/>
      <rect x="1082" y="246" width="3" height="3"/>
      <rect x="1082" y="260" width="3" height="3"/>
    </g>

    <!-- disclosure box -->
    <rect x="876" y="332" width="248" height="50" fill="#fde68a"/>
    <rect x="876" y="332" width="248" height="3"  fill="#c2410c"/>
    <rect x="876" y="379" width="248" height="3"  fill="#c2410c"/>
    <rect x="876" y="332" width="3"   height="50" fill="#c2410c"/>
    <rect x="1121" y="332" width="3"  height="50" fill="#c2410c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="888" y="352" font-size="10" font-weight="700" fill="#1f2937" letter-spacing="2">WEARING</text>
      <text x="888" y="372" font-size="12" font-weight="700" fill="#c2410c">@security_specialist</text>
    </g>
  </g>

  <!-- =========== ARROW 2 =========== -->
  <g transform="translate(1170, 280)" fill="#c2410c">
    <rect x="0"  y="6" width="68" height="4"/>
    <rect x="60" y="2" width="4"  height="4"/>
    <rect x="64" y="6" width="4"  height="4"/>
    <rect x="60" y="10" width="4" height="4"/>
  </g>

  <!-- =========== CARD 3: VOICE =========== -->
  <g>
    <rect x="1260" y="168" width="280" height="240" fill="#ffffff"/>
    <rect x="1260" y="168" width="280" height="4"   fill="#c9b58a"/>
    <rect x="1260" y="404" width="280" height="4"   fill="#c9b58a"/>
    <rect x="1260" y="168" width="4"   height="240" fill="#c9b58a"/>
    <rect x="1536" y="168" width="4"   height="240" fill="#c9b58a"/>
    <rect x="1268" y="176" width="264" height="224" fill="#fdf7ea"/>

    <!-- title -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1282" y="200" font-size="14" font-weight="700" fill="#1f2937" letter-spacing="1">IN VOICE</text>
      <text x="1520" y="200" font-size="10" fill="#9ca3af" text-anchor="end" letter-spacing="2">SIGNATURE</text>
    </g>
    <rect x="1278" y="210" width="244" height="2" fill="#c9b58a"/>

    <!-- speech bubble -->
    <rect x="1282" y="222" width="236" height="124" fill="#fef3c7"/>
    <rect x="1282" y="222" width="236" height="3" fill="#c2410c"/>
    <rect x="1282" y="343" width="236" height="3" fill="#c2410c"/>
    <rect x="1282" y="222" width="3"   height="124" fill="#c2410c"/>
    <rect x="1515" y="222" width="3"   height="124" fill="#c2410c"/>
    <!-- tail -->
    <rect x="1282" y="346" width="14" height="3" fill="#c2410c"/>
    <rect x="1282" y="349" width="8"  height="3" fill="#c2410c"/>
    <rect x="1285" y="346" width="8"  height="3" fill="#fef3c7"/>

    <!-- phrases -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1294" y="244" font-size="9" font-weight="700" fill="#c2410c">"</text>
      <text x="1304" y="244" font-size="9" fill="#1f2937">What's the threat model here?"</text>
    </g>
    <rect x="1294" y="254" width="180" height="1" fill="#c9b58a"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1294" y="274" font-size="9" font-weight="700" fill="#c2410c">"</text>
      <text x="1304" y="274" font-size="9" fill="#1f2937">How does an attacker exploit this?"</text>
    </g>
    <rect x="1294" y="284" width="180" height="1" fill="#c9b58a"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1294" y="304" font-size="9" font-weight="700" fill="#c2410c">"</text>
      <text x="1304" y="304" font-size="9" fill="#1f2937">We need defense in depth."</text>
    </g>
    <rect x="1294" y="314" width="180" height="1" fill="#c9b58a"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1294" y="334" font-size="9" font-style="italic" fill="#6b7280">+ perspective + lens applied</text>
    </g>

    <!-- footer chip -->
    <rect x="1282" y="360" width="236" height="26" fill="#bae6fd"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1292" y="372" font-size="9" font-weight="700" fill="#1f2937" letter-spacing="2">PERSPECTIVE</text>
      <text x="1292" y="382" font-size="8" fill="#1f2937">System integrity &amp; security</text>
    </g>
  </g>

  <!-- ground line -->
  <rect x="500" y="414" width="1060" height="2" fill="#eadfcf"/>
</svg>
