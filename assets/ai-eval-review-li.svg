<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="ai-eval-review — Do we have signal for whether this AI actually works?" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>ai-eval-review — Do we have signal for whether this AI actually works?</title>
  <desc>Pixel-art banner for the ai-eval-review Claude Code plugin: title at top, three-card flow from left to right — an AI feature dashboard with unmeasured metrics (left), a seven-block eval-design walk with the cohort and adversarial blocks accented in teal (center), and an eval review artifact with gap-summary chips on the right. Chapter-marker ribbon below: INTAKE · 7 BLOCKS · CROSS-BLOCK · GAP SUMMARY. Sibling banner to ai-ux-review.</desc>

  <defs>
    <pattern id="scan-aieval-li" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#scan-aieval-li)"/>

  <!-- TITLE BLOCK -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="600" y="56" font-size="40" font-weight="700" fill="#1f2937" letter-spacing="2">ai-eval-review</text>
    <text x="600" y="86" font-size="17" fill="#6b7280">Do we have signal for whether this AI actually works?</text>
  </g>

  <!-- =========== CARD 1 — AI FEATURE DASHBOARD WITH GAPS =========== -->
  <g>
    <rect x="60" y="140" width="280" height="320" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
    <rect x="60" y="140" width="280" height="32" fill="#1f2937"/>
    <text x="200" y="161" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#fdf7ea" text-anchor="middle" letter-spacing="2">AI DASHBOARD</text>

    <!-- header -->
    <text x="78" y="196" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#1f2937" letter-spacing="1">> PRODUCTION METRICS</text>

    <!-- KPI tiles: engagement up, but what about the rest? -->
    <g>
      <!-- Tile 1 — Engagement (looks fine) -->
      <rect x="78" y="208" width="118" height="50" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
      <text x="137" y="223" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#15803d" text-anchor="middle">ENGAGEMENT</text>
      <text x="137" y="244" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">↑ 72%</text>

      <!-- Tile 2 — Ground truth (red question) -->
      <rect x="204" y="208" width="118" height="50" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="263" y="223" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">GROUND TRUTH</text>
      <text x="263" y="244" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#b91c1c" text-anchor="middle">?</text>

      <!-- Tile 3 — Per-cohort -->
      <rect x="78" y="266" width="118" height="50" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="137" y="281" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">PER-COHORT</text>
      <text x="137" y="302" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#b91c1c" text-anchor="middle">?</text>

      <!-- Tile 4 — Drift -->
      <rect x="204" y="266" width="118" height="50" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="263" y="281" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">DRIFT</text>
      <text x="263" y="302" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#b91c1c" text-anchor="middle">?</text>

      <!-- Tile 5 — Adversarial (wide) -->
      <rect x="78" y="324" width="244" height="40" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="200" y="339" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">ADVERSARIAL / ROBUSTNESS</text>
      <text x="200" y="356" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="middle">UNMEASURED</text>
    </g>

    <!-- caption below -->
    <text x="200" y="396" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="1">engagement is up. is anything else working?</text>

    <!-- bottom label -->
    <text x="200" y="438" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle" letter-spacing="2">INPUT</text>
  </g>

  <!-- arrow between card 1 and card 2 -->
  <g fill="#6b7280">
    <rect x="350" y="298" width="30" height="4"/>
    <rect x="376" y="294" width="4"  height="12"/>
    <rect x="380" y="296" width="4"  height="8"/>
    <rect x="384" y="298" width="4"  height="4"/>
  </g>

  <!-- =========== CARD 2 — SEVEN-BLOCK EVAL WALK (center) =========== -->
  <g>
    <rect x="400" y="140" width="400" height="320" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
    <rect x="400" y="140" width="400" height="32" fill="#0e7490"/>
    <text x="600" y="161" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#f5efe6" text-anchor="middle" letter-spacing="2">SEVEN-BLOCK EVAL WALK</text>

    <!-- 7 numbered block chips in a 3+3+1 grid -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <!-- Top row: Blocks 1-3 -->
      <rect x="420" y="190" width="116" height="60" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
      <rect x="420" y="190" width="116" height="14" fill="#92400e"/>
      <text x="478" y="201" font-size="10" font-weight="700" fill="#fef3c7" text-anchor="middle" letter-spacing="2">BLOCK 1</text>
      <text x="478" y="226" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">NECESSITY</text>
      <text x="478" y="240" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">+ SUCCESS</text>

      <rect x="542" y="190" width="116" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <rect x="542" y="190" width="116" height="14" fill="#1e3a8a"/>
      <text x="600" y="201" font-size="10" font-weight="700" fill="#dbeafe" text-anchor="middle" letter-spacing="2">BLOCK 2</text>
      <text x="600" y="226" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">GROUND</text>
      <text x="600" y="240" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">TRUTH</text>

      <rect x="664" y="190" width="116" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <rect x="664" y="190" width="116" height="14" fill="#1e3a8a"/>
      <text x="722" y="201" font-size="10" font-weight="700" fill="#dbeafe" text-anchor="middle" letter-spacing="2">BLOCK 3</text>
      <text x="722" y="226" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">OFFLINE</text>
      <text x="722" y="240" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">EVAL</text>

      <!-- Middle row: Blocks 4-6 — Block 5 (cohorts) and Block 6 (adversarial) accented in teal -->
      <rect x="420" y="258" width="116" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <rect x="420" y="258" width="116" height="14" fill="#1e3a8a"/>
      <text x="478" y="269" font-size="10" font-weight="700" fill="#dbeafe" text-anchor="middle" letter-spacing="2">BLOCK 4</text>
      <text x="478" y="294" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">ONLINE</text>
      <text x="478" y="308" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">METRICS</text>

      <!-- Block 5 — accented (teal) -->
      <rect x="542" y="258" width="116" height="60" fill="#bae6fd" stroke="#0e7490" stroke-width="2"/>
      <rect x="542" y="258" width="116" height="14" fill="#0e7490"/>
      <text x="600" y="269" font-size="10" font-weight="700" fill="#bae6fd" text-anchor="middle" letter-spacing="2">BLOCK 5</text>
      <text x="600" y="294" font-size="9" font-weight="700" fill="#0c4a6e" text-anchor="middle">COHORTS</text>
      <text x="600" y="308" font-size="9" font-weight="700" fill="#0c4a6e" text-anchor="middle">+ DI</text>

      <!-- Block 6 — accented (teal) -->
      <rect x="664" y="258" width="116" height="60" fill="#bae6fd" stroke="#0e7490" stroke-width="2"/>
      <rect x="664" y="258" width="116" height="14" fill="#0e7490"/>
      <text x="722" y="269" font-size="10" font-weight="700" fill="#bae6fd" text-anchor="middle" letter-spacing="2">BLOCK 6</text>
      <text x="722" y="294" font-size="9" font-weight="700" fill="#0c4a6e" text-anchor="middle">ADVERSARIAL</text>
      <text x="722" y="308" font-size="9" font-weight="700" fill="#0c4a6e" text-anchor="middle">+ ROBUST</text>

      <!-- "RESPONSIBLE-AI" tag spanning Blocks 5+6 -->
      <rect x="600" y="244" width="118" height="14" fill="#0e7490"/>
      <text x="659" y="255" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#bae6fd" text-anchor="middle" letter-spacing="1">RESPONSIBLE-AI</text>

      <!-- Block 7 — full width -->
      <rect x="420" y="326" width="360" height="50" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <rect x="420" y="326" width="360" height="14" fill="#15803d"/>
      <text x="600" y="337" font-size="10" font-weight="700" fill="#dcfce7" text-anchor="middle" letter-spacing="2">BLOCK 7 — DRIFT DETECTION &amp; MONITORING</text>
      <text x="600" y="362" font-size="9" font-weight="700" fill="#15803d" text-anchor="middle">is the AI still working tomorrow?</text>
    </g>

    <!-- reasoning order label -->
    <text x="600" y="396" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="2">FIXED REASONING ORDER · 1 → 7</text>

    <!-- caption -->
    <text x="600" y="438" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle" letter-spacing="2">ELICITATION</text>
  </g>

  <!-- arrow between card 2 and card 3 -->
  <g fill="#0e7490">
    <rect x="810" y="298" width="30" height="4"/>
    <rect x="836" y="294" width="4"  height="12"/>
    <rect x="840" y="296" width="4"  height="8"/>
    <rect x="844" y="298" width="4"  height="4"/>
  </g>

  <!-- =========== CARD 3 — EVAL REVIEW OUTPUT (right) =========== -->
  <g>
    <rect x="860" y="140" width="280" height="320" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
    <rect x="860" y="140" width="280" height="32" fill="#1f2937"/>
    <text x="1000" y="161" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#fdf7ea" text-anchor="middle" letter-spacing="2">EVAL REVIEW</text>

    <!-- Mini block grid (mirror of card 2 but compressed, with gap markers) -->
    <g>
      <!-- Top row mini blocks -->
      <rect x="876" y="188" width="74" height="32" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
      <text x="913" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#15803d" text-anchor="middle">B1</text>
      <text x="913" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" fill="#15803d" text-anchor="middle">DONE</text>

      <rect x="956" y="188" width="74" height="32" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="993" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#b91c1c" text-anchor="middle">B2</text>
      <text x="993" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" font-weight="700" fill="#b91c1c" text-anchor="middle">[GAP]</text>

      <rect x="1036" y="188" width="88" height="32" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
      <text x="1080" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#15803d" text-anchor="middle">B3</text>
      <text x="1080" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" fill="#15803d" text-anchor="middle">DONE</text>

      <!-- Middle row -->
      <rect x="876" y="226" width="74" height="32" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
      <text x="913" y="238" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#15803d" text-anchor="middle">B4</text>
      <text x="913" y="250" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" fill="#15803d" text-anchor="middle">DONE</text>

      <rect x="956" y="226" width="74" height="32" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="993" y="238" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#b91c1c" text-anchor="middle">B5</text>
      <text x="993" y="250" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" font-weight="700" fill="#b91c1c" text-anchor="middle">[GAP]</text>

      <rect x="1036" y="226" width="88" height="32" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="1080" y="238" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#b91c1c" text-anchor="middle">B6</text>
      <text x="1080" y="250" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" font-weight="700" fill="#b91c1c" text-anchor="middle">[GAP]</text>

      <!-- Bottom row -->
      <rect x="876" y="264" width="248" height="32" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="1000" y="276" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#b91c1c" text-anchor="middle">B7 DRIFT &amp; MONITORING</text>
      <text x="1000" y="288" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" font-weight="700" fill="#b91c1c" text-anchor="middle">[GAP — no drift detector]</text>
    </g>

    <!-- Gap Summary mini-section -->
    <rect x="876" y="312" width="248" height="80" fill="white" stroke="#1f2937" stroke-width="2"/>
    <text x="884" y="326" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#1f2937" letter-spacing="1">GAP SUMMARY</text>
    <line x1="884" y1="332" x2="1116" y2="332" stroke="#0e7490" stroke-width="2"/>

    <rect x="884" y="344" width="6" height="2" fill="#1f2937"/>
    <text x="894" y="347" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#1f2937">single-annotator labels (no IAA)</text>
    <rect x="884" y="358" width="6" height="2" fill="#1f2937"/>
    <text x="894" y="361" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#1f2937">no per-cohort dashboard</text>
    <rect x="884" y="372" width="6" height="2" fill="#1f2937"/>
    <text x="894" y="375" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#1f2937">no model-vendor drift alert</text>

    <!-- caption -->
    <text x="1000" y="438" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle" letter-spacing="2">OUTPUT</text>
  </g>

  <!-- =========== CHAPTER-MARKER RIBBON =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="180" y="510" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="3">INTAKE</text>
    <text x="180" y="525" font-size="9"  fill="#9ca3af" letter-spacing="1">(read ai-ux-review B7)</text>

    <text x="440" y="510" font-size="11" font-weight="700" fill="#0e7490" letter-spacing="3">7-BLOCK WALK</text>
    <text x="440" y="525" font-size="9"  fill="#9ca3af" letter-spacing="1">(probes + acceptance)</text>

    <text x="720" y="510" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="3">CROSS-BLOCK</text>
    <text x="720" y="525" font-size="9"  fill="#9ca3af" letter-spacing="1">(6 checks + reg lens)</text>

    <text x="1000" y="510" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="3">GAP SUMMARY</text>
    <text x="1000" y="525" font-size="9"  fill="#9ca3af" letter-spacing="1">(MD + HTML)</text>
  </g>

  <!-- chapter dots connector -->
  <g fill="#9ca3af">
    <rect x="220" y="506" width="180" height="2"/>
    <rect x="480" y="506" width="200" height="2"/>
    <rect x="760" y="506" width="200" height="2"/>
  </g>

  <!-- =========== FOOTER PIPELINE NOTE =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="600" y="568" font-size="11" fill="#1f2937" letter-spacing="1">eval-design-completeness · seven blocks · sibling of ai-ux-review · MD + HTML</text>
    <text x="600" y="592" font-size="10" fill="#9ca3af" letter-spacing="1">informed by HELM · Anthropic cookbooks · OpenAI Evals · EU AI Act / FTC / FDA · authored from first principles</text>
  </g>
</svg>
