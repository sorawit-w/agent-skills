<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="tech-stack-recommendations — opinionated defaults, judgment-aware" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>tech-stack-recommendations — opinionated defaults, judgment-aware</title>
  <desc>Pixel-art banner for the tech-stack-recommendations Claude Code plugin: title block on the left, three vertical brick stacks on the right. Each stack shows five layers — Auth, DB, API, Web, Runtime — labeled with the recommended technology. The Bun stack is the default. The Deno stack is edge-first. The Node stack is ecosystem-friendly. Footer reminds readers that defaults are not dogma.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan)"/>

  <!-- =========== TITLE BLOCK (left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="64" y="72" font-size="34" font-weight="700" fill="#1f2937" letter-spacing="1">tech-stack-recommendations</text>
    <text x="64" y="104" font-size="18" fill="#6b7280">opinionated defaults. judgment-aware.</text>
    <text x="64" y="130" font-size="11" fill="#9ca3af" letter-spacing="3">RUNTIME · WEB · API · DB · AUTH</text>
  </g>

  <!-- summary copy on the left, under title -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#374151">
    <text x="64" y="200" font-size="13" letter-spacing="1">three stacks. one default.</text>
    <text x="64" y="220" font-size="13" letter-spacing="1">override when team / compliance /</text>
    <text x="64" y="240" font-size="13" letter-spacing="1">ecosystem / cost says otherwise.</text>
  </g>

  <!-- pixel decoration: a small "decision arrow" pointing right -->
  <g transform="translate(64, 290)" fill="#c2410c">
    <rect x="0" y="6" width="120" height="6"/>
    <rect x="108" y="0" width="6" height="6"/>
    <rect x="114" y="6" width="6" height="6"/>
    <rect x="108" y="12" width="6" height="6"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#c2410c" font-weight="700">
    <text x="64" y="334" font-size="14" letter-spacing="2">PICK A STACK</text>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#9ca3af">
    <text x="64" y="354" font-size="11" letter-spacing="2">load only the layers you actually need</text>
  </g>

  <!-- footer tagline left -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#9ca3af">
    <text x="64" y="430" font-size="11" letter-spacing="3">DEFAULT IS NOT DOGMA</text>
  </g>

