      <rect x="10" y="44" width="28" height="4"  fill="#15803d"/>
      <rect x="0"  y="10" width="4"  height="28" fill="#15803d"/>
      <rect x="44" y="10" width="4"  height="28" fill="#15803d"/>
      <rect x="4"  y="4"  width="6"  height="6"  fill="#15803d"/>
      <rect x="38" y="4"  width="6"  height="6"  fill="#15803d"/>
      <rect x="4"  y="38" width="6"  height="6"  fill="#15803d"/>
      <rect x="38" y="38" width="6"  height="6"  fill="#15803d"/>
      <!-- interior fill -->
