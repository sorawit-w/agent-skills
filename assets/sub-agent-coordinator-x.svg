    <rect x="1286" y="233" width="2" height="2" fill="#f5efe6"/>
    <rect x="1288" y="235" width="2" height="2" fill="#f5efe6"/>
    <rect x="1290" y="233" width="2" height="2" fill="#f5efe6"/>
    <rect x="1292" y="231" width="2" height="2" fill="#f5efe6"/>
    <rect x="1294" y="229" width="2" height="2" fill="#f5efe6"/>
    <rect x="1296" y="227" width="2" height="2" fill="#f5efe6"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#1f2937" letter-spacing="1">
      <text x="1308" y="238">BUILD</text>
