<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="sub-agent-coordinator — many hands, one source of truth" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>sub-agent-coordinator — many hands, one source of truth</title>
  <desc>Pixel-art banner for the sub-agent-coordinator Claude Code plugin: a TASK BRIEF card on the left listing scope/budget/done-when, a FAN-OUT card in the center showing one coordinator tile dispatching three parallel sub-agent tiles with status badges, and an INTEGRATE card on the right showing build/lint/test gates passing and a DONE seal.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan)"/>

  <!-- =========== TITLE BLOCK (top-left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="64" y="72" font-size="38" font-weight="700" fill="#1f2937" letter-spacing="1">sub-agent-coordinator</text>
    <text x="64" y="104" font-size="18" fill="#6b7280">many hands, one source of truth</text>
    <text x="64" y="130" font-size="11" fill="#9ca3af" letter-spacing="3">BRIEF · FAN-OUT · INTEGRATE</text>
  </g>

  <!-- =========== SECTION LABELS (chapter markers under each card) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="620" y="436" font-size="11" fill="#1f2937" letter-spacing="3">BRIEF</text>
    <text x="1000" y="436" font-size="11" fill="#c2410c" font-weight="700" letter-spacing="3">FAN-OUT</text>
    <text x="1400" y="436" font-size="11" fill="#1f2937" letter-spacing="3">INTEGRATE</text>
  </g>

  <!-- =========== CARD 1: TASK BRIEF (clipboard) =========== -->
  <g>
    <!-- card paper -->
    <rect x="520" y="168" width="200" height="240" fill="#f3e7c9"/>
    <rect x="520" y="168" width="200" height="4"  fill="#b79a5c"/>
    <rect x="520" y="404" width="200" height="4"  fill="#b79a5c"/>
    <rect x="520" y="168" width="4"   height="240" fill="#b79a5c"/>
    <rect x="716" y="168" width="4"   height="240" fill="#b79a5c"/>
    <!-- clip at top -->
    <rect x="596" y="160" width="48" height="12" fill="#6b7280"/>
    <rect x="604" y="156" width="32" height="4"  fill="#6b7280"/>

    <!-- title bar "TASK BRIEF" -->
    <rect x="524" y="180" width="192" height="26" fill="#fdf7ea"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1f2937">
      <text x="540" y="198" font-size="14" font-weight="700">TASK BRIEF</text>
    </g>
    <rect x="524" y="206" width="192" height="2" fill="#b79a5c"/>

    <!-- field: TASK -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#c2410c" letter-spacing="2">
      <text x="540" y="228">TASK</text>
    </g>
    <rect x="576" y="222" width="128" height="3" fill="#6b7280"/>
    <rect x="576" y="228" width="100" height="3" fill="#9ca3af"/>

    <!-- field: SCOPE -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#c2410c" letter-spacing="2">
      <text x="540" y="250">SCOPE</text>
    </g>
    <rect x="584" y="244" width="6" height="6" fill="#1f2937"/>
    <rect x="594" y="246" width="108" height="3" fill="#6b7280"/>
    <rect x="584" y="256" width="6" height="6" fill="#1f2937"/>
    <rect x="594" y="258" width="96"  height="3" fill="#6b7280"/>
    <rect x="584" y="268" width="6" height="6" fill="#1f2937"/>
    <rect x="594" y="270" width="112" height="3" fill="#6b7280"/>

    <!-- field: OUT OF SCOPE -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" letter-spacing="2">
      <text x="540" y="296">OUT</text>
    </g>
    <!-- X mark -->
    <rect x="586" y="289" width="2" height="2" fill="#b91c1c"/>
    <rect x="588" y="291" width="2" height="2" fill="#b91c1c"/>
    <rect x="590" y="293" width="2" height="2" fill="#b91c1c"/>
    <rect x="592" y="291" width="2" height="2" fill="#b91c1c"/>
    <rect x="594" y="289" width="2" height="2" fill="#b91c1c"/>
    <rect x="594" y="293" width="2" height="2" fill="#b91c1c"/>
    <rect x="586" y="293" width="2" height="2" fill="#b91c1c"/>
    <rect x="602" y="290" width="100" height="3" fill="#9ca3af"/>
    <rect x="602" y="296" width="80"  height="3" fill="#9ca3af"/>

    <!-- field: BUDGET -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#c2410c" letter-spacing="2">
      <text x="540" y="322">BUDGET</text>
    </g>
    <rect x="594" y="314" width="68" height="14" fill="#fde68a"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#1f2937" letter-spacing="1">
      <text x="600" y="324">~30 calls</text>
    </g>

    <!-- field: DONE WHEN -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#15803d" letter-spacing="2">
      <text x="540" y="346">DONE</text>
    </g>
    <!-- check 1 -->
    <rect x="586" y="340" width="2" height="2" fill="#15803d"/>
    <rect x="588" y="342" width="2" height="2" fill="#15803d"/>
    <rect x="590" y="344" width="2" height="2" fill="#15803d"/>
    <rect x="592" y="342" width="2" height="2" fill="#15803d"/>
    <rect x="594" y="340" width="2" height="2" fill="#15803d"/>
    <rect x="596" y="338" width="2" height="2" fill="#15803d"/>
    <rect x="602" y="342" width="96" height="3" fill="#6b7280"/>
    <!-- check 2 -->
    <rect x="586" y="356" width="2" height="2" fill="#15803d"/>
    <rect x="588" y="358" width="2" height="2" fill="#15803d"/>
    <rect x="590" y="360" width="2" height="2" fill="#15803d"/>
    <rect x="592" y="358" width="2" height="2" fill="#15803d"/>
    <rect x="594" y="356" width="2" height="2" fill="#15803d"/>
    <rect x="596" y="354" width="2" height="2" fill="#15803d"/>
    <rect x="602" y="358" width="84" height="3" fill="#6b7280"/>
    <!-- check 3 -->
    <rect x="586" y="372" width="2" height="2" fill="#15803d"/>
    <rect x="588" y="374" width="2" height="2" fill="#15803d"/>
    <rect x="590" y="376" width="2" height="2" fill="#15803d"/>
    <rect x="592" y="374" width="2" height="2" fill="#15803d"/>
    <rect x="594" y="372" width="2" height="2" fill="#15803d"/>
    <rect x="596" y="370" width="2" height="2" fill="#15803d"/>
    <rect x="602" y="374" width="104" height="3" fill="#6b7280"/>
  </g>

  <!-- =========== ARROW 1 (BRIEF -> FAN-OUT) =========== -->
  <g transform="translate(740, 280)" fill="#6b7280">
    <rect x="0"  y="6" width="88" height="4"/>
    <rect x="80" y="2" width="4"  height="4"/>
    <rect x="84" y="6" width="4"  height="4"/>
    <rect x="80" y="10" width="4" height="4"/>
  </g>

