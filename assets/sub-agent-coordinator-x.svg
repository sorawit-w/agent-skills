      <rect x="1069" y="335" width="58" height="54" fill="#bae6fd"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
        <text x="1098" y="348" font-size="9" font-weight="700" fill="#1f2937" letter-spacing="1">AGENT C</text>
      </g>
      <rect x="1075" y="354" width="46" height="2" fill="#6b7280"/>
      <rect x="1075" y="360" width="36" height="2" fill="#9ca3af"/>
      <rect x="1075" y="366" width="44" height="2" fill="#9ca3af"/>
      <!-- status badge: DONE -->
      <rect x="1075" y="374" width="46" height="12" fill="#15803d"/>
      <rect x="1080" y="380" width="2" height="2" fill="#fdf7ea"/>
      <rect x="1082" y="382" width="2" height="2" fill="#fdf7ea"/>
      <rect x="1084" y="384" width="2" height="2" fill="#fdf7ea"/>
      <rect x="1086" y="382" width="2" height="2" fill="#fdf7ea"/>
      <rect x="1088" y="380" width="2" height="2" fill="#fdf7ea"/>
      <rect x="1090" y="378" width="2" height="2" fill="#fdf7ea"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#fdf7ea" letter-spacing="1">
