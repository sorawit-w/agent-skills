    <rect x="852" y="168" width="296" height="4"   fill="#c9b58a"/>
    <rect x="852" y="404" width="296" height="4"   fill="#c9b58a"/>
    <rect x="852" y="168" width="4"   height="240" fill="#c9b58a"/>
    <rect x="1144" y="168" width="4"  height="240" fill="#c9b58a"/>
    <!-- inner panel -->
    <rect x="860" y="176" width="280" height="224" fill="#fdf7ea"/>

    <!-- title bar "FAN-OUT" -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="874" y="200" font-size="14" font-weight="700" fill="#1f2937" letter-spacing="1">FAN-OUT</text>
      <text x="1112" y="200" font-size="10" fill="#9ca3af" text-anchor="end" letter-spacing="2">3 PARALLEL</text>
    </g>
    <rect x="870" y="210" width="260" height="2" fill="#c9b58a"/>

    <!-- =========== COORDINATOR TILE (top center) =========== -->
    <!-- Position: x=940, y=226, w=120, h=46 -->
    <g>
      <!-- tile border -->
      <rect x="940" y="226" width="120" height="46" fill="#1f2937"/>
      <!-- inner -->
      <rect x="944" y="230" width="112" height="38" fill="#fde68a"/>
      <!-- crown pixels (coordinator hat) -->
      <rect x="992" y="220" width="3" height="3" fill="#c2410c"/>
      <rect x="995" y="217" width="3" height="6" fill="#c2410c"/>
      <rect x="998" y="220" width="3" height="3" fill="#c2410c"/>
      <rect x="1001" y="217" width="3" height="6" fill="#c2410c"/>
      <rect x="1004" y="220" width="3" height="3" fill="#c2410c"/>
      <!-- text "COORDINATOR" -->
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
        <text x="1000" y="248" font-size="10" font-weight="700" fill="#1f2937" letter-spacing="1">COORDINATOR</text>
        <text x="1000" y="262" font-size="8" fill="#6b7280" letter-spacing="1">briefs &amp; verifies</text>
      </g>
    </g>

    <!-- =========== DISPATCH LINES (pixel arrows from coordinator to each agent) =========== -->
    <!-- vertical trunk down from coordinator center -->
    <rect x="998" y="272" width="4" height="16" fill="#c2410c"/>
    <!-- horizontal bar -->
    <rect x="898" y="286" width="204" height="4" fill="#c2410c"/>
    <!-- left drop to agent A -->
    <rect x="898" y="286" width="4" height="38" fill="#c2410c"/>
    <!-- middle drop to agent B -->
    <rect x="998" y="286" width="4" height="38" fill="#c2410c"/>
    <!-- right drop to agent C -->
    <rect x="1098" y="286" width="4" height="38" fill="#c2410c"/>
    <!-- arrowhead A -->
    <rect x="896" y="324" width="8" height="3" fill="#c2410c"/>
    <rect x="898" y="327" width="4" height="3" fill="#c2410c"/>
    <!-- arrowhead B -->
    <rect x="996" y="324" width="8" height="3" fill="#c2410c"/>
    <rect x="998" y="327" width="4" height="3" fill="#c2410c"/>
    <!-- arrowhead C -->
    <rect x="1096" y="324" width="8" height="3" fill="#c2410c"/>
    <rect x="1098" y="327" width="4" height="3" fill="#c2410c"/>

    <!-- =========== SUB-AGENT A (left) =========== -->
    <g>
      <rect x="870" y="332" width="64" height="60" fill="#1f2937"/>
      <rect x="873" y="335" width="58" height="54" fill="#bae6fd"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
        <text x="902" y="348" font-size="9" font-weight="700" fill="#1f2937" letter-spacing="1">AGENT A</text>
      </g>
      <rect x="879" y="354" width="46" height="2" fill="#6b7280"/>
      <rect x="879" y="360" width="36" height="2" fill="#9ca3af"/>
      <rect x="879" y="366" width="42" height="2" fill="#9ca3af"/>
      <!-- status badge: DONE -->
      <rect x="879" y="374" width="46" height="12" fill="#15803d"/>
      <rect x="884" y="380" width="2" height="2" fill="#fdf7ea"/>
      <rect x="886" y="382" width="2" height="2" fill="#fdf7ea"/>
      <rect x="888" y="384" width="2" height="2" fill="#fdf7ea"/>
      <rect x="890" y="382" width="2" height="2" fill="#fdf7ea"/>
      <rect x="892" y="380" width="2" height="2" fill="#fdf7ea"/>
      <rect x="894" y="378" width="2" height="2" fill="#fdf7ea"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#fdf7ea" letter-spacing="1">
        <text x="902" y="384">DONE</text>
      </g>
    </g>

    <!-- =========== SUB-AGENT B (center) =========== -->
    <g>
      <rect x="968" y="332" width="64" height="60" fill="#1f2937"/>
      <rect x="971" y="335" width="58" height="54" fill="#bae6fd"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
        <text x="1000" y="348" font-size="9" font-weight="700" fill="#1f2937" letter-spacing="1">AGENT B</text>
      </g>
      <rect x="977" y="354" width="46" height="2" fill="#6b7280"/>
      <rect x="977" y="360" width="40" height="2" fill="#9ca3af"/>
      <rect x="977" y="366" width="34" height="2" fill="#9ca3af"/>
      <!-- status badge: WIP -->
      <rect x="977" y="374" width="46" height="12" fill="#fde68a"/>
      <rect x="982" y="379" width="2" height="2" fill="#c2410c"/>
      <rect x="986" y="379" width="2" height="2" fill="#c2410c"/>
