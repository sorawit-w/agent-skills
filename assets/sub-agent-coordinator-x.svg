    <rect x="0"  y="6" width="76" height="4"/>
    <rect x="68" y="2" width="4"  height="4"/>
    <rect x="72" y="6" width="4"  height="4"/>
    <rect x="68" y="10" width="4" height="4"/>
  </g>

  <!-- =========== CARD 3: INTEGRATE =========== -->
