    <rect x="1362" y="232" width="120" height="3" fill="#9ca3af"/>

    <!-- gate row 2: LINT pass -->
    <rect x="1282" y="250" width="18" height="14" fill="#15803d"/>
    <rect x="1286" y="257" width="2" height="2" fill="#f5efe6"/>
    <rect x="1288" y="259" width="2" height="2" fill="#f5efe6"/>
    <rect x="1290" y="257" width="2" height="2" fill="#f5efe6"/>
    <rect x="1292" y="255" width="2" height="2" fill="#f5efe6"/>
    <rect x="1294" y="253" width="2" height="2" fill="#f5efe6"/>
    <rect x="1296" y="251" width="2" height="2" fill="#f5efe6"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#1f2937" letter-spacing="1">
      <text x="1308" y="262">LINT</text>
    </g>
    <rect x="1362" y="256" width="120" height="3" fill="#9ca3af"/>

    <!-- gate row 3: TEST pass -->
    <rect x="1282" y="274" width="18" height="14" fill="#15803d"/>
    <rect x="1286" y="281" width="2" height="2" fill="#f5efe6"/>
    <rect x="1288" y="283" width="2" height="2" fill="#f5efe6"/>
    <rect x="1290" y="281" width="2" height="2" fill="#f5efe6"/>
    <rect x="1292" y="279" width="2" height="2" fill="#f5efe6"/>
    <rect x="1294" y="277" width="2" height="2" fill="#f5efe6"/>
    <rect x="1296" y="275" width="2" height="2" fill="#f5efe6"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#1f2937" letter-spacing="1">
      <text x="1308" y="286">TEST</text>
    </g>
    <rect x="1362" y="280" width="120" height="3" fill="#9ca3af"/>

    <!-- divider -->
