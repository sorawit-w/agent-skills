<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="steer — redirect a run mid-flight, without losing work" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>steer — redirect a run mid-flight, without losing work</title>
  <desc>Pixel-art banner for the steer Claude Code plugin: title at top, a QUEUE card on the left showing a second terminal running ./.claude/steer with a message landing in an inbox file, an INJECT card in the center showing the PreToolUse hook firing at a tool-call boundary and wrapping the message in a STEERING tag, and an ADJUST card on the right showing Claude course-correcting with completed work kept. Chapter labels QUEUE · INJECT · ADJUST below.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-steer-li" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#scan-steer-li)"/>

  <!-- =========== TITLE BLOCK (top, centered) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="600" y="88" font-size="44" font-weight="700" fill="#1f2937" letter-spacing="3">steer</text>
    <text x="600" y="124" font-size="20" fill="#6b7280">redirect a run mid-flight, without losing work</text>
    <text x="600" y="154" font-size="12" fill="#9ca3af" letter-spacing="4">QUEUE · INJECT · ADJUST</text>
  </g>

  <!-- =========== SECTION LABELS (chapter markers) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="210" y="578" font-size="13" fill="#1f2937" letter-spacing="4">QUEUE</text>
    <text x="600" y="578" font-size="13" fill="#c2410c" font-weight="700" letter-spacing="4">INJECT</text>
    <text x="995" y="578" font-size="13" fill="#1f2937" letter-spacing="4">ADJUST</text>
  </g>

  <!-- =========== CARD 1: QUEUE (second terminal -> inbox) =========== -->
  <!-- Position: x=70, y=200, w=280, h=330 -->
  <g>
    <!-- card paper -->
    <rect x="70" y="200" width="280" height="330" fill="#f3e7c9"/>
    <rect x="70" y="200" width="280" height="5"   fill="#b79a5c"/>
    <rect x="70" y="525" width="280" height="5"   fill="#b79a5c"/>
    <rect x="70" y="200" width="5"   height="330" fill="#b79a5c"/>
    <rect x="345" y="200" width="5"  height="330" fill="#b79a5c"/>

    <!-- title bar -->
    <rect x="76" y="212" width="268" height="34" fill="#fdf7ea"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1f2937">
      <text x="94" y="235" font-size="18" font-weight="700">TERMINAL 2</text>
    </g>
    <rect x="76" y="246" width="268" height="2" fill="#b79a5c"/>

    <!-- terminal window (dark) -->
    <rect x="96" y="266" width="228" height="96" fill="#1f2937"/>
    <rect x="96" y="266" width="228" height="14" fill="#374151"/>
    <!-- traffic dots -->
    <rect x="104" y="271" width="4" height="4" fill="#b91c1c"/>
    <rect x="112" y="271" width="4" height="4" fill="#fbbf24"/>
    <rect x="120" y="271" width="4" height="4" fill="#15803d"/>
    <!-- prompt line: $ ./.claude/steer -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="106" y="300" font-size="11" fill="#15803d">$</text>
      <text x="120" y="300" font-size="11" fill="#bae6fd">./.claude/steer</text>
      <text x="106" y="320" font-size="11" fill="#f5efe6">"pivot to</text>
      <text x="106" y="336" font-size="11" fill="#f5efe6">approach B"</text>
      <!-- cursor -->
      <rect x="170" y="328" width="7" height="11" fill="#c2410c"/>
    </g>

    <!-- arrow down: terminal -> inbox -->
    <g transform="translate(199, 372)" fill="#6b7280">
      <rect x="6" y="0" width="6" height="22"/>
      <rect x="0" y="16" width="6" height="6"/>
      <rect x="12" y="16" width="6" height="6"/>
      <rect x="6" y="22" width="6" height="6"/>
    </g>

    <!-- inbox file -->
    <rect x="110" y="408" width="200" height="84" fill="#fdf7ea"/>
    <rect x="110" y="408" width="200" height="3" fill="#b79a5c"/>
    <rect x="110" y="489" width="200" height="3" fill="#b79a5c"/>
    <rect x="110" y="408" width="3"   height="84" fill="#b79a5c"/>
    <rect x="307" y="408" width="3"   height="84" fill="#b79a5c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="124" y="430" font-size="10" font-weight="700" fill="#c2410c" letter-spacing="1">.claude/steer-inbox</text>
      <!-- queued message lines (append, in order) -->
      <rect x="124" y="442" width="120" height="6" fill="#1f2937"/>
      <rect x="124" y="454" width="160" height="6" fill="#1f2937"/>
      <rect x="124" y="466" width="96"  height="6" fill="#9ca3af"/>
      <text x="124" y="486" font-size="8" fill="#6b7280">append · in order · nothing dropped</text>
    </g>
  </g>

  <!-- =========== ARROW 1 (QUEUE -> INJECT) =========== -->
  <g transform="translate(358, 362)" fill="#6b7280">
    <rect x="0"  y="6" width="40" height="6"/>
    <rect x="34" y="0" width="6"  height="6"/>
    <rect x="40" y="6" width="6"  height="6"/>
    <rect x="34" y="12" width="6" height="6"/>
  </g>

  <!-- =========== CARD 2: INJECT (PreToolUse hook at the boundary) =========== -->
  <!-- Position: x=412, y=200, w=376, h=330 -->
  <g>
    <!-- outer tile -->
    <rect x="412" y="200" width="376" height="330" fill="#ffffff"/>
    <rect x="412" y="200" width="376" height="5"   fill="#c9b58a"/>
    <rect x="412" y="525" width="376" height="5"   fill="#c9b58a"/>
    <rect x="412" y="200" width="5"   height="330" fill="#c9b58a"/>
    <rect x="783" y="200" width="5"   height="330" fill="#c9b58a"/>
    <!-- inner panel -->
    <rect x="422" y="210" width="356" height="310" fill="#fdf7ea"/>

    <!-- title bar -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="440" y="240" font-size="18" font-weight="700" fill="#1f2937" letter-spacing="1">PreToolUse</text>
      <text x="760" y="240" font-size="12" fill="#9ca3af" text-anchor="end" letter-spacing="2">HOOK</text>
    </g>
    <rect x="436" y="252" width="328" height="2" fill="#c9b58a"/>

    <!-- the boundary: a vertical seam between two tool calls -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
      <text x="498" y="288" font-size="10" fill="#6b7280" letter-spacing="1">tool call</text>
      <text x="700" y="288" font-size="10" fill="#6b7280" letter-spacing="1">next call</text>
    </g>
    <!-- left tool-call block (done) -->
    <rect x="448" y="298" width="100" height="40" fill="#dcfce7"/>
    <rect x="448" y="298" width="100" height="3" fill="#15803d"/>
    <rect x="448" y="335" width="100" height="3" fill="#15803d"/>
    <text x="498" y="323" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">DONE</text>
    <!-- right tool-call block (pending) -->
    <rect x="652" y="298" width="100" height="40" fill="#f3e7c9"/>
    <rect x="652" y="298" width="100" height="3" fill="#b79a5c"/>
    <rect x="652" y="335" width="100" height="3" fill="#b79a5c"/>
    <text x="702" y="323" font-size="11" fill="#6b7280" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">…</text>

    <!-- the seam (warm boundary) where injection happens -->
    <rect x="596" y="288" width="8" height="58" fill="#c2410c"/>
    <rect x="592" y="288" width="4" height="58" fill="#fde68a"/>
    <rect x="604" y="288" width="4" height="58" fill="#fde68a"/>

    <!-- injected STEERING block (the signature move) -->
    <rect x="440" y="360" width="320" height="100" fill="#fde68a"/>
    <rect x="440" y="360" width="320" height="4" fill="#c2410c"/>
    <rect x="440" y="456" width="320" height="4" fill="#c2410c"/>
    <rect x="440" y="360" width="4"   height="100" fill="#c2410c"/>
    <rect x="756" y="360" width="4"   height="100" fill="#c2410c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="456" y="384" font-size="11" font-weight="700" fill="#c2410c" letter-spacing="2">[STEERING]</text>
      <text x="456" y="404" font-size="10" fill="#1f2937">course-correction to the</text>
      <text x="456" y="418" font-size="10" fill="#1f2937">CURRENT task — not a new one.</text>
      <text x="456" y="438" font-size="11" font-weight="700" fill="#1f2937">"pivot to approach B"</text>
      <text x="456" y="452" font-size="8"  fill="#6b7280">additionalContext · consumed once</text>
    </g>

    <!-- small upward arrow from inbox seam into the block -->
    <g transform="translate(594, 346)" fill="#c2410c">
      <rect x="6" y="8" width="6" height="8"/>
      <rect x="0" y="8" width="6" height="6"/>
      <rect x="12" y="8" width="6" height="6"/>
      <rect x="6" y="2" width="6" height="6"/>
    </g>

    <!-- footer: matcher chip -->
    <rect x="440" y="476" width="320" height="34" fill="#bae6fd"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="452" y="498" font-size="10" fill="#1f2937">matcher</text>
      <text x="512" y="498" font-size="10" font-weight="700" fill="#0e7490">"*"</text>
      <text x="556" y="498" font-size="9" fill="#6b7280">· empty inbox = near-free no-op</text>
    </g>
  </g>

  <!-- =========== ARROW 2 (INJECT -> ADJUST) =========== -->
  <g transform="translate(798, 362)" fill="#c2410c">
    <rect x="0"  y="6" width="50" height="6"/>
    <rect x="44" y="0" width="6"  height="6"/>
    <rect x="50" y="6" width="6"  height="6"/>
    <rect x="44" y="12" width="6" height="6"/>
  </g>

  <!-- =========== CARD 3: ADJUST (Claude course-corrects, work kept) =========== -->
  <!-- Position: x=860, y=200, w=270, h=330 -->
  <g>
    <!-- outer tile -->
    <rect x="860" y="200" width="270" height="330" fill="#ffffff"/>
    <rect x="860" y="200" width="270" height="5"   fill="#c9b58a"/>
    <rect x="860" y="525" width="270" height="5"   fill="#c9b58a"/>
    <rect x="860" y="200" width="5"   height="330" fill="#c9b58a"/>
    <rect x="1125" y="200" width="5"  height="330" fill="#c9b58a"/>
    <!-- inner panel -->
    <rect x="870" y="210" width="250" height="310" fill="#fdf7ea"/>

    <!-- title bar -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="886" y="240" font-size="18" font-weight="700" fill="#1f2937" letter-spacing="1">NEXT MOVE</text>
      <text x="1102" y="240" font-size="12" fill="#9ca3af" text-anchor="end" letter-spacing="2">LEAD</text>
    </g>
    <rect x="880" y="252" width="230" height="2" fill="#c9b58a"/>

    <!-- old course (struck through) -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="896" y="288" font-size="11" fill="#9ca3af">approach A</text>
      <rect x="893" y="284" width="78" height="2" fill="#b91c1c"/>
    </g>
    <!-- bent course arrow (was going right, now down-right) -->
    <g fill="#6b7280">
      <rect x="980" y="280" width="28" height="6"/>
    </g>
    <g fill="#c2410c">
      <rect x="1004" y="280" width="6" height="40"/>
      <rect x="1004" y="314" width="28" height="6"/>
      <rect x="1026" y="308" width="6" height="6"/>
      <rect x="1032" y="314" width="6" height="6"/>
      <rect x="1026" y="320" width="6" height="6"/>
    </g>
    <!-- new course label -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="896" y="346" font-size="11" font-weight="700" fill="#c2410c">approach B</text>
    </g>

    <!-- "work kept" seal -->
    <rect x="884" y="368" width="222" height="60" fill="#dcfce7"/>
    <rect x="884" y="368" width="222" height="4" fill="#15803d"/>
    <rect x="884" y="424" width="222" height="4" fill="#15803d"/>
    <!-- check mark -->
    <g fill="#15803d" transform="translate(898, 384)">
      <rect x="0" y="10" width="4" height="4"/>
      <rect x="4" y="14" width="4" height="4"/>
      <rect x="8" y="10" width="4" height="4"/>
      <rect x="12" y="6"  width="4" height="4"/>
      <rect x="16" y="2"  width="4" height="4"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="930" y="394" font-size="12" font-weight="700" fill="#15803d" letter-spacing="1">WORK KEPT</text>
      <text x="930" y="412" font-size="9"  fill="#1f2937">completed steps intact</text>
    </g>

    <!-- non-destructive note vs Esc -->
    <rect x="884" y="446" width="222" height="62" fill="#fef3c7"/>
    <rect x="884" y="446" width="222" height="3" fill="#c2410c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="898" y="468" font-size="10" font-weight="700" fill="#1f2937" letter-spacing="1">COOPERATIVE</text>
      <text x="898" y="484" font-size="9" fill="#6b7280">no Esc · nothing cancelled</text>
      <text x="898" y="498" font-size="9" fill="#6b7280">delivers at next boundary</text>
    </g>
  </g>

  <!-- =========== GROUND LINE under the three cards =========== -->
  <rect x="50" y="546" width="1100" height="2" fill="#eadfcf"/>
</svg>
