<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="startup-grill — adversarial probing, structured kill report" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>startup-grill — adversarial probing, structured kill report</title>
  <desc>Pixel-art banner for the startup-grill Claude Code plugin: title at top-left, kill report paper with two red X marks on the right, three-round process ribbon at the bottom representing Probe, Forced Defense, and Verdict.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-grill-x" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan-grill-x)"/>

  <!-- =========== TITLE BLOCK (top-left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="64" y="72" font-size="38" font-weight="700" fill="#1f2937" letter-spacing="1">startup-grill</text>
    <text x="64" y="104" font-size="18" fill="#6b7280">probe for failure. ship the kill report.</text>
    <text x="64" y="130" font-size="11" fill="#9ca3af" letter-spacing="3">5 PANELISTS · FORCED DEFENSE · LETHAL VS FIXABLE</text>
  </g>

  <!-- =========== KILL REPORT PAPER (right side) =========== -->
  <!-- Paper card centered around x=1180, y=200 -->
  <g transform="translate(960, 100)">
    <!-- Paper drop shadow -->
    <rect x="12" y="12" width="500" height="320" fill="#d6c9b3"/>
    <!-- Paper interior -->
    <rect x="0" y="0" width="500" height="320" fill="#ffffff"/>
    <!-- Paper border (ink) -->
    <rect x="0" y="0" width="500" height="6" fill="#1f2937"/>
    <rect x="0" y="314" width="500" height="6" fill="#1f2937"/>
    <rect x="0" y="0" width="6" height="320" fill="#1f2937"/>
    <rect x="494" y="0" width="6" height="320" fill="#1f2937"/>

    <!-- Header band (ink) — kill report title -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="32" y="50" font-size="22" font-weight="700" fill="#1f2937" letter-spacing="2">KILL REPORT</text>
      <text x="32" y="74" font-size="12" fill="#9ca3af" letter-spacing="1">verdict: investable with conditions</text>
    </g>
    <!-- Header divider -->
    <rect x="32" y="86" width="436" height="2" fill="#eadfcf"/>

    <!-- Row 1: red X + lethal label + line -->
    <g transform="translate(32, 110)">
      <!-- X mark (red) -->
      <g fill="#c2410c">
        <rect x="0" y="0" width="6" height="6"/>
        <rect x="18" y="0" width="6" height="6"/>
        <rect x="6" y="6" width="6" height="6"/>
        <rect x="12" y="6" width="6" height="6"/>
        <rect x="6" y="12" width="6" height="6"/>
        <rect x="12" y="12" width="6" height="6"/>
        <rect x="0" y="18" width="6" height="6"/>
        <rect x="18" y="18" width="6" height="6"/>
      </g>
      <!-- L1 label -->
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
        <text x="40" y="20" font-size="16" font-weight="700" fill="#c2410c" letter-spacing="1">L1.</text>
      </g>
      <!-- Body text line -->
      <rect x="76" y="6" width="320" height="4" fill="#9ca3af"/>
      <rect x="76" y="16" width="240" height="4" fill="#9ca3af"/>
    </g>

    <!-- Row 2: red X + lethal label + line -->
    <g transform="translate(32, 160)">
      <g fill="#c2410c">
        <rect x="0" y="0" width="6" height="6"/>
        <rect x="18" y="0" width="6" height="6"/>
        <rect x="6" y="6" width="6" height="6"/>
        <rect x="12" y="6" width="6" height="6"/>
        <rect x="6" y="12" width="6" height="6"/>
        <rect x="12" y="12" width="6" height="6"/>
        <rect x="0" y="18" width="6" height="6"/>
        <rect x="18" y="18" width="6" height="6"/>
      </g>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
        <text x="40" y="20" font-size="16" font-weight="700" fill="#c2410c" letter-spacing="1">L2.</text>
      </g>
      <rect x="76" y="6" width="280" height="4" fill="#9ca3af"/>
      <rect x="76" y="16" width="200" height="4" fill="#9ca3af"/>
    </g>

    <!-- Row 3: yellow exclamation (material) -->
    <g transform="translate(32, 210)">
      <!-- Exclamation mark (gold) -->
      <g fill="#eab308">
        <rect x="6" y="0" width="12" height="14"/>
        <rect x="6" y="18" width="12" height="6"/>
      </g>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
        <text x="40" y="20" font-size="16" font-weight="700" fill="#a16207" letter-spacing="1">M1.</text>
      </g>
      <rect x="76" y="6" width="260" height="4" fill="#9ca3af"/>
      <rect x="76" y="16" width="180" height="4" fill="#9ca3af"/>
    </g>

    <!-- Row 4: green check (defended/ok) -->
    <g transform="translate(32, 260)">
      <!-- Checkmark (green) -->
      <g fill="#15803d">
        <rect x="0" y="12" width="6" height="6"/>
        <rect x="6" y="18" width="6" height="6"/>
        <rect x="12" y="12" width="6" height="6"/>
        <rect x="18" y="6" width="6" height="6"/>
        <rect x="24" y="0" width="6" height="6"/>
      </g>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
        <text x="46" y="20" font-size="14" fill="#15803d" letter-spacing="1">defended on re-probe</text>
      </g>
    </g>
  </g>

  <!-- =========== PROCESS RIBBON (bottom) — 3 rounds: probe / defend / verdict =========== -->
  <g transform="translate(80, 380)">
    <!-- Round 1 — PROBE (orange) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="32" height="32" fill="#c2410c"/>
      <rect x="4" y="-4" width="24" height="4" fill="#c2410c"/>
      <rect x="4" y="32" width="24" height="4" fill="#c2410c"/>
      <rect x="-4" y="4" width="4" height="24" fill="#c2410c"/>
      <rect x="32" y="4" width="4" height="24" fill="#c2410c"/>
      <!-- "1" -->
      <rect x="14" y="8" width="4" height="16" fill="#f5efe6"/>
      <rect x="10" y="10" width="4" height="4" fill="#f5efe6"/>
      <rect x="10" y="24" width="12" height="4" fill="#f5efe6"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#c2410c" font-weight="700">
      <text x="-8" y="54" font-size="11" letter-spacing="2">PROBE</text>
    </g>
    <!-- arrow 1 -->
    <g transform="translate(52, 10)" fill="#6b7280">
      <rect x="0" y="6" width="72" height="4"/>
      <rect x="64" y="2" width="4" height="4"/>
      <rect x="68" y="6" width="4" height="4"/>
      <rect x="64" y="10" width="4" height="4"/>
    </g>

    <!-- Round 2 — DEFEND (slate, with shield) -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="32" height="32" fill="#475569"/>
      <rect x="4" y="-4" width="24" height="4" fill="#475569"/>
      <rect x="4" y="32" width="24" height="4" fill="#475569"/>
      <rect x="-4" y="4" width="4" height="24" fill="#475569"/>
      <rect x="32" y="4" width="4" height="24" fill="#475569"/>
      <!-- "2" -->
      <rect x="8" y="8" width="16" height="4" fill="#f5efe6"/>
      <rect x="20" y="8" width="4" height="8" fill="#f5efe6"/>
      <rect x="8" y="16" width="16" height="4" fill="#f5efe6"/>
      <rect x="8" y="20" width="4" height="4" fill="#f5efe6"/>
      <rect x="8" y="24" width="16" height="4" fill="#f5efe6"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#475569" font-weight="700">
      <text x="170" y="54" font-size="11" letter-spacing="2">DEFEND</text>
    </g>
    <!-- arrow 2 -->
    <g transform="translate(232, 10)" fill="#6b7280">
      <rect x="0" y="6" width="72" height="4"/>
      <rect x="64" y="2" width="4" height="4"/>
      <rect x="68" y="6" width="4" height="4"/>
      <rect x="64" y="10" width="4" height="4"/>
    </g>

    <!-- Round 3 — VERDICT (ink) -->
    <g transform="translate(360, 0)">
      <rect x="0" y="0" width="32" height="32" fill="#1f2937"/>
      <rect x="4" y="-4" width="24" height="4" fill="#1f2937"/>
      <rect x="4" y="32" width="24" height="4" fill="#1f2937"/>
      <rect x="-4" y="4" width="4" height="24" fill="#1f2937"/>
      <rect x="32" y="4" width="4" height="24" fill="#1f2937"/>
      <!-- "3" -->
      <rect x="8" y="8" width="16" height="4" fill="#f5efe6"/>
      <rect x="20" y="8" width="4" height="8" fill="#f5efe6"/>
      <rect x="12" y="16" width="12" height="4" fill="#f5efe6"/>
      <rect x="20" y="20" width="4" height="4" fill="#f5efe6"/>
      <rect x="8" y="24" width="16" height="4" fill="#f5efe6"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1f2937" font-weight="700">
      <text x="350" y="54" font-size="11" letter-spacing="2">VERDICT</text>
    </g>

    <!-- Verdict labels card after round 3 -->
    <g transform="translate(480, -10)">
      <rect x="0" y="0" width="280" height="52" fill="#ffffff"/>
      <rect x="0" y="0" width="280" height="4" fill="#c9b58a"/>
      <rect x="0" y="48" width="280" height="4" fill="#c9b58a"/>
      <rect x="0" y="0" width="4" height="52" fill="#c9b58a"/>
      <rect x="276" y="0" width="4" height="52" fill="#c9b58a"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" letter-spacing="1">
        <text x="14" y="20" fill="#15803d" font-weight="700">INVESTABLE AS-IS</text>
        <text x="14" y="34" fill="#a16207" font-weight="700">INVESTABLE WITH CONDITIONS</text>
        <text x="160" y="20" fill="#c2410c" font-weight="700">PIVOT SIGNAL</text>
        <text x="160" y="34" fill="#1f2937" font-weight="700">PASS</text>
      </g>
    </g>
  </g>
</svg>
