<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="business-model-canvas — nine blocks, honestly filled" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>business-model-canvas — nine blocks, honestly filled</title>
  <desc>Pixel-art X/Twitter banner for the business-model-canvas Claude Code plugin: title block on the left, a full nine-block Osterwalder canvas grid on the right in the canonical layout. A customer-first arrow runs right-to-left above the grid, and a small stress-tests warning card sits under the canvas. Footer labels: DISCOVER · CONSISTENCY · STRESS TEST.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-bmc-x" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan-bmc-x)"/>

  <!-- =========== TITLE BLOCK (left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="64" y="72" font-size="34" font-weight="700" fill="#1f2937" letter-spacing="1">business-model-canvas</text>
    <text x="64" y="104" font-size="18" fill="#6b7280">nine blocks, honestly filled.</text>
    <text x="64" y="130" font-size="11" fill="#9ca3af" letter-spacing="3">DISCOVER · CONSISTENCY · STRESS TEST</text>
  </g>

  <!-- summary copy -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#374151">
    <text x="64" y="188" font-size="13" letter-spacing="1">start with segments. end with stress tests.</text>
    <text x="64" y="208" font-size="13" letter-spacing="1">nine blocks that have to agree —</text>
    <text x="64" y="228" font-size="13" letter-spacing="1">or the model isn't honest yet.</text>
  </g>

  <!-- Stress tests call-out on the left -->
  <g transform="translate(64, 262)">
    <rect x="0" y="0" width="220" height="92" fill="#fffbeb"/>
    <rect x="0" y="0" width="220" height="6" fill="#d97706"/>
    <rect x="0" y="86" width="220" height="6" fill="#d97706"/>
    <rect x="0" y="0" width="6" height="92" fill="#d97706"/>
    <rect x="214" y="0" width="6" height="92" fill="#d97706"/>
    <!-- warning triangle -->
    <g transform="translate(16, 24)" fill="#d97706">
      <rect x="12" y="0" width="4" height="4"/>
      <rect x="10" y="4" width="8" height="4"/>
      <rect x="8"  y="8" width="12" height="4"/>
      <rect x="6"  y="12" width="16" height="4"/>
      <rect x="4"  y="16" width="20" height="4"/>
    </g>
    <text x="50" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#78350f" letter-spacing="2">STRESS TESTS</text>
    <text x="50" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#78350f" letter-spacing="1">every canvas ships with the</text>
    <text x="50" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#78350f" letter-spacing="1">2–3 assumptions that could</text>
    <text x="50" y="74" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#78350f" letter-spacing="1">kill the business, flagged.</text>
  </g>

  <!-- footer tagline left -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#9ca3af">
    <text x="64" y="420" font-size="11" letter-spacing="3">UNKNOWNS ARE DATA · NOT FILLER</text>
  </g>

  <!-- =========== CUSTOMER-FIRST ARROW above grid =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="640" y="74" width="828" height="3" fill="#047857"/>
    <rect x="628" y="70" width="4" height="11" fill="#047857"/>
    <rect x="624" y="72" width="4" height="7" fill="#047857"/>
    <rect x="620" y="74" width="4" height="3" fill="#047857"/>
    <rect x="632" y="66" width="4" height="19" fill="#047857"/>
    <text x="1054" y="64" font-size="11" font-weight="700" fill="#047857" letter-spacing="3" text-anchor="middle">CUSTOMER-FIRST REASONING ORDER</text>
  </g>

  <!-- ================================================ -->
  <!-- CANVAS GRID — 860w x 280h, x_start=640, y_start=90 -->
  <!-- ================================================ -->
  <g>
    <!-- Outer frame -->
    <rect x="640" y="90" width="860" height="280" fill="none" stroke="#1f2937" stroke-width="2"/>

    <!-- TOP ROW: 5 columns, height 200 (y=90..290) -->
    <!-- Col 1: Key Partners (amber) -->
    <rect x="640" y="90"  width="172" height="200" fill="#fef3c7"/>
    <rect x="640" y="90"  width="172" height="6"   fill="#d97706"/>
    <text x="652" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#78350f" letter-spacing="1">KEY PARTNERS</text>
    <g transform="translate(702, 210)" fill="#d97706">
      <rect x="0" y="6" width="12" height="4"/>
      <rect x="16" y="6" width="12" height="4"/>
      <rect x="10" y="2" width="10" height="12"/>
      <rect x="12" y="0" width="6" height="2"/>
    </g>
    <rect x="652" y="136" width="96" height="2" fill="#a16207"/>
    <rect x="652" y="146" width="76" height="2" fill="#a16207"/>
    <rect x="652" y="156" width="88" height="2" fill="#a16207"/>

    <!-- Col 2: Key Activities top + Key Resources bottom (blue) -->
    <rect x="812" y="90"  width="172" height="100" fill="#dbeafe"/>
    <rect x="812" y="90"  width="172" height="6"   fill="#1d4ed8"/>
    <text x="824" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="1">KEY ACTIVITIES</text>
    <rect x="824" y="132" width="80" height="2" fill="#1e40af"/>
    <rect x="824" y="142" width="96" height="2" fill="#1e40af"/>
    <rect x="824" y="152" width="72" height="2" fill="#1e40af"/>

    <rect x="812" y="190" width="172" height="100" fill="#dbeafe"/>
    <rect x="812" y="190" width="172" height="2"   fill="#1d4ed8"/>
    <text x="824" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="1">KEY RESOURCES</text>
    <rect x="824" y="232" width="84" height="2" fill="#1e40af"/>
    <rect x="824" y="242" width="92" height="2" fill="#1e40af"/>
    <rect x="824" y="252" width="76" height="2" fill="#1e40af"/>

    <!-- Col 3: Value Propositions (pink, full height) -->
    <rect x="984" y="90"  width="172" height="200" fill="#fce7f3"/>
    <rect x="984" y="90"  width="172" height="6"   fill="#be185d"/>
    <text x="996" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#831843" letter-spacing="1">VALUE PROPS</text>
    <g transform="translate(1060, 210)" fill="#be185d">
      <rect x="0"  y="4"  width="20" height="12"/>
      <rect x="4"  y="0"  width="12" height="4"/>
      <rect x="8"  y="0"  width="4"  height="16"/>
      <rect x="0"  y="8"  width="20" height="2"/>
    </g>
    <rect x="996" y="134" width="88" height="2" fill="#9d174d"/>
    <rect x="996" y="144" width="96" height="2" fill="#9d174d"/>
    <rect x="996" y="154" width="80" height="2" fill="#9d174d"/>

    <!-- Col 4: Relationships top + Channels bottom (indigo) -->
    <rect x="1156" y="90"  width="172" height="100" fill="#e0e7ff"/>
    <rect x="1156" y="90"  width="172" height="6"   fill="#4338ca"/>
    <text x="1168" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#312e81" letter-spacing="1">C.RELATIONSHIPS</text>
    <rect x="1168" y="132" width="80" height="2" fill="#3730a3"/>
    <rect x="1168" y="142" width="96" height="2" fill="#3730a3"/>
    <rect x="1168" y="152" width="72" height="2" fill="#3730a3"/>

    <rect x="1156" y="190" width="172" height="100" fill="#e0e7ff"/>
    <rect x="1156" y="190" width="172" height="2"   fill="#4338ca"/>
    <text x="1168" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#312e81" letter-spacing="1">CHANNELS</text>
    <rect x="1168" y="232" width="84" height="2" fill="#3730a3"/>
    <rect x="1168" y="242" width="92" height="2" fill="#3730a3"/>
    <rect x="1168" y="252" width="76" height="2" fill="#3730a3"/>

    <!-- Col 5: Customer Segments (emerald, START HERE) -->
    <rect x="1328" y="90"  width="172" height="200" fill="#d1fae5"/>
    <rect x="1328" y="90"  width="172" height="6"   fill="#047857"/>
    <text x="1340" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#064e3b" letter-spacing="1">CUSTOMER SEGMENTS</text>

    <!-- START HERE pill -->
    <g transform="translate(1354, 126)">
      <rect x="0" y="0" width="120" height="20" fill="#047857"/>
      <rect x="0" y="0" width="120" height="4"  fill="#10b981"/>
      <rect x="0" y="16" width="120" height="4" fill="#064e3b"/>
      <text x="60" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#f5efe6" letter-spacing="2" text-anchor="middle">START HERE</text>
    </g>

    <!-- 4 tiny people icons -->
    <g transform="translate(1350, 168)" fill="#047857">
      <rect x="0" y="0" width="10" height="10"/>
      <rect x="-2" y="12" width="14" height="14"/>
      <rect x="26" y="0" width="10" height="10"/>
      <rect x="24" y="12" width="14" height="14"/>
      <rect x="52" y="0" width="10" height="10"/>
      <rect x="50" y="12" width="14" height="14"/>
      <rect x="78" y="0" width="10" height="10"/>
      <rect x="76" y="12" width="14" height="14"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#064e3b">
      <text x="1340" y="218" font-size="9" letter-spacing="1">named. specific. reachable.</text>
      <text x="1340" y="232" font-size="8" fill="#065f46" letter-spacing="1">not "SMBs" — CA dental, ≤3 chairs</text>
      <text x="1340" y="252" font-size="9" letter-spacing="1">pain &gt; willingness-to-pay</text>
      <text x="1340" y="268" font-size="9" letter-spacing="1">job-to-be-done: clear</text>
    </g>

    <!-- BOTTOM ROW: Cost Structure + Revenue Streams — two halves -->
    <rect x="640" y="290" width="430" height="80" fill="#fee2e2"/>
    <rect x="640" y="290" width="430" height="6"  fill="#b91c1c"/>
    <text x="652" y="312" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#7f1d1d" letter-spacing="1">COST STRUCTURE</text>
    <g transform="translate(1020, 316)" fill="#b91c1c">
      <rect x="0" y="24" width="32" height="6"/>
      <rect x="2" y="16" width="28" height="6"/>
      <rect x="4" y="8"  width="24" height="6"/>
      <rect x="6" y="0"  width="20" height="6"/>
    </g>
    <rect x="652" y="332" width="140" height="2" fill="#991b1b"/>
    <rect x="652" y="344" width="112" height="2" fill="#991b1b"/>

    <rect x="1070" y="290" width="430" height="80" fill="#d1fae5"/>
    <rect x="1070" y="290" width="430" height="6"  fill="#047857"/>
    <text x="1082" y="312" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#064e3b" letter-spacing="1">REVENUE STREAMS</text>
    <g transform="translate(1450, 316)" fill="#047857">
      <rect x="12" y="0" width="6" height="30"/>
      <rect x="6"  y="6" width="6" height="24"/>
      <rect x="18" y="6" width="6" height="24"/>
      <rect x="8"  y="0" width="14" height="4"/>
      <rect x="4"  y="4" width="4"  height="4"/>
      <rect x="22" y="4" width="4"  height="4"/>
    </g>
    <rect x="1082" y="332" width="140" height="2" fill="#065f46"/>
    <rect x="1082" y="344" width="112" height="2" fill="#065f46"/>
  </g>

  <!-- footer label under grid -->
  <text x="1070" y="400" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#9ca3af" letter-spacing="2" text-anchor="middle">CONSISTENCY: every block agrees with the others.</text>
  <text x="1070" y="418" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#9ca3af" letter-spacing="1" text-anchor="middle">segments ↔ value ↔ channels ↔ revenue — they line up or the canvas rejects.</text>
</svg>
