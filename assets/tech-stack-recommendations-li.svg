<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="tech-stack-recommendations — opinionated defaults, judgment-aware" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>tech-stack-recommendations — opinionated defaults, judgment-aware</title>
  <desc>Pixel-art banner for the tech-stack-recommendations Claude Code plugin: title at top, three vertical stacks of layered bricks side by side. Each stack shows five layers — Auth, DB, API, Web, Runtime — labeled with the recommended technology. The Bun stack on the left is highlighted as the default. The Deno stack in the middle is tagged edge-first. The Node stack on the right is tagged ecosystem-friendly. Footer reminds readers that defaults are not dogma.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-li" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#scan-li)"/>

  <!-- =========== TITLE BLOCK (top, centered) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="600" y="72" font-size="40" font-weight="700" fill="#1f2937" letter-spacing="2">tech-stack-recommendations</text>
    <text x="600" y="106" font-size="20" fill="#6b7280">opinionated defaults. judgment-aware.</text>
    <text x="600" y="134" font-size="12" fill="#9ca3af" letter-spacing="4">RUNTIME · WEB · API · DB · AUTH</text>
  </g>

  <!-- ============================================== -->
  <!-- STACK 1: BUN (default, orange) — centered x=240 -->
  <!-- ============================================== -->
  <!-- DEFAULT badge -->
  <g transform="translate(150, 178)">
    <rect x="0" y="0" width="180" height="32" fill="#c2410c"/>
    <rect x="0" y="0" width="180" height="4"  fill="#ea580c"/>
    <rect x="0" y="28" width="180" height="4" fill="#7c2d12"/>
    <!-- pixel star -->
    <g transform="translate(20, 12)" fill="#fde68a">
      <rect x="4" y="0" width="2" height="2"/>
      <rect x="2" y="2" width="6" height="2"/>
      <rect x="0" y="4" width="10" height="2"/>
      <rect x="2" y="6" width="2" height="2"/>
      <rect x="6" y="6" width="2" height="2"/>
    </g>
    <text x="100" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#fdf7ea" text-anchor="middle" letter-spacing="3">DEFAULT</text>
  </g>

