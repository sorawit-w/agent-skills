<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="steer — redirect a run mid-flight, without losing work" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>steer — redirect a run mid-flight, without losing work</title>
  <desc>Pixel-art banner for the steer Claude Code plugin: title at top-left, a QUEUE card showing a second terminal running ./.claude/steer into an inbox, an INJECT card showing the PreToolUse hook wrapping the message in a STEERING tag at a tool-call boundary, and an ADJUST card showing Claude course-correcting with completed work kept. Chapter labels QUEUE · INJECT · ADJUST.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-steer-x" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan-steer-x)"/>

  <!-- =========== TITLE BLOCK (top-left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="64" y="72" font-size="38" font-weight="700" fill="#1f2937" letter-spacing="3">steer</text>
    <text x="64" y="104" font-size="18" fill="#6b7280">redirect a run mid-flight, without losing work</text>
    <text x="64" y="130" font-size="11" fill="#9ca3af" letter-spacing="3">QUEUE · INJECT · ADJUST</text>
  </g>

  <!-- interim positioning chip under title -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="64" y="220" width="404" height="120" fill="#fdf7ea"/>
    <rect x="64" y="220" width="404" height="4" fill="#c2410c"/>
    <rect x="64" y="220" width="4"   height="120" fill="#c2410c"/>
    <text x="84" y="252" font-size="13" font-weight="700" fill="#c2410c" letter-spacing="2">INTERIM PRIMITIVE</text>
    <text x="84" y="280" font-size="12" fill="#1f2937">non-destructive mid-run steering.</text>
    <text x="84" y="300" font-size="12" fill="#1f2937">no Esc, no lost work.</text>
    <text x="84" y="326" font-size="10" fill="#6b7280">retired if/when native steering ships · #30492</text>
  </g>

  <!-- =========== SECTION LABELS =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="690"  y="436" font-size="11" fill="#1f2937" letter-spacing="3">QUEUE</text>
    <text x="1075" y="436" font-size="11" fill="#c2410c" font-weight="700" letter-spacing="3">INJECT</text>
    <text x="1430" y="436" font-size="11" fill="#1f2937" letter-spacing="3">ADJUST</text>
  </g>

  <!-- =========== CARD 1: QUEUE (terminal -> inbox) =========== -->
  <!-- x=560 y=150 w=260 h=250 -->
  <g>
    <rect x="560" y="150" width="260" height="250" fill="#f3e7c9"/>
    <rect x="560" y="150" width="260" height="5"   fill="#b79a5c"/>
    <rect x="560" y="395" width="260" height="5"   fill="#b79a5c"/>
    <rect x="560" y="150" width="5"   height="250" fill="#b79a5c"/>
    <rect x="815" y="150" width="5"   height="250" fill="#b79a5c"/>

    <rect x="566" y="160" width="248" height="30" fill="#fdf7ea"/>
    <text x="584" y="181" font-size="15" font-weight="700" fill="#1f2937" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">TERMINAL 2</text>
    <rect x="566" y="190" width="248" height="2" fill="#b79a5c"/>

    <!-- terminal window -->
    <rect x="586" y="206" width="208" height="80" fill="#1f2937"/>
    <rect x="586" y="206" width="208" height="12" fill="#374151"/>
    <rect x="592" y="210" width="4" height="4" fill="#b91c1c"/>
    <rect x="600" y="210" width="4" height="4" fill="#fbbf24"/>
    <rect x="608" y="210" width="4" height="4" fill="#15803d"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="596" y="238" font-size="10" fill="#15803d">$</text>
      <text x="608" y="238" font-size="10" fill="#bae6fd">./.claude/steer</text>
      <text x="596" y="258" font-size="10" fill="#f5efe6">"pivot to approach B"</text>
      <rect x="596" y="266" width="6" height="10" fill="#c2410c"/>
    </g>

    <!-- arrow to inbox -->
    <g transform="translate(686, 292)" fill="#6b7280">
      <rect x="4" y="0" width="6" height="14"/>
      <rect x="0" y="10" width="4" height="4"/>
      <rect x="10" y="10" width="4" height="4"/>
      <rect x="4" y="14" width="6" height="4"/>
    </g>

    <!-- inbox -->
    <rect x="600" y="322" width="180" height="60" fill="#fdf7ea"/>
    <rect x="600" y="322" width="180" height="3" fill="#b79a5c"/>
    <text x="612" y="342" font-size="9" font-weight="700" fill="#c2410c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">steer-inbox</text>
    <rect x="612" y="350" width="110" height="5" fill="#1f2937"/>
    <rect x="612" y="360" width="150" height="5" fill="#1f2937"/>
    <text x="612" y="378" font-size="8" fill="#6b7280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">append · in order</text>
  </g>

  <!-- arrow QUEUE->INJECT -->
  <g transform="translate(828, 262)" fill="#6b7280">
    <rect x="0"  y="6" width="34" height="6"/>
    <rect x="28" y="0" width="6"  height="6"/>
    <rect x="34" y="6" width="6"  height="6"/>
    <rect x="28" y="12" width="6" height="6"/>
  </g>

  <!-- =========== CARD 2: INJECT (the hook) =========== -->
  <!-- x=880 y=150 w=340 h=250 -->
  <g>
    <rect x="880" y="150" width="340" height="250" fill="#ffffff"/>
    <rect x="880" y="150" width="340" height="5"   fill="#c9b58a"/>
    <rect x="880" y="395" width="340" height="5"   fill="#c9b58a"/>
    <rect x="880" y="150" width="5"   height="250" fill="#c9b58a"/>
    <rect x="1215" y="150" width="5"  height="250" fill="#c9b58a"/>
    <rect x="890" y="160" width="320" height="230" fill="#fdf7ea"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="906" y="186" font-size="15" font-weight="700" fill="#1f2937" letter-spacing="1">PreToolUse</text>
      <text x="1196" y="186" font-size="11" fill="#9ca3af" text-anchor="end" letter-spacing="2">HOOK</text>
    </g>
    <rect x="904" y="196" width="292" height="2" fill="#c9b58a"/>

    <!-- boundary blocks -->
    <rect x="912" y="214" width="84" height="34" fill="#dcfce7"/>
    <rect x="912" y="214" width="84" height="3" fill="#15803d"/>
    <text x="954" y="236" font-size="10" font-weight="700" fill="#15803d" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">DONE</text>
    <rect x="1104" y="214" width="84" height="34" fill="#f3e7c9"/>
    <rect x="1104" y="214" width="84" height="3" fill="#b79a5c"/>
    <text x="1146" y="236" font-size="11" fill="#6b7280" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">…</text>
    <!-- warm seam -->
    <rect x="1046" y="208" width="8" height="46" fill="#c2410c"/>
    <rect x="1042" y="208" width="4" height="46" fill="#fde68a"/>
    <rect x="1054" y="208" width="4" height="46" fill="#fde68a"/>

    <!-- STEERING block -->
    <rect x="906" y="266" width="288" height="84" fill="#fde68a"/>
    <rect x="906" y="266" width="288" height="4" fill="#c2410c"/>
    <rect x="906" y="346" width="288" height="4" fill="#c2410c"/>
    <rect x="906" y="266" width="4"   height="84" fill="#c2410c"/>
    <rect x="1190" y="266" width="4"  height="84" fill="#c2410c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="920" y="290" font-size="11" font-weight="700" fill="#c2410c" letter-spacing="2">[STEERING]</text>
      <text x="920" y="308" font-size="9" fill="#1f2937">course-correct the CURRENT task,</text>
      <text x="920" y="320" font-size="9" fill="#1f2937">not a new one.</text>
      <text x="920" y="338" font-size="10" font-weight="700" fill="#1f2937">"pivot to approach B"</text>
    </g>
    <text x="906" y="372" font-size="9" fill="#6b7280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">additionalContext · matcher "*" · consumed once</text>
  </g>

  <!-- arrow INJECT->ADJUST -->
  <g transform="translate(1228, 262)" fill="#c2410c">
    <rect x="0"  y="6" width="40" height="6"/>
    <rect x="34" y="0" width="6"  height="6"/>
    <rect x="40" y="6" width="6"  height="6"/>
    <rect x="34" y="12" width="6" height="6"/>
  </g>

  <!-- =========== CARD 3: ADJUST =========== -->
  <!-- x=1290 y=150 w=246 h=250 -->
  <g>
    <rect x="1290" y="150" width="246" height="250" fill="#ffffff"/>
    <rect x="1290" y="150" width="246" height="5"   fill="#c9b58a"/>
    <rect x="1290" y="395" width="246" height="5"   fill="#c9b58a"/>
    <rect x="1290" y="150" width="5"   height="250" fill="#c9b58a"/>
    <rect x="1531" y="150" width="5"   height="250" fill="#c9b58a"/>
    <rect x="1300" y="160" width="226" height="230" fill="#fdf7ea"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1316" y="186" font-size="15" font-weight="700" fill="#1f2937" letter-spacing="1">NEXT MOVE</text>
    </g>
    <rect x="1314" y="196" width="208" height="2" fill="#c9b58a"/>

    <!-- old/new course -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1326" y="224" font-size="10" fill="#9ca3af">approach A</text>
      <rect x="1323" y="220" width="72" height="2" fill="#b91c1c"/>
      <text x="1326" y="250" font-size="11" font-weight="700" fill="#c2410c">approach B</text>
    </g>
    <!-- bent arrow -->
    <g fill="#c2410c">
      <rect x="1440" y="216" width="6" height="34"/>
      <rect x="1440" y="244" width="24" height="6"/>
      <rect x="1458" y="238" width="6" height="6"/>
      <rect x="1464" y="244" width="6" height="6"/>
      <rect x="1458" y="250" width="6" height="6"/>
    </g>

    <!-- work kept -->
    <rect x="1314" y="270" width="208" height="52" fill="#dcfce7"/>
    <rect x="1314" y="270" width="208" height="4" fill="#15803d"/>
    <g fill="#15803d" transform="translate(1326, 284)">
      <rect x="0" y="8" width="4" height="4"/>
      <rect x="4" y="12" width="4" height="4"/>
      <rect x="8" y="8" width="4" height="4"/>
      <rect x="12" y="4" width="4" height="4"/>
      <rect x="16" y="0" width="4" height="4"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1356" y="294" font-size="11" font-weight="700" fill="#15803d" letter-spacing="1">WORK KEPT</text>
      <text x="1356" y="312" font-size="9" fill="#1f2937">completed steps intact</text>
    </g>

    <!-- cooperative note -->
    <rect x="1314" y="334" width="208" height="44" fill="#fef3c7"/>
    <rect x="1314" y="334" width="208" height="3" fill="#c2410c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="1326" y="354" font-size="9" font-weight="700" fill="#1f2937" letter-spacing="1">COOPERATIVE</text>
      <text x="1326" y="370" font-size="8" fill="#6b7280">delivers at next boundary</text>
    </g>
  </g>
</svg>
