<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="pixel-art — hi-density pixel-art studio with built-in design system and model-agnostic prompts" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>pixel-art — hi-density pixel-art studio</title>
  <desc>Pixel-art banner for the pixel-art Claude Code plugin (X format): title top-left, three panels in a row (brief → design system → output mini-scene with lighthouse and ships), pixel-art arrows between panels.</desc>

  <defs>
    <pattern id="paper-pa-x" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#paper-pa-x)"/>

  <!-- =========== TITLE BLOCK (top-left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="60" y="64" font-size="42" font-weight="700" fill="#1f2937" letter-spacing="2">pixel-art</text>
    <text x="60" y="92" font-size="18" fill="#6b7280">a hi-density pixel-art studio.</text>
  </g>

  <!-- =========== PANEL 1: BRIEF =========== -->
  <g transform="translate(60, 130)">
