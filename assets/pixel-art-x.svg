      <rect x="20" y="68" width="160" height="4"/>
    </g>
    <rect x="20" y="88" width="240" height="14" fill="#fde68a"/>
    <g fill="#3a2a1a">
      <rect x="26" y="92" width="6" height="6"/>
      <rect x="34" y="92" width="6" height="6"/>
      <rect x="42" y="92" width="6" height="6"/>
      <rect x="54" y="92" width="6" height="6"/>
      <rect x="62" y="92" width="6" height="6"/>
      <rect x="70" y="92" width="6" height="6"/>
      <rect x="82" y="92" width="6" height="6"/>
      <rect x="90" y="92" width="6" height="6"/>
      <rect x="98" y="92" width="6" height="6"/>
      <rect x="110" y="92" width="6" height="6"/>
      <rect x="118" y="92" width="6" height="6"/>
      <rect x="126" y="92" width="6" height="6"/>
      <rect x="134" y="92" width="6" height="6"/>
    </g>
    <g fill="#9ca3af">
      <rect x="20" y="118" width="220" height="4"/>
      <rect x="20" y="130" width="240" height="4"/>
      <rect x="20" y="142" width="190" height="4"/>
    </g>

    <text x="140" y="200" font-family="ui-monospace, monospace" font-size="14" fill="#1f2937" text-anchor="middle" font-weight="700" letter-spacing="3">BRIEF</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(360, 220)" fill="#6b7280">
    <rect x="0"  y="10" width="100" height="6"/>
    <rect x="92" y="4"  width="6"   height="6"/>
    <rect x="98" y="10" width="6"   height="6"/>
    <rect x="92" y="16" width="6"   height="6"/>
  </g>

