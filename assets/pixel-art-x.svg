      <!-- ramp 1 -->
      <rect x="0"  y="0" width="20" height="20" fill="#264653"/>
      <rect x="22" y="0" width="20" height="20" fill="#264653"/>
      <rect x="22" y="0" width="4"  height="4"  fill="#5d8aa8"/>
      <rect x="30" y="0" width="4"  height="4"  fill="#5d8aa8"/>
      <rect x="38" y="0" width="4"  height="4"  fill="#5d8aa8"/>
      <rect x="22" y="8" width="4"  height="4"  fill="#5d8aa8"/>
      <rect x="30" y="8" width="4"  height="4"  fill="#5d8aa8"/>
      <rect x="38" y="8" width="4"  height="4"  fill="#5d8aa8"/>
      <rect x="22" y="16" width="4" height="4"  fill="#5d8aa8"/>
      <rect x="30" y="16" width="4" height="4"  fill="#5d8aa8"/>
      <rect x="38" y="16" width="4" height="4"  fill="#5d8aa8"/>
      <rect x="44" y="0" width="20" height="20" fill="#5d8aa8"/>
      <rect x="66" y="0" width="20" height="20" fill="#5d8aa8"/>
      <rect x="66" y="0" width="4"  height="4"  fill="#d9c2a3"/>
      <rect x="74" y="0" width="4"  height="4"  fill="#d9c2a3"/>
      <rect x="82" y="0" width="4"  height="4"  fill="#d9c2a3"/>
      <rect x="66" y="8" width="4"  height="4"  fill="#d9c2a3"/>
      <rect x="74" y="8" width="4"  height="4"  fill="#d9c2a3"/>
      <rect x="82" y="8" width="4"  height="4"  fill="#d9c2a3"/>
      <rect x="66" y="16" width="4" height="4"  fill="#d9c2a3"/>
      <rect x="74" y="16" width="4" height="4"  fill="#d9c2a3"/>
      <rect x="82" y="16" width="4" height="4"  fill="#d9c2a3"/>
      <rect x="88" y="0" width="20" height="20" fill="#d9c2a3"/>
      <rect x="110" y="0" width="20" height="20" fill="#d9c2a3"/>
      <rect x="110" y="0" width="4" height="4"  fill="#f7f0e0"/>
      <rect x="118" y="0" width="4" height="4"  fill="#f7f0e0"/>
      <rect x="126" y="0" width="4" height="4"  fill="#f7f0e0"/>
      <rect x="110" y="8" width="4" height="4"  fill="#f7f0e0"/>
      <rect x="118" y="8" width="4" height="4"  fill="#f7f0e0"/>
      <rect x="126" y="8" width="4" height="4"  fill="#f7f0e0"/>
      <rect x="110" y="16" width="4" height="4" fill="#f7f0e0"/>
