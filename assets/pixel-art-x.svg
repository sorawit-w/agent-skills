    <text x="60" y="424" font-size="11" fill="#9ca3af" letter-spacing="2">z-image · imagen · openai · midjourney · sdxl · or no MCP at all</text>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="end">
    <text x="1540" y="400" font-size="13" fill="#1f2937" letter-spacing="3" font-weight="700">HI-FI · LO-FI</text>
    <text x="1540" y="424" font-size="11" fill="#9ca3af" letter-spacing="2">no living-artist names · original compositions only</text>
  </g>
</svg>
