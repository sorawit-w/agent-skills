    <text x="140" y="146" font-family="ui-monospace, monospace" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="2">FONT — VT323 (DEFAULT)</text>
    <text x="140" y="180" font-family="VT323, ui-monospace, monospace" font-size="28" fill="#1f2937" text-anchor="middle">Whispers of the Flame</text>

    <text x="140" y="206" font-family="ui-monospace, monospace" font-size="14" fill="#1f2937" text-anchor="middle" font-weight="700" letter-spacing="3">DESIGN SYSTEM</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(790, 220)" fill="#c2410c">
    <rect x="0"  y="10" width="100" height="6"/>
    <rect x="92" y="4"  width="6"   height="6"/>
    <rect x="98" y="10" width="6"   height="6"/>
    <rect x="92" y="16" width="6"   height="6"/>
  </g>

  <!-- =========== PANEL 3: OUTPUT scene =========== -->
  <g transform="translate(920, 130)">
    <rect x="0" y="0" width="280" height="220" fill="#264653" stroke="#1f2937" stroke-width="4"/>

    <!-- sky -->
    <rect x="4" y="4" width="272" height="100" fill="#5d8aa8"/>
    <rect x="4" y="98" width="272" height="6" fill="#b1542a"/>
