  <g transform="translate(490, 130)">
    <rect x="0" y="0" width="280" height="220" fill="#f3e7c9" stroke="#b79a5c" stroke-width="4"/>
    <rect x="0" y="0" width="280" height="8" fill="#c2410c"/>

    <text x="140" y="28" font-family="ui-monospace, monospace" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="2">PALETTE — WARM COASTAL</text>
    <g transform="translate(20, 36)">
      <rect x="0"   y="0" width="40" height="28" fill="#d9c2a3"/>
      <rect x="44"  y="0" width="40" height="28" fill="#5d8aa8"/>
      <rect x="88"  y="0" width="40" height="28" fill="#f7f0e0"/>
