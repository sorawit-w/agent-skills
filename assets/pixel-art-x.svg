      <rect x="80"  y="100" width="22" height="6"/>
      <rect x="82"  y="98"  width="18" height="2"/>
      <rect x="90"  y="86"  width="2"  height="14"/>
      <rect x="86"  y="88"  width="12" height="2"/>
      <rect x="124" y="98"  width="26" height="6"/>
      <rect x="126" y="96"  width="22" height="2"/>
      <rect x="134" y="80"  width="2"  height="18"/>
      <rect x="128" y="84"  width="14" height="2"/>
      <rect x="130" y="90"  width="10" height="2"/>
      <rect x="166" y="100" width="22" height="6"/>
      <rect x="168" y="98"  width="18" height="2"/>
      <rect x="174" y="86"  width="2"  height="14"/>
      <rect x="170" y="88"  width="12" height="2"/>
