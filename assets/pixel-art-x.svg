      <rect x="0"  y="0"  width="272" height="20" fill="#8b6f3c"/>
      <rect x="0"  y="0"  width="272" height="3"  fill="#a8784a"/>
      <rect x="40"  y="3" width="2" height="17" fill="#6b5530"/>
      <rect x="90"  y="3" width="2" height="17" fill="#6b5530"/>
      <rect x="140" y="3" width="2" height="17" fill="#6b5530"/>
      <rect x="190" y="3" width="2" height="17" fill="#6b5530"/>
