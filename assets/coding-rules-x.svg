<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="coding-rules — one author's operating system for agentic coding" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>coding-rules — one author's operating system for agentic coding</title>
  <desc>Pixel-art X-share banner for the coding-rules Claude Code plugin: title at top, three labeled cards across the middle (DIRECTIVE / HARD RULES / CAVEAT). Center card is highlighted with a six-item rule checklist; right card carries a prominent OPINIONATED — READ FIRST stamp.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-cr-x" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan-cr-x)"/>

  <!-- =========== TITLE BLOCK (top, centered) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="800" y="50" font-size="34" font-weight="700" fill="#1f2937" letter-spacing="2">coding-rules</text>
    <text x="800" y="78" font-size="15" fill="#6b7280">one author's operating system for agentic coding</text>
    <text x="800" y="100" font-size="10" fill="#9ca3af" letter-spacing="4">DIRECTIVE · RULES · CAVEAT</text>
  </g>

  <!-- =========== CARD 1: DIRECTIVE (Prime Directive) =========== -->
  <!-- Position: x=40, y=130, w=460, h=270 -->
  <g>
    <!-- card paper -->
    <rect x="40"  y="130" width="460" height="270" fill="#f3e7c9"/>
    <rect x="40"  y="130" width="460" height="4"   fill="#b79a5c"/>
    <rect x="40"  y="396" width="460" height="4"   fill="#b79a5c"/>
    <rect x="40"  y="130" width="4"   height="270" fill="#b79a5c"/>
    <rect x="496" y="130" width="4"   height="270" fill="#b79a5c"/>
    <!-- clip at top -->
    <rect x="220" y="120" width="60" height="14" fill="#6b7280"/>
    <rect x="230" y="114" width="40" height="6"  fill="#6b7280"/>

    <!-- title bar -->
    <rect x="46" y="142" width="448" height="30" fill="#fdf7ea"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1f2937">
      <text x="62" y="163" font-size="16" font-weight="700">PRIME DIRECTIVE</text>
    </g>
    <rect x="46" y="172" width="448" height="2" fill="#b79a5c"/>

    <!-- directive lines -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#1f2937">
      <text x="62" y="216">Clarity over cleverness.</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#1f2937">
      <text x="62" y="252">Safety over speed.</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" fill="#c2410c">
      <text x="62" y="290">Never leave the repo broken.</text>
    </g>

    <!-- footer prompt -->
    <rect x="46" y="354" width="448" height="2" fill="#b79a5c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b7280" letter-spacing="1">
      <text x="62" y="376">priority: user &gt; project &gt; agent &gt; this</text>
    </g>

    <!-- section label -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
      <text x="270" y="430" font-size="11" fill="#1f2937" letter-spacing="4">DIRECTIVE</text>
    </g>
  </g>

  <!-- =========== CARD 2: HARD RULES (highlighted center) =========== -->
  <!-- Position: x=560, y=130, w=480, h=270 -->
  <g>
    <!-- outer tile -->
    <rect x="560" y="130" width="480" height="270" fill="#ffffff"/>
    <rect x="560" y="130" width="480" height="4"   fill="#c9b58a"/>
    <rect x="560" y="396" width="480" height="4"   fill="#c9b58a"/>
    <rect x="560" y="130" width="4"   height="270" fill="#c9b58a"/>
    <rect x="1036" y="130" width="4"  height="270" fill="#c9b58a"/>
    <!-- inner panel -->
    <rect x="568" y="138" width="464" height="254" fill="#fdf7ea"/>

    <!-- title bar -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="582" y="166" font-size="16" font-weight="700" fill="#1f2937" letter-spacing="1">HARD RULES</text>
      <text x="1018" y="166" font-size="10" fill="#9ca3af" text-anchor="end" letter-spacing="2">EVERY TASK</text>
    </g>
    <rect x="580" y="176" width="440" height="2" fill="#c9b58a"/>

    <!-- Rule 1 -->
    <g>
      <rect x="592" y="196" width="11" height="11" fill="#fde68a"/>
      <rect x="592" y="196" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="205" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="196" width="2"  height="11" fill="#c2410c"/>
      <rect x="601" y="196" width="2"  height="11" fill="#c2410c"/>
      <!-- check -->
      <rect x="594" y="201" width="2" height="2" fill="#c2410c"/>
      <rect x="596" y="203" width="2" height="2" fill="#c2410c"/>
      <rect x="598" y="201" width="2" height="2" fill="#c2410c"/>
      <rect x="600" y="199" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#1f2937" font-weight="700">
        <text x="616" y="206">never work on protected branches</text>
      </g>
    </g>

    <!-- Rule 2 -->
    <g>
      <rect x="592" y="220" width="11" height="11" fill="#fde68a"/>
      <rect x="592" y="220" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="229" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="220" width="2"  height="11" fill="#c2410c"/>
      <rect x="601" y="220" width="2"  height="11" fill="#c2410c"/>
      <rect x="594" y="225" width="2" height="2" fill="#c2410c"/>
      <rect x="596" y="227" width="2" height="2" fill="#c2410c"/>
      <rect x="598" y="225" width="2" height="2" fill="#c2410c"/>
      <rect x="600" y="223" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#1f2937" font-weight="700">
        <text x="616" y="230">commit after each piece of work</text>
      </g>
    </g>

    <!-- Rule 3 -->
    <g>
      <rect x="592" y="244" width="11" height="11" fill="#fde68a"/>
      <rect x="592" y="244" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="253" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="244" width="2"  height="11" fill="#c2410c"/>
      <rect x="601" y="244" width="2"  height="11" fill="#c2410c"/>
      <rect x="594" y="249" width="2" height="2" fill="#c2410c"/>
      <rect x="596" y="251" width="2" height="2" fill="#c2410c"/>
      <rect x="598" y="249" width="2" height="2" fill="#c2410c"/>
      <rect x="600" y="247" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#1f2937" font-weight="700">
        <text x="616" y="254">verify with fresh evidence</text>
      </g>
    </g>

    <!-- Rule 4 -->
    <g>
      <rect x="592" y="268" width="11" height="11" fill="#fde68a"/>
      <rect x="592" y="268" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="277" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="268" width="2"  height="11" fill="#c2410c"/>
      <rect x="601" y="268" width="2"  height="11" fill="#c2410c"/>
      <rect x="594" y="273" width="2" height="2" fill="#c2410c"/>
      <rect x="596" y="275" width="2" height="2" fill="#c2410c"/>
      <rect x="598" y="273" width="2" height="2" fill="#c2410c"/>
      <rect x="600" y="271" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#1f2937" font-weight="700">
        <text x="616" y="278">clean up spawned processes</text>
      </g>
    </g>

    <!-- Rule 5 -->
    <g>
      <rect x="592" y="292" width="11" height="11" fill="#fde68a"/>
      <rect x="592" y="292" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="301" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="292" width="2"  height="11" fill="#c2410c"/>
      <rect x="601" y="292" width="2"  height="11" fill="#c2410c"/>
      <rect x="594" y="297" width="2" height="2" fill="#c2410c"/>
      <rect x="596" y="299" width="2" height="2" fill="#c2410c"/>
      <rect x="598" y="297" width="2" height="2" fill="#c2410c"/>
      <rect x="600" y="295" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#1f2937" font-weight="700">
        <text x="616" y="302">ambiguity before cost</text>
      </g>
    </g>

    <!-- Rule 6 -->
    <g>
      <rect x="592" y="316" width="11" height="11" fill="#fde68a"/>
      <rect x="592" y="316" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="325" width="11" height="2"  fill="#c2410c"/>
      <rect x="592" y="316" width="2"  height="11" fill="#c2410c"/>
      <rect x="601" y="316" width="2"  height="11" fill="#c2410c"/>
      <rect x="594" y="321" width="2" height="2" fill="#c2410c"/>
      <rect x="596" y="323" width="2" height="2" fill="#c2410c"/>
      <rect x="598" y="321" width="2" height="2" fill="#c2410c"/>
      <rect x="600" y="319" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#1f2937" font-weight="700">
        <text x="616" y="326">no preamble. evidence first.</text>
      </g>
    </g>

    <!-- footer caption -->
    <rect x="580" y="354" width="440" height="2" fill="#c9b58a"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6b7280" letter-spacing="1">
      <text x="592" y="376">routed by workflow file. methodology &gt; scripts.</text>
    </g>

    <!-- section label -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
      <text x="800" y="430" font-size="11" fill="#c2410c" font-weight="700" letter-spacing="4">RULES</text>
    </g>
  </g>

  <!-- =========== CARD 3: CAVEAT (read-first stamp) =========== -->
  <!-- Position: x=1100, y=130, w=460, h=270 -->
  <g>
    <!-- card paper -->
    <rect x="1100" y="130" width="460" height="270" fill="#f3e7c9"/>
    <rect x="1100" y="130" width="460" height="4"   fill="#b79a5c"/>
    <rect x="1100" y="396" width="460" height="4"   fill="#b79a5c"/>
    <rect x="1100" y="130" width="4"   height="270" fill="#b79a5c"/>
    <rect x="1556" y="130" width="4"   height="270" fill="#b79a5c"/>

    <!-- title bar -->
    <rect x="1106" y="142" width="448" height="30" fill="#fdf7ea"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1f2937">
      <text x="1122" y="163" font-size="16" font-weight="700">CAVEAT</text>
    </g>
    <rect x="1106" y="172" width="448" height="2" fill="#b79a5c"/>

    <!-- The big OPINIONATED stamp (rotated -8deg) -->
    <g transform="translate(1330, 250) rotate(-8)">
      <!-- outer border -->
      <rect x="-130" y="-50" width="260" height="100" fill="none" stroke="#c2410c" stroke-width="3"/>
      <!-- inner border -->
      <rect x="-122" y="-42" width="244" height="84"  fill="none" stroke="#c2410c" stroke-width="2"/>
      <!-- text -->
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle" fill="#c2410c">
        <text x="0" y="-8" font-size="22" font-weight="700" letter-spacing="3">OPINIONATED</text>
        <text x="0" y="26" font-size="16" font-weight="700" letter-spacing="4">READ  FIRST</text>
      </g>
    </g>

    <!-- footer notes -->
    <rect x="1106" y="334" width="448" height="2" fill="#b79a5c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1f2937" letter-spacing="1">
      <text x="1122" y="358">read BOOTSTRAP.md end-to-end</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c2410c" letter-spacing="1" font-weight="700">
      <text x="1122" y="380">fork before adopting.</text>
    </g>

    <!-- section label -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
      <text x="1330" y="430" font-size="11" fill="#1f2937" letter-spacing="4">CAVEAT</text>
    </g>
  </g>

</svg>
