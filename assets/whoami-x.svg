<svg viewBox="0 0 1600 467" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="whoami — learn who you are working with, then build a collaboration character sheet" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
<title>whoami</title>
<desc>Pixel-art banner, three panels left to right: a sparse what-I-know card, a six-dial interview card, and a character-sheet output card.</desc>
<defs>
<pattern id="paperx" width="8" height="6" patternUnits="userSpaceOnUse">
<rect width="8" height="6" fill="#f5efe6"/>
<rect width="8" height="2" fill="#eadfcf"/>
</pattern>
</defs>
<rect width="1600" height="467" fill="url(#paperx)"/>

<text x="60" y="64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="44" font-weight="700" fill="#1f2937">whoami</text>
<text x="62" y="94" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#6b7280">know who you're working with</text>

<!-- LEFT CARD -->
<rect x="60" y="120" width="430" height="250" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
<rect x="60" y="120" width="430" height="32" fill="#1f2937"/>
<text x="275" y="141" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="3" fill="#f5efe6">WHAT I KNOW</text>
<text x="104" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="96" font-weight="700" fill="#eadfcf">?</text>
<text x="214" y="296" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="68" font-weight="700" fill="#ddd0b6">?</text>
<text x="300" y="240" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="52" font-weight="700" fill="#eadfcf">?</text>
<rect x="90" y="312" width="370" height="11" fill="#eadfcf"/>
<rect x="90" y="334" width="270" height="11" fill="#eadfcf"/>

<!-- arrow left to center -->
<g fill="#6b7280">
<rect x="506" y="240" width="42" height="10"/>
<rect x="540" y="232" width="9" height="9"/>
<rect x="540" y="249" width="9" height="9"/>
<rect x="548" y="240" width="9" height="10"/>
</g>

