<rect x="615" y="359" width="370" height="3" fill="#d8c79b"/><rect x="798" y="354" width="4" height="13" fill="#b79a5c"/><rect x="800" y="359" width="116" height="3" fill="#c2410c"/><rect x="909" y="353" width="14" height="14" fill="#c2410c"/>
</g>

