<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="business-model-canvas — nine blocks, honestly filled" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>business-model-canvas — nine blocks, honestly filled</title>
  <desc>Pixel-art banner for the business-model-canvas Claude Code plugin: title at top, a large nine-block Osterwalder canvas grid in the canonical layout (Key Partners, Key Activities and Key Resources, Value Propositions, Customer Relationships and Channels, Customer Segments on the top; Cost Structure and Revenue Streams on the bottom). A rightward customer-first arrow runs along the top of the grid from Customer Segments back to Key Partners. A stress-tests warning card sits beside the canvas with three flagged assumptions. Footer labels the three phases: DISCOVER · CONSISTENCY · STRESS TESTS.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-bmc-li" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#scan-bmc-li)"/>

  <!-- =========== TITLE BLOCK =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="600" y="72" font-size="44" font-weight="700" fill="#1f2937" letter-spacing="2">business-model-canvas</text>
    <text x="600" y="108" font-size="20" fill="#6b7280">nine blocks, honestly filled.</text>
  </g>

  <!-- =========== CUSTOMER-FIRST ARROW (above grid) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- arrow running right-to-left above the canvas -->
    <rect x="120"  y="158" width="740" height="4" fill="#047857"/>
    <!-- arrow head on left -->
    <rect x="108"  y="154" width="4" height="12" fill="#047857"/>
    <rect x="104"  y="156" width="4" height="8"  fill="#047857"/>
    <rect x="100"  y="158" width="4" height="4"  fill="#047857"/>
    <rect x="112"  y="150" width="4" height="20" fill="#047857"/>
    <text x="490" y="148" font-size="13" font-weight="700" fill="#047857" letter-spacing="3" text-anchor="middle">CUSTOMER-FIRST REASONING ORDER</text>
  </g>

  <!-- =========== NINE-BLOCK CANVAS GRID =========== -->
  <!-- grid: starts at x=80, y=170, 820 wide, 340 tall -->
  <!-- top row: 5 columns, 820/5 = 164 wide each, height 260 -->
  <!-- bottom row: 2 blocks across 820 wide, height 80 -->

  <!-- outer frame -->
  <rect x="80" y="170" width="820" height="340" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>

  <!-- KEY PARTNERS (col 1, full height = 260) -->
  <g>
    <rect x="80" y="170" width="164" height="260" fill="#fef3c7"/>
    <rect x="80" y="170" width="164" height="8"   fill="#d97706"/>
    <text x="92" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#78350f" letter-spacing="2">KEY PARTNERS</text>
    <!-- bullet lines -->
    <rect x="92" y="218" width="108" height="3" fill="#d97706"/>
    <rect x="92" y="230" width="122" height="3" fill="#d97706"/>
    <rect x="92" y="242" width="96"  height="3" fill="#d97706"/>
    <rect x="92" y="260" width="132" height="3" fill="#d97706"/>
    <!-- handshake glyph -->
    <g transform="translate(98, 360)">
      <rect x="0"  y="10" width="20" height="6" fill="#92400e"/>
      <rect x="18" y="6"  width="6"  height="14" fill="#92400e"/>
      <rect x="22" y="10" width="18" height="6" fill="#92400e"/>
      <rect x="4"  y="4"  width="4"  height="10" fill="#92400e"/>
      <rect x="32" y="4"  width="4"  height="10" fill="#92400e"/>
    </g>
  </g>

  <!-- KEY ACTIVITIES (col 2, top, height 126) -->
  <g>
    <rect x="244" y="170" width="164" height="130" fill="#dbeafe"/>
    <rect x="244" y="170" width="164" height="8"   fill="#1d4ed8"/>
    <text x="256" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="2">KEY ACTIVITIES</text>
    <rect x="256" y="218" width="120" height="3" fill="#1d4ed8"/>
    <rect x="256" y="230" width="96"  height="3" fill="#1d4ed8"/>
    <rect x="256" y="242" width="140" height="3" fill="#1d4ed8"/>
    <rect x="256" y="254" width="110" height="3" fill="#1d4ed8"/>
  </g>

  <!-- KEY RESOURCES (col 2, bottom) -->
  <g>
    <rect x="244" y="300" width="164" height="130" fill="#dbeafe"/>
    <rect x="244" y="300" width="164" height="8"   fill="#1d4ed8"/>
    <text x="256" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="2">KEY RESOURCES</text>
    <rect x="256" y="348" width="130" height="3" fill="#1d4ed8"/>
    <rect x="256" y="360" width="108" height="3" fill="#1d4ed8"/>
    <rect x="256" y="372" width="120" height="3" fill="#1d4ed8"/>
    <rect x="256" y="384" width="96"  height="3" fill="#1d4ed8"/>
  </g>

  <!-- VALUE PROPOSITIONS (col 3, full height) -->
  <g>
    <rect x="408" y="170" width="164" height="260" fill="#fce7f3"/>
    <rect x="408" y="170" width="164" height="8"   fill="#be185d"/>
    <text x="420" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#9d174d" letter-spacing="2">VALUE PROPOSITIONS</text>
    <!-- gift box glyph -->
    <g transform="translate(450, 230)">
      <rect x="0"  y="22" width="64" height="36" fill="#be185d"/>
      <rect x="0"  y="18" width="64" height="8"  fill="#db2777"/>
      <rect x="28" y="18" width="8"  height="40" fill="#fce7f3"/>
      <rect x="24" y="10" width="6"  height="8"  fill="#db2777"/>
      <rect x="34" y="10" width="6"  height="8"  fill="#db2777"/>
      <rect x="30" y="6"  width="4"  height="4"  fill="#db2777"/>
    </g>
    <rect x="420" y="320" width="140" height="3" fill="#be185d"/>
    <rect x="420" y="332" width="122" height="3" fill="#be185d"/>
    <rect x="420" y="344" width="134" height="3" fill="#be185d"/>
    <rect x="420" y="362" width="120" height="3" fill="#be185d"/>
    <rect x="420" y="374" width="110" height="3" fill="#be185d"/>
    <rect x="420" y="386" width="140" height="3" fill="#be185d"/>
  </g>

  <!-- CUSTOMER RELATIONSHIPS (col 4, top) -->
  <g>
    <rect x="572" y="170" width="164" height="130" fill="#e0e7ff"/>
    <rect x="572" y="170" width="164" height="8"   fill="#4338ca"/>
    <text x="584" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#312e81" letter-spacing="2">CUSTOMER RELATIONSHIPS</text>
    <rect x="584" y="218" width="120" height="3" fill="#4338ca"/>
    <rect x="584" y="230" width="100" height="3" fill="#4338ca"/>
    <rect x="584" y="242" width="130" height="3" fill="#4338ca"/>
    <rect x="584" y="254" width="94"  height="3" fill="#4338ca"/>
  </g>

  <!-- CHANNELS (col 4, bottom) -->
  <g>
    <rect x="572" y="300" width="164" height="130" fill="#e0e7ff"/>
    <rect x="572" y="300" width="164" height="8"   fill="#4338ca"/>
    <text x="584" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#312e81" letter-spacing="2">CHANNELS</text>
    <rect x="584" y="348" width="128" height="3" fill="#4338ca"/>
    <rect x="584" y="360" width="108" height="3" fill="#4338ca"/>
    <rect x="584" y="372" width="120" height="3" fill="#4338ca"/>
    <rect x="584" y="384" width="92"  height="3" fill="#4338ca"/>
  </g>

  <!-- CUSTOMER SEGMENTS (col 5, full height) - highlighted as customer-first -->
  <g>
    <rect x="736" y="170" width="164" height="260" fill="#d1fae5"/>
    <rect x="736" y="170" width="164" height="8"   fill="#047857"/>
    <text x="748" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#064e3b" letter-spacing="2">CUSTOMER SEGMENTS</text>
    <!-- START HERE badge -->
    <g transform="translate(776, 220)">
      <rect x="0"  y="0"  width="88" height="20" fill="#047857"/>
      <text x="44" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#d1fae5" text-anchor="middle">START HERE</text>
    </g>
    <!-- people icons -->
    <g transform="translate(758, 260)" fill="#047857">
      <!-- person 1 -->
      <rect x="0"  y="4" width="12" height="12"/>
      <rect x="-2" y="18" width="16" height="16"/>
      <!-- person 2 -->
      <rect x="22" y="4" width="12" height="12"/>
      <rect x="20" y="18" width="16" height="16"/>
      <!-- person 3 -->
      <rect x="44" y="4" width="12" height="12"/>
      <rect x="42" y="18" width="16" height="16"/>
      <!-- person 4 -->
      <rect x="66" y="4" width="12" height="12"/>
      <rect x="64" y="18" width="16" height="16"/>
    </g>
    <rect x="748" y="320" width="130" height="3" fill="#047857"/>
    <rect x="748" y="332" width="110" height="3" fill="#047857"/>
    <rect x="748" y="344" width="124" height="3" fill="#047857"/>
    <rect x="748" y="362" width="100" height="3" fill="#047857"/>
    <rect x="748" y="374" width="134" height="3" fill="#047857"/>
  </g>

  <!-- COST STRUCTURE (bottom-left) -->
  <g>
    <rect x="80" y="430" width="410" height="80" fill="#fee2e2"/>
    <rect x="80" y="430" width="410" height="8"  fill="#b91c1c"/>
    <text x="92" y="460" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#7f1d1d" letter-spacing="2">COST STRUCTURE</text>
    <rect x="92" y="476" width="220" height="3" fill="#b91c1c"/>
    <rect x="92" y="488" width="196" height="3" fill="#b91c1c"/>
    <rect x="92" y="500" width="240" height="3" fill="#b91c1c"/>
    <!-- coin stack -->
    <g transform="translate(390, 470)">
      <rect x="0"  y="26" width="28" height="6" fill="#b91c1c"/>
      <rect x="2"  y="18" width="24" height="6" fill="#b91c1c"/>
      <rect x="4"  y="10" width="20" height="6" fill="#b91c1c"/>
      <rect x="6"  y="2"  width="16" height="6" fill="#b91c1c"/>
    </g>
  </g>

  <!-- REVENUE STREAMS (bottom-right) -->
  <g>
    <rect x="490" y="430" width="410" height="80" fill="#d1fae5"/>
    <rect x="490" y="430" width="410" height="8"  fill="#047857"/>
    <text x="502" y="460" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#064e3b" letter-spacing="2">REVENUE STREAMS</text>
    <rect x="502" y="476" width="230" height="3" fill="#047857"/>
    <rect x="502" y="488" width="186" height="3" fill="#047857"/>
    <rect x="502" y="500" width="210" height="3" fill="#047857"/>
    <!-- up-arrow glyph -->
    <g transform="translate(800, 470)">
      <rect x="12" y="0"  width="6"  height="32" fill="#047857"/>
      <rect x="6"  y="6"  width="18" height="4"  fill="#047857"/>
      <rect x="0"  y="12" width="30" height="4"  fill="#047857"/>
    </g>
  </g>

  <!-- =========== STRESS TESTS CARD (right side) =========== -->
  <g transform="translate(928, 170)">
    <rect x="0" y="0" width="200" height="340" fill="#fffbeb" stroke="#d97706" stroke-width="3"/>
    <rect x="0" y="0" width="200" height="32" fill="#d97706"/>
    <text x="100" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#fffbeb" text-anchor="middle" letter-spacing="2">STRESS TESTS</text>

    <!-- warning triangle glyph -->
    <g transform="translate(86, 48)" fill="#d97706">
      <rect x="12" y="0"  width="4"  height="4"/>
      <rect x="10" y="4"  width="8"  height="4"/>
      <rect x="8"  y="8"  width="12" height="4"/>
      <rect x="6"  y="12" width="16" height="4"/>
      <rect x="4"  y="16" width="20" height="4"/>
      <rect x="2"  y="20" width="24" height="4"/>
      <rect x="13" y="8"  width="2"  height="8" fill="#fffbeb"/>
      <rect x="13" y="18" width="2"  height="2" fill="#fffbeb"/>
    </g>

    <!-- assumption cards -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#78350f">
      <rect x="16" y="84"  width="168" height="60" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
      <text x="24" y="102">Assumption #1</text>
      <rect x="24" y="110" width="140" height="3" fill="#d97706"/>
      <rect x="24" y="118" width="120" height="3" fill="#d97706"/>
      <text x="24" y="136" font-size="8" fill="#b91c1c">▲ kills the business</text>

      <rect x="16" y="156" width="168" height="60" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
      <text x="24" y="174">Assumption #2</text>
      <rect x="24" y="182" width="130" height="3" fill="#d97706"/>
      <rect x="24" y="190" width="110" height="3" fill="#d97706"/>
      <text x="24" y="208" font-size="8" fill="#92400e">● experiment this week</text>

      <rect x="16" y="228" width="168" height="60" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
      <text x="24" y="246">Assumption #3</text>
      <rect x="24" y="254" width="144" height="3" fill="#d97706"/>
      <rect x="24" y="262" width="100" height="3" fill="#d97706"/>
      <text x="24" y="280" font-size="8" fill="#92400e">● experiment this week</text>
    </g>

    <text x="100" y="316" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#78350f" text-anchor="middle">unknowns are data,</text>
    <text x="100" y="328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#78350f" text-anchor="middle">not confidence filler.</text>
  </g>

  <!-- =========== PHASE RIBBON (bottom) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="80"  y="548" width="346" height="42" fill="#fde68a"/>
    <rect x="80"  y="548" width="346" height="8"  fill="#d97706"/>
    <text x="253" y="578" font-size="14" font-weight="700" fill="#78350f" letter-spacing="4" text-anchor="middle">1 · DISCOVER</text>

    <rect x="426" y="548" width="348" height="42" fill="#dbeafe"/>
    <rect x="426" y="548" width="348" height="8"  fill="#1d4ed8"/>
    <text x="600" y="578" font-size="14" font-weight="700" fill="#1e3a8a" letter-spacing="4" text-anchor="middle">2 · CONSISTENCY</text>

    <rect x="774" y="548" width="354" height="42" fill="#d1fae5"/>
    <rect x="774" y="548" width="354" height="8"  fill="#047857"/>
    <text x="951" y="578" font-size="14" font-weight="700" fill="#064e3b" letter-spacing="4" text-anchor="middle">3 · STRESS TEST</text>
  </g>

  <!-- footer note -->
  <text x="600" y="614" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#9ca3af" text-anchor="middle">business-model.md · business-model.html · zero network deps</text>
</svg>
