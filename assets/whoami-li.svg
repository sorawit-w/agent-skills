<g>
<rect x="856" y="343" width="256" height="3" fill="#d8c79b"/><rect x="982" y="338" width="4" height="13" fill="#b79a5c"/><rect x="984" y="343" width="56" height="3" fill="#c2410c"/><rect x="1033" y="337" width="14" height="14" fill="#c2410c"/>
