<svg viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="whoami — learn who you are working with, then build a collaboration character sheet" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
<title>whoami</title>
<desc>Pixel-art banner, three panels left to right: a sparse what-I-know card, a six-dial interview card, and a character-sheet output card.</desc>
<defs>
<pattern id="paper" width="8" height="6" patternUnits="userSpaceOnUse">
<rect width="8" height="6" fill="#f5efe6"/>
<rect width="8" height="2" fill="#eadfcf"/>
</pattern>
</defs>
<rect width="1200" height="627" fill="url(#paper)"/>

<text x="600" y="76" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="46" font-weight="700" fill="#1f2937">whoami</text>
<text x="600" y="107" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" fill="#6b7280">know who you're working with</text>

<!-- LEFT CARD: what I know -->
<rect x="64" y="150" width="304" height="320" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
<rect x="64" y="150" width="304" height="34" fill="#1f2937"/>
<text x="216" y="172" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="3" fill="#f5efe6">WHAT I KNOW</text>
<text x="108" y="298" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="96" font-weight="700" fill="#eadfcf">?</text>
<text x="206" y="338" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="72" font-weight="700" fill="#ddd0b6">?</text>
<text x="280" y="276" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="56" font-weight="700" fill="#eadfcf">?</text>
<rect x="92" y="378" width="248" height="11" fill="#eadfcf"/>
<rect x="92" y="404" width="176" height="11" fill="#eadfcf"/>
<rect x="92" y="430" width="214" height="11" fill="#eadfcf"/>

