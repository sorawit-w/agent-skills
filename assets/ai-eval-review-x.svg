      <text x="1167" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" fill="#15803d" text-anchor="middle">success defined</text>

      <rect x="1240" y="164" width="138" height="28" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="1309" y="175" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#b91c1c" text-anchor="middle">B2 — [GAP]</text>
      <text x="1309" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" font-weight="700" fill="#b91c1c" text-anchor="middle">single-annotator labels</text>

      <rect x="1382" y="164" width="138" height="28" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
      <text x="1451" y="175" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#15803d" text-anchor="middle">B3 — DONE</text>
      <text x="1451" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" fill="#15803d" text-anchor="middle">offline eval set</text>

      <rect x="1098" y="196" width="138" height="28" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
      <text x="1167" y="207" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#15803d" text-anchor="middle">B4 — DONE</text>
      <text x="1167" y="218" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" fill="#15803d" text-anchor="middle">online metrics</text>

      <rect x="1240" y="196" width="138" height="28" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="1309" y="207" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#b91c1c" text-anchor="middle">B5 — [GAP]</text>
      <text x="1309" y="218" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" font-weight="700" fill="#b91c1c" text-anchor="middle">no cohort dashboard</text>

      <rect x="1382" y="196" width="138" height="28" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="1451" y="207" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#b91c1c" text-anchor="middle">B6 — [GAP]</text>
      <text x="1451" y="218" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="6" font-weight="700" fill="#b91c1c" text-anchor="middle">no adversarial eval</text>

      <rect x="1098" y="228" width="422" height="28" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
      <text x="1309" y="239" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="700" fill="#b91c1c" text-anchor="middle">B7 — [GAP] no drift detector</text>
