    <rect x="1080" y="120" width="460" height="220" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
    <rect x="1080" y="120" width="460" height="28" fill="#1f2937"/>
    <text x="1310" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#fdf7ea" text-anchor="middle" letter-spacing="2">EVAL REVIEW ARTIFACT</text>

