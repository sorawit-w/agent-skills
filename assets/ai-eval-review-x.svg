    <rect x="460" y="120" width="560" height="28" fill="#0e7490"/>
    <text x="740" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#f5efe6" text-anchor="middle" letter-spacing="2">SEVEN-BLOCK EVAL WALK</text>

    <!-- 7 block chips -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <!-- Top row -->
      <rect x="478" y="162" width="170" height="46" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
      <rect x="478" y="162" width="170" height="12" fill="#92400e"/>
      <text x="563" y="172" font-size="9"  font-weight="700" fill="#fef3c7" text-anchor="middle" letter-spacing="2">BLOCK 1</text>
      <text x="563" y="194" font-size="9"  font-weight="700" fill="#92400e" text-anchor="middle">NECESSITY + SUCCESS</text>

      <rect x="654" y="162" width="170" height="46" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <rect x="654" y="162" width="170" height="12" fill="#1e3a8a"/>
      <text x="739" y="172" font-size="9"  font-weight="700" fill="#dbeafe" text-anchor="middle" letter-spacing="2">BLOCK 2</text>
      <text x="739" y="194" font-size="9"  font-weight="700" fill="#1e3a8a" text-anchor="middle">GROUND TRUTH</text>

      <rect x="830" y="162" width="170" height="46" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <rect x="830" y="162" width="170" height="12" fill="#1e3a8a"/>
      <text x="915" y="172" font-size="9"  font-weight="700" fill="#dbeafe" text-anchor="middle" letter-spacing="2">BLOCK 3</text>
      <text x="915" y="194" font-size="9"  font-weight="700" fill="#1e3a8a" text-anchor="middle">OFFLINE EVAL</text>

      <!-- Middle row — Block 5+6 accented teal -->
      <rect x="478" y="216" width="170" height="46" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <rect x="478" y="216" width="170" height="12" fill="#1e3a8a"/>
      <text x="563" y="226" font-size="9"  font-weight="700" fill="#dbeafe" text-anchor="middle" letter-spacing="2">BLOCK 4</text>
      <text x="563" y="248" font-size="9"  font-weight="700" fill="#1e3a8a" text-anchor="middle">ONLINE METRICS</text>

      <!-- Block 5 - ACCENTED -->
      <rect x="654" y="216" width="170" height="46" fill="#bae6fd" stroke="#0e7490" stroke-width="2"/>
      <rect x="654" y="216" width="170" height="12" fill="#0e7490"/>
      <text x="739" y="226" font-size="9"  font-weight="700" fill="#bae6fd" text-anchor="middle" letter-spacing="2">BLOCK 5</text>
      <text x="739" y="248" font-size="9"  font-weight="700" fill="#0c4a6e" text-anchor="middle">COHORTS + DI</text>

      <!-- Block 6 - ACCENTED -->
      <rect x="830" y="216" width="170" height="46" fill="#bae6fd" stroke="#0e7490" stroke-width="2"/>
      <rect x="830" y="216" width="170" height="12" fill="#0e7490"/>
      <text x="915" y="226" font-size="9"  font-weight="700" fill="#bae6fd" text-anchor="middle" letter-spacing="2">BLOCK 6</text>
      <text x="915" y="248" font-size="9"  font-weight="700" fill="#0c4a6e" text-anchor="middle">ADVERSARIAL + ROBUST</text>

      <!-- "RESPONSIBLE-AI" tag -->
      <rect x="712" y="204" width="60" height="11" fill="#0e7490"/>
      <text x="742" y="213" font-size="7"  font-weight="700" fill="#bae6fd" text-anchor="middle" letter-spacing="1">RESPONSIBLE-AI</text>

      <!-- Block 7 - full width -->
      <rect x="478" y="270" width="522" height="40" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <rect x="478" y="270" width="522" height="12" fill="#15803d"/>
      <text x="739" y="280" font-size="9"  font-weight="700" fill="#dcfce7" text-anchor="middle" letter-spacing="2">BLOCK 7 — DRIFT DETECTION &amp; MONITORING</text>
      <text x="739" y="302" font-size="9"  font-weight="700" fill="#15803d" text-anchor="middle">is the AI still working tomorrow?</text>
    </g>

    <text x="740" y="328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#6b7280" text-anchor="middle" letter-spacing="2">FIXED REASONING ORDER · 1 → 7</text>
  </g>

  <!-- arrow 2 -->
  <g fill="#0e7490">
    <rect x="1030" y="218" width="32" height="4"/>
    <rect x="1058" y="214" width="4"  height="12"/>
    <rect x="1062" y="216" width="4"  height="8"/>
    <rect x="1066" y="218" width="4"  height="4"/>
  </g>

