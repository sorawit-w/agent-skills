<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="ai-eval-review — Do we have signal for whether this AI actually works?" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>ai-eval-review — Do we have signal for whether this AI actually works?</title>
  <desc>Pixel-art X/Twitter banner for the ai-eval-review Claude Code plugin: title top-left, three-card flow — an AI dashboard with mostly unmeasured metrics, a seven-block eval-design walk with Blocks 5 (cohorts) and 6 (adversarial) accented in teal as the responsible-AI surface, and an eval review artifact with gap chips. Chapter ribbon below.</desc>

  <defs>
    <pattern id="scan-aieval-x" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan-aieval-x)"/>

  <!-- TITLE BLOCK (top-left) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="60" y="56" font-size="38" font-weight="700" fill="#1f2937" letter-spacing="2">ai-eval-review</text>
    <text x="60" y="84" font-size="16" fill="#6b7280">Do we have signal for whether this AI actually works?</text>
  </g>

  <!-- =========== CARD 1 — AI DASHBOARD WITH GAPS =========== -->
  <g>
    <rect x="60" y="120" width="340" height="220" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
    <rect x="60" y="120" width="340" height="28" fill="#1f2937"/>
    <text x="230" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#fdf7ea" text-anchor="middle" letter-spacing="2">PRODUCTION DASHBOARD</text>

    <!-- KPI tiles -->
    <rect x="78" y="166" width="148" height="44" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
    <text x="152" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#15803d" text-anchor="middle">ENGAGEMENT</text>
    <text x="152" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">↑ 72%</text>

    <rect x="234" y="166" width="148" height="44" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
    <text x="308" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">GROUND TRUTH</text>
    <text x="308" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#b91c1c" text-anchor="middle">?</text>

    <rect x="78" y="218" width="148" height="44" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
    <text x="152" y="232" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">PER-COHORT</text>
    <text x="152" y="252" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#b91c1c" text-anchor="middle">?</text>

    <rect x="234" y="218" width="148" height="44" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
    <text x="308" y="232" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">DRIFT</text>
    <text x="308" y="252" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#b91c1c" text-anchor="middle">?</text>

    <rect x="78" y="270" width="304" height="36" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
    <text x="230" y="284" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" font-weight="700" fill="#b91c1c" text-anchor="middle">ADVERSARIAL / ROBUSTNESS</text>
    <text x="230" y="298" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#b91c1c" text-anchor="middle">UNMEASURED</text>

    <text x="230" y="324" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#6b7280" text-anchor="middle" letter-spacing="1">engagement up. is anything else working?</text>
  </g>

  <!-- arrow 1 -->
  <g fill="#6b7280">
    <rect x="410" y="218" width="32" height="4"/>
    <rect x="438" y="214" width="4"  height="12"/>
    <rect x="442" y="216" width="4"  height="8"/>
    <rect x="446" y="218" width="4"  height="4"/>
  </g>

