    <text x="60"   y="430" font-size="11" fill="#1f2937" letter-spacing="1">eval-design-completeness · sibling of ai-ux-review · seven blocks · MD + HTML</text>
    <text x="1540" y="430" font-size="10" fill="#9ca3af" letter-spacing="1" text-anchor="end">informed by HELM / Anthropic / OpenAI Evals · authored from first principles</text>
