      <g transform="translate(32, 36)" fill="#be185d">
        <rect x="6"  y="0"  width="4"  height="8"/>
        <rect x="2"  y="8"  width="12" height="4"/>
        <rect x="0"  y="12" width="16" height="4"/>
        <rect x="10" y="16" width="4"  height="8"/>
        <rect x="4"  y="24" width="8"  height="4"/>
