<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" role="img" aria-label="pitch-deck — investor-ready in one session" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>pitch-deck — investor-ready in one session</title>
  <desc>Pixel-art X/Twitter banner for the pitch-deck Claude Code plugin: title block on the left, a horizontal filmstrip of the 10-slide investor arc on the right, and a cardinal-gate row listing the four non-negotiable slots. Footer: INTAKE · INTERVIEW · BUILD.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-pd-x" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1600" height="467" fill="url(#scan-pd-x)"/>

  <!-- =========== TITLE BLOCK (left) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="64" y="72" font-size="38" font-weight="700" fill="#1f2937" letter-spacing="1">pitch-deck</text>
    <text x="64" y="104" font-size="18" fill="#6b7280">investor-ready in one session.</text>
    <text x="64" y="130" font-size="11" fill="#9ca3af" letter-spacing="3">INTAKE · INTERVIEW · BUILD &amp; SHIP</text>
  </g>

  <!-- summary copy -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#374151">
    <text x="64" y="190" font-size="13" letter-spacing="1">10 slides. 4 cardinal gates.</text>
    <text x="64" y="210" font-size="13" letter-spacing="1">one self-contained HTML file,</text>
    <text x="64" y="230" font-size="13" letter-spacing="1">works on a plane, prints to PDF.</text>
  </g>

  <!-- Gate callout -->
  <g transform="translate(64, 266)">
    <rect x="0" y="0" width="220" height="84" fill="#fffbeb"/>
    <rect x="0" y="0" width="220" height="6" fill="#d97706"/>
    <rect x="0" y="78" width="220" height="6" fill="#d97706"/>
    <rect x="0" y="0" width="6" height="84" fill="#d97706"/>
    <rect x="214" y="0" width="6" height="84" fill="#d97706"/>
    <!-- gate flag icon -->
    <g transform="translate(18, 22)" fill="#b91c1c">
      <rect x="0"  y="0"  width="20" height="12"/>
      <rect x="2"  y="12" width="2"  height="16"/>
    </g>
    <text x="48" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#78350f" letter-spacing="2">CARDINAL GATE</text>
    <text x="48" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#78350f" letter-spacing="1">market · traction · team · ask.</text>
    <text x="48" y="64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#78350f" letter-spacing="1">missing any one = warning slide,</text>
    <text x="48" y="76" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#78350f" letter-spacing="1">deck is not ready to send.</text>
  </g>

  <!-- footer tagline left -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#9ca3af">
    <text x="64" y="420" font-size="11" letter-spacing="3">ZERO NETWORK DEPS · PRINTS TO PDF</text>
  </g>

