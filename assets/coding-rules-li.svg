<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="coding-rules — one author's operating system for agentic coding" shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>coding-rules — one author's operating system for agentic coding</title>
  <desc>Pixel-art banner for the coding-rules Claude Code plugin: title at top, three labeled cards across the middle. DIRECTIVE card (left) shows the three-line Prime Directive on warm paper. HARD RULES card (center, highlighted) shows a checklist with four orange-checked rule items. CAVEAT card (right) shows a prominent "OPINIONATED — READ FIRST" stamp with a fork-before-adopting note. Chapter labels DIRECTIVE · RULES · CAVEAT below.</desc>

  <!-- background: soft warm paper with scanlines -->
  <defs>
    <pattern id="scan-cr" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#f5efe6"/>
      <rect y="6" width="8" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#scan-cr)"/>

  <!-- =========== TITLE BLOCK (top, centered) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="600" y="88" font-size="44" font-weight="700" fill="#1f2937" letter-spacing="2">coding-rules</text>
    <text x="600" y="124" font-size="20" fill="#6b7280">one author's operating system for agentic coding</text>
    <text x="600" y="154" font-size="12" fill="#9ca3af" letter-spacing="4">DIRECTIVE · RULES · CAVEAT</text>
  </g>

  <!-- =========== SECTION LABELS (chapter markers under each card) =========== -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="200" y="578" font-size="13" fill="#1f2937" letter-spacing="4">DIRECTIVE</text>
    <text x="600" y="578" font-size="13" fill="#c2410c" font-weight="700" letter-spacing="4">RULES</text>
    <text x="1000" y="578" font-size="13" fill="#1f2937" letter-spacing="4">CAVEAT</text>
  </g>

  <!-- =========== CARD 1: DIRECTIVE (Prime Directive on warm paper) =========== -->
  <!-- Position: x=70, y=210, w=260, h=320 -->
  <g>
    <!-- card paper -->
    <rect x="70"  y="210" width="260" height="320" fill="#f3e7c9"/>
    <rect x="70"  y="210" width="260" height="5"   fill="#b79a5c"/>
    <rect x="70"  y="525" width="260" height="5"   fill="#b79a5c"/>
    <rect x="70"  y="210" width="5"   height="320" fill="#b79a5c"/>
    <rect x="325" y="210" width="5"   height="320" fill="#b79a5c"/>
    <!-- clip at top -->
    <rect x="170" y="200" width="60" height="14" fill="#6b7280"/>
    <rect x="180" y="194" width="40" height="6"  fill="#6b7280"/>

    <!-- title bar -->
    <rect x="76" y="222" width="248" height="34" fill="#fdf7ea"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1f2937">
      <text x="94" y="245" font-size="18" font-weight="700">PRIME DIRECTIVE</text>
    </g>
    <rect x="76" y="256" width="248" height="2" fill="#b79a5c"/>

    <!-- subtitle -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b7280" letter-spacing="1">
      <text x="94" y="280">priority order, top down</text>
    </g>

    <!-- directive line 1 -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#1f2937">
      <text x="94" y="316">Clarity over</text>
      <text x="94" y="334">cleverness.</text>
    </g>

    <!-- directive line 2 -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#1f2937">
      <text x="94" y="372">Safety over</text>
      <text x="94" y="390">speed.</text>
    </g>

    <!-- directive line 3 -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#c2410c">
      <text x="94" y="428">Never leave</text>
      <text x="94" y="446">the repo</text>
      <text x="94" y="464">broken.</text>
    </g>

    <!-- footer prompt -->
    <rect x="76" y="496" width="248" height="2" fill="#b79a5c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6b7280" letter-spacing="1">
      <text x="94" y="514">user &gt; project &gt; agent &gt; this</text>
    </g>
  </g>

  <!-- =========== ARROW 1 (DIRECTIVE -> RULES) =========== -->
  <g transform="translate(340, 362)" fill="#6b7280">
    <rect x="0"  y="6" width="60" height="6"/>
    <rect x="54" y="0" width="6"  height="6"/>
    <rect x="60" y="6" width="6"  height="6"/>
    <rect x="54" y="12" width="6" height="6"/>
  </g>

  <!-- =========== CARD 2: RULES (highlighted center — checklist) =========== -->
  <!-- Position: x=412, y=210, w=376, h=320 -->
  <g>
    <!-- outer tile -->
    <rect x="412" y="210" width="376" height="320" fill="#ffffff"/>
    <rect x="412" y="210" width="376" height="5"   fill="#c9b58a"/>
    <rect x="412" y="525" width="376" height="5"   fill="#c9b58a"/>
    <rect x="412" y="210" width="5"   height="320" fill="#c9b58a"/>
    <rect x="783" y="210" width="5"   height="320" fill="#c9b58a"/>
    <!-- inner panel -->
    <rect x="422" y="220" width="356" height="300" fill="#fdf7ea"/>

    <!-- title bar -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="440" y="250" font-size="18" font-weight="700" fill="#1f2937" letter-spacing="1">HARD RULES</text>
      <text x="760" y="250" font-size="12" fill="#9ca3af" text-anchor="end" letter-spacing="2">EVERY TASK</text>
    </g>
    <rect x="436" y="262" width="328" height="2" fill="#c9b58a"/>

    <!-- Rule 1: branch off protected -->
    <g>
      <!-- check box -->
      <rect x="448" y="288" width="14" height="14" fill="#fde68a"/>
      <rect x="448" y="288" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="300" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="288" width="2"  height="14" fill="#c2410c"/>
      <rect x="460" y="288" width="2"  height="14" fill="#c2410c"/>
      <!-- check mark -->
      <rect x="451" y="295" width="2" height="2" fill="#c2410c"/>
      <rect x="453" y="297" width="2" height="2" fill="#c2410c"/>
      <rect x="455" y="295" width="2" height="2" fill="#c2410c"/>
      <rect x="457" y="293" width="2" height="2" fill="#c2410c"/>
      <rect x="459" y="291" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1f2937" font-weight="700">
        <text x="476" y="301">never work on protected branches</text>
      </g>
    </g>

    <!-- Rule 2: commit each piece -->
    <g>
      <rect x="448" y="318" width="14" height="14" fill="#fde68a"/>
      <rect x="448" y="318" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="330" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="318" width="2"  height="14" fill="#c2410c"/>
      <rect x="460" y="318" width="2"  height="14" fill="#c2410c"/>
      <rect x="451" y="325" width="2" height="2" fill="#c2410c"/>
      <rect x="453" y="327" width="2" height="2" fill="#c2410c"/>
      <rect x="455" y="325" width="2" height="2" fill="#c2410c"/>
      <rect x="457" y="323" width="2" height="2" fill="#c2410c"/>
      <rect x="459" y="321" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1f2937" font-weight="700">
        <text x="476" y="331">commit after each piece of work</text>
      </g>
    </g>

    <!-- Rule 3: verify with fresh evidence -->
    <g>
      <rect x="448" y="348" width="14" height="14" fill="#fde68a"/>
      <rect x="448" y="348" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="360" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="348" width="2"  height="14" fill="#c2410c"/>
      <rect x="460" y="348" width="2"  height="14" fill="#c2410c"/>
      <rect x="451" y="355" width="2" height="2" fill="#c2410c"/>
      <rect x="453" y="357" width="2" height="2" fill="#c2410c"/>
      <rect x="455" y="355" width="2" height="2" fill="#c2410c"/>
      <rect x="457" y="353" width="2" height="2" fill="#c2410c"/>
      <rect x="459" y="351" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1f2937" font-weight="700">
        <text x="476" y="361">verify with fresh evidence</text>
      </g>
    </g>

    <!-- Rule 4: clean up spawned processes -->
    <g>
      <rect x="448" y="378" width="14" height="14" fill="#fde68a"/>
      <rect x="448" y="378" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="390" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="378" width="2"  height="14" fill="#c2410c"/>
      <rect x="460" y="378" width="2"  height="14" fill="#c2410c"/>
      <rect x="451" y="385" width="2" height="2" fill="#c2410c"/>
      <rect x="453" y="387" width="2" height="2" fill="#c2410c"/>
      <rect x="455" y="385" width="2" height="2" fill="#c2410c"/>
      <rect x="457" y="383" width="2" height="2" fill="#c2410c"/>
      <rect x="459" y="381" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1f2937" font-weight="700">
        <text x="476" y="391">clean up spawned processes</text>
      </g>
    </g>

    <!-- Rule 5: clarify before assuming -->
    <g>
      <rect x="448" y="408" width="14" height="14" fill="#fde68a"/>
      <rect x="448" y="408" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="420" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="408" width="2"  height="14" fill="#c2410c"/>
      <rect x="460" y="408" width="2"  height="14" fill="#c2410c"/>
      <rect x="451" y="415" width="2" height="2" fill="#c2410c"/>
      <rect x="453" y="417" width="2" height="2" fill="#c2410c"/>
      <rect x="455" y="415" width="2" height="2" fill="#c2410c"/>
      <rect x="457" y="413" width="2" height="2" fill="#c2410c"/>
      <rect x="459" y="411" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1f2937" font-weight="700">
        <text x="476" y="421">ambiguity before cost</text>
      </g>
    </g>

    <!-- Rule 6: state what you did with evidence -->
    <g>
      <rect x="448" y="438" width="14" height="14" fill="#fde68a"/>
      <rect x="448" y="438" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="450" width="14" height="2"  fill="#c2410c"/>
      <rect x="448" y="438" width="2"  height="14" fill="#c2410c"/>
      <rect x="460" y="438" width="2"  height="14" fill="#c2410c"/>
      <rect x="451" y="445" width="2" height="2" fill="#c2410c"/>
      <rect x="453" y="447" width="2" height="2" fill="#c2410c"/>
      <rect x="455" y="445" width="2" height="2" fill="#c2410c"/>
      <rect x="457" y="443" width="2" height="2" fill="#c2410c"/>
      <rect x="459" y="441" width="2" height="2" fill="#c2410c"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1f2937" font-weight="700">
        <text x="476" y="451">no preamble, no fluff, evidence</text>
      </g>
    </g>

    <!-- footer caption -->
    <rect x="436" y="488" width="328" height="2" fill="#c9b58a"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6b7280" letter-spacing="1">
      <text x="440" y="506">apply on every task. routed by</text>
      <text x="440" y="518">workflow file. methodology &gt; scripts.</text>
    </g>
  </g>

  <!-- =========== ARROW 2 (RULES -> CAVEAT) =========== -->
  <g transform="translate(798, 362)" fill="#6b7280">
    <rect x="0"  y="6" width="60" height="6"/>
    <rect x="54" y="0" width="6"  height="6"/>
    <rect x="60" y="6" width="6"  height="6"/>
    <rect x="54" y="12" width="6" height="6"/>
  </g>

  <!-- =========== CARD 3: CAVEAT (the read-first opinion stamp) =========== -->
  <!-- Position: x=870, y=210, w=260, h=320 -->
  <g>
    <!-- card paper -->
    <rect x="870"  y="210" width="260" height="320" fill="#f3e7c9"/>
    <rect x="870"  y="210" width="260" height="5"   fill="#b79a5c"/>
    <rect x="870"  y="525" width="260" height="5"   fill="#b79a5c"/>
    <rect x="870"  y="210" width="5"   height="320" fill="#b79a5c"/>
    <rect x="1125" y="210" width="5"   height="320" fill="#b79a5c"/>

    <!-- title bar -->
    <rect x="876" y="222" width="248" height="34" fill="#fdf7ea"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1f2937">
      <text x="894" y="245" font-size="18" font-weight="700">CAVEAT</text>
    </g>
    <rect x="876" y="256" width="248" height="2" fill="#b79a5c"/>

    <!-- subtitle -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b7280" letter-spacing="1">
      <text x="894" y="280">before installing</text>
    </g>

    <!-- The big OPINIONATED stamp (rotated -8deg, warm-orange, double-bordered) -->
    <g transform="translate(1000, 360) rotate(-8)">
      <!-- outer border -->
      <rect x="-90" y="-44" width="180" height="88" fill="none" stroke="#c2410c" stroke-width="3"/>
      <!-- inner border -->
      <rect x="-84" y="-38" width="168" height="76" fill="none" stroke="#c2410c" stroke-width="2"/>
      <!-- text -->
      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle" fill="#c2410c">
        <text x="0" y="-8" font-size="20" font-weight="700" letter-spacing="2">OPINIONATED</text>
        <text x="0" y="22" font-size="14" font-weight="700" letter-spacing="3">READ  FIRST</text>
      </g>
    </g>

    <!-- footer notes -->
    <rect x="876" y="430" width="248" height="2" fill="#b79a5c"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#1f2937" letter-spacing="1">
      <text x="894" y="454">read BOOTSTRAP.md</text>
      <text x="894" y="472">end-to-end first.</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#c2410c" letter-spacing="1" font-weight="700">
      <text x="894" y="498">fork before adopting.</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6b7280" letter-spacing="1">
      <text x="894" y="514">your judgment is the point.</text>
    </g>
  </g>

</svg>
