<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 467" width="1600" height="467"
     role="img" aria-label="ghostwriter — drafts messages sent as you, in your voice. An incoming message and its context go in; a voice fingerprint with a ban-list lint runs in the center; one ready-to-send draft in your voice comes out."
     shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>ghostwriter</title>
  <desc>Three panels: an incoming message with channel and relationship context, a warm-accent voice fingerprint with sample-precedence and AI-tell lint, and a single ready-to-copy draft signed as the user.</desc>
  <defs>
    <pattern id="scanx" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#f5efe6"/>
      <rect width="6" height="2" fill="#eadfcf"/>
    </pattern>
  </defs>

  <rect width="1600" height="467" fill="url(#scanx)"/>

  <!-- Title top-left -->
  <text x="70" y="78" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="42" font-weight="bold" fill="#1f2937" letter-spacing="2">GHOSTWRITER</text>
  <text x="72" y="110" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="18" fill="#6b7280">messages in your voice — the writer leaves no trace</text>

  <!-- ===== Left card: INCOMING + CONTEXT ===== -->
  <g>
    <rect x="70" y="150" width="330" height="230" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
    <text x="235" y="182" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" font-weight="bold" fill="#1f2937" letter-spacing="2">INCOMING + CONTEXT</text>
    <rect x="95" y="200" width="100" height="26" fill="#bae6fd" stroke="#0e7490" stroke-width="2"/>
    <text x="145" y="218" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#0e7490">email</text>
    <rect x="205" y="200" width="100" height="26" fill="#bae6fd" stroke="#0e7490" stroke-width="2"/>
    <text x="255" y="218" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#0e7490">slack</text>
    <rect x="95" y="236" width="80" height="26" fill="#bae6fd" stroke="#0e7490" stroke-width="2"/>
    <text x="135" y="254" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#0e7490">DM</text>
    <rect x="185" y="236" width="120" height="26" fill="#bae6fd" stroke="#0e7490" stroke-width="2"/>
    <text x="245" y="254" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#0e7490">LinkedIn</text>
    <rect x="95" y="276" width="200" height="28" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
    <text x="195" y="295" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#92400e">from: manager</text>
    <rect x="95" y="318" width="240" height="12" fill="#eadfcf"/>
    <rect x="95" y="338" width="190" height="12" fill="#eadfcf"/>
    <rect x="95" y="358" width="220" height="12" fill="#eadfcf"/>
  </g>

  <!-- arrow left -> center (entering, grey) -->
  <g fill="#6b7280">
    <rect x="412" y="262" width="36" height="6"/>
    <rect x="442" y="256" width="6" height="6"/>
    <rect x="448" y="262" width="6" height="6"/>
    <rect x="442" y="268" width="6" height="6"/>
  </g>

  <!-- ===== Center card: VOICE FINGERPRINT (warm accent) ===== -->
  <g>
    <rect x="470" y="140" width="380" height="250" fill="#f3e7c9" stroke="#c2410c" stroke-width="4"/>
    <text x="660" y="172" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" font-weight="bold" fill="#c2410c" letter-spacing="2">VOICE FINGERPRINT</text>
    <text x="660" y="192" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6b7280">samples &gt; ban list &gt; defaults</text>

    <!-- pixel waveform -->
    <g fill="#c2410c">
      <rect x="505" y="216" width="8" height="14"/>
      <rect x="519" y="208" width="8" height="22"/>
      <rect x="533" y="220" width="8" height="10"/>
      <rect x="547" y="202" width="8" height="28"/>
      <rect x="561" y="214" width="8" height="16"/>
      <rect x="575" y="208" width="8" height="22"/>
      <rect x="589" y="222" width="8" height="8"/>
      <rect x="603" y="204" width="8" height="26"/>
      <rect x="617" y="216" width="8" height="14"/>
      <rect x="631" y="210" width="8" height="20"/>
      <rect x="645" y="220" width="8" height="10"/>
      <rect x="659" y="206" width="8" height="24"/>
      <rect x="673" y="216" width="8" height="14"/>
      <rect x="687" y="212" width="8" height="18"/>
      <rect x="701" y="220" width="8" height="10"/>
      <rect x="715" y="208" width="8" height="22"/>
      <rect x="729" y="216" width="8" height="14"/>
      <rect x="743" y="210" width="8" height="20"/>
      <rect x="757" y="220" width="8" height="10"/>
      <rect x="771" y="206" width="8" height="24"/>
      <rect x="785" y="214" width="8" height="16"/>
      <rect x="799" y="210" width="8" height="20"/>
    </g>

    <!-- lint rows -->
    <rect x="495" y="244" width="320" height="26" fill="#fecaca" stroke="#b91c1c" stroke-width="2"/>
    <text x="505" y="262" font-family="ui-monospace, monospace" font-size="12" fill="#b91c1c">[REWRITE] I hope this email finds you well</text>
    <rect x="495" y="278" width="320" height="26" fill="#fecaca" stroke="#b91c1c" stroke-width="2"/>
    <text x="505" y="296" font-family="ui-monospace, monospace" font-size="12" fill="#b91c1c">[REWRITE] delve · leverage · robust · seamless</text>
    <rect x="495" y="312" width="320" height="26" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="505" y="330" font-family="ui-monospace, monospace" font-size="12" fill="#15803d">[KEEP] "Hope this helps!" (your observed habit)</text>

    <text x="660" y="368" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" font-style="italic" fill="#1f2937">success is invisibility</text>
  </g>

  <!-- arrow center -> right (exiting, accent) -->
  <g fill="#c2410c">
    <rect x="862" y="262" width="36" height="6"/>
    <rect x="892" y="256" width="6" height="6"/>
    <rect x="898" y="262" width="6" height="6"/>
    <rect x="892" y="268" width="6" height="6"/>
  </g>

  <!-- ===== Right card: ONE DRAFT ===== -->
  <g>
    <rect x="920" y="150" width="380" height="230" fill="#fdf7ea" stroke="#b79a5c" stroke-width="3"/>
    <text x="1110" y="182" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" font-weight="bold" fill="#1f2937" letter-spacing="2">ONE DRAFT · SENT AS YOU</text>
    <rect x="945" y="198" width="330" height="118" fill="#fff" stroke="#15803d" stroke-width="2"/>
    <rect x="945" y="198" width="6" height="118" fill="#15803d"/>
    <rect x="965" y="216" width="280" height="12" fill="#eadfcf"/>
    <rect x="965" y="236" width="250" height="12" fill="#eadfcf"/>
    <rect x="965" y="256" width="290" height="12" fill="#eadfcf"/>
    <text x="965" y="298" font-family="ui-monospace, monospace" font-size="14" fill="#1f2937">— you</text>
    <text x="1110" y="338" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6b7280">no preamble · no options · ready to copy</text>
    <text x="1110" y="362" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#92400e">formal · friend · direct · diplomatic · storybook · eli5</text>
  </g>

  <!-- Chapter markers -->
  <g font-family="ui-monospace, monospace" font-size="13" letter-spacing="4" fill="#6b7280">
    <text x="120" y="430">CLASSIFY</text>
    <text x="360" y="430" fill="#c2410c">VOICE</text>
    <text x="560" y="430" fill="#c2410c">STYLE</text>
    <text x="760" y="430" fill="#c2410c">LINT</text>
    <text x="960" y="430">ONE DRAFT</text>
    <text x="1200" y="430">SEND</text>
  </g>
</svg>
