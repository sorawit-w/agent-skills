<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="startup-launch-kit icon: five stacked pipeline-step boxes connected by a state-tracking thread on the left, with the orchestrator's manifest indicator at the top" style="image-rendering: pixelated;">
  <title>startup-launch-kit</title>
  <!-- Background -->
  <rect width="32" height="32" fill="#f5efe6"/>
  <!-- Manifest indicator at top (small JSON-ish brackets) -->
  <g fill="#1f2937">
    <rect x="6"  y="2" width="2" height="2"/>
    <rect x="6"  y="4" width="2" height="2"/>
    <rect x="24" y="2" width="2" height="2"/>
    <rect x="24" y="4" width="2" height="2"/>
    <rect x="8"  y="2" width="2" height="2"/>
    <rect x="22" y="2" width="2" height="2"/>
  </g>
  <!-- Five pipeline-step boxes, color-coded to match each skill's banner color -->
  <!-- Box 1: brand-workshop (amber) -->
  <rect x="10" y="7"  width="18" height="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <!-- Box 2: validation-canvas (green) -->
  <rect x="10" y="11" width="18" height="3" fill="#d1fae5" stroke="#047857" stroke-width="1"/>
  <!-- Box 3: riskiest-assumption-test (gold/orange) -->
  <rect x="10" y="15" width="18" height="3" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
  <!-- Box 4: pitch-deck (pink) -->
  <rect x="10" y="19" width="18" height="3" fill="#fce7f3" stroke="#be185d" stroke-width="1"/>
  <!-- Box 5: startup-grill (red/danger) -->
  <rect x="10" y="23" width="18" height="3" fill="#fee2e2" stroke="#b91c1c" stroke-width="1"/>
  <!-- State-tracking thread connecting all 5 boxes (left side, vertical) -->
  <g fill="#1f2937">
    <rect x="6" y="7"  width="2" height="20"/>
  </g>
  <!-- Connector dots from thread to each box -->
  <g fill="#1f2937">
    <rect x="8" y="8"  width="2" height="1"/>
    <rect x="8" y="12" width="2" height="1"/>
    <rect x="8" y="16" width="2" height="1"/>
    <rect x="8" y="20" width="2" height="1"/>
    <rect x="8" y="24" width="2" height="1"/>
  </g>
  <!-- Gate-check tick marks on the right side of each completed box (decorative) -->
  <g fill="#047857">
    <rect x="29" y="8"  width="1" height="1"/>
    <rect x="29" y="12" width="1" height="1"/>
    <rect x="29" y="16" width="1" height="1"/>
  </g>
  <!-- Manifest base indicator (bottom — completed pipeline) -->
  <g fill="#1f2937">
    <rect x="10" y="28" width="18" height="2"/>
  </g>
</svg>

