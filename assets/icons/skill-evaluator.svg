<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="skill-evaluator icon: magnifying glass with checkmark" style="image-rendering: pixelated;">
  <title>skill-evaluator</title>
  <!-- Magnifying glass ring (ink) at cols 1-6, rows 1-6 -->
  <g fill="#1f2937">
    <!-- Top arc -->
    <rect x="4" y="2" width="8" height="2"/>
    <!-- Sides -->
    <rect x="2" y="4" width="2" height="4"/>
    <rect x="12" y="4" width="2" height="4"/>
    <rect x="2" y="8" width="2" height="4"/>
    <rect x="12" y="8" width="2" height="4"/>
    <!-- Bottom arc -->
    <rect x="4" y="12" width="8" height="2"/>
    <!-- Handle -->
    <rect x="14" y="14" width="2" height="2"/>
    <rect x="16" y="16" width="2" height="2"/>
  </g>
  <!-- Lens fill (paper/cream) -->
  <g fill="#f5efe6">
    <rect x="4" y="4" width="8" height="8"/>
  </g>
  <!-- Checkmark inside lens (green) -->
  <g fill="#0d7c3c">
    <rect x="4" y="8" width="2" height="2"/>
    <rect x="6" y="10" width="2" height="2"/>
    <rect x="8" y="8" width="2" height="2"/>
    <rect x="10" y="6" width="2" height="2"/>
  </g>
  <!-- Large check echo bottom-right (accent) -->
  <g fill="#0d7c3c">
    <rect x="20" y="22" width="2" height="2"/>
    <rect x="22" y="24" width="2" height="2"/>
    <rect x="24" y="22" width="2" height="2"/>
    <rect x="26" y="20" width="2" height="2"/>
    <rect x="28" y="18" width="2" height="2"/>
  </g>
</svg>
