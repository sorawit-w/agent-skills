<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"
     role="img" aria-label="ghostwriter icon — a pen writing a message line in the user's voice"
     shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>ghostwriter</title>
  <!-- paper + ink frame -->
  <rect x="3" y="3" width="26" height="26" fill="#f5efe6"/>
  <rect x="3" y="3" width="26" height="2" fill="#1f2937"/>
  <rect x="3" y="27" width="26" height="2" fill="#1f2937"/>
  <rect x="3" y="3" width="2" height="26" fill="#1f2937"/>
  <rect x="27" y="3" width="2" height="26" fill="#1f2937"/>

  <!-- written lines (the user's voice, already on the page) -->
  <rect x="7" y="8" width="14" height="2" fill="#9ca3af"/>
  <rect x="7" y="13" width="17" height="2" fill="#9ca3af"/>

  <!-- pen shaft (ink, diagonal from top-right) -->
  <rect x="23" y="7" width="3" height="3" fill="#1f2937"/>
  <rect x="21" y="10" width="3" height="3" fill="#1f2937"/>
  <rect x="19" y="13" width="3" height="3" fill="#1f2937"/>
  <rect x="17" y="16" width="3" height="3" fill="#1f2937"/>

  <!-- nib tip (warm accent) -->
  <rect x="15" y="19" width="2" height="2" fill="#c2410c"/>

  <!-- the line being written (warm accent, slightly wavy) -->
  <rect x="7" y="22" width="4" height="2" fill="#c2410c"/>
  <rect x="11" y="21" width="3" height="2" fill="#c2410c"/>
  <rect x="14" y="22" width="1" height="2" fill="#c2410c"/>
</svg>
