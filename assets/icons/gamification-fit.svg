<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"
     role="img" aria-label="gamification-fit icon — one mechanic accepted, the rest deliberately refused"
     shape-rendering="crispEdges" style="image-rendering: pixelated; image-rendering: crisp-edges;">
  <title>gamification-fit</title>
  <!-- ink frame -->
  <rect x="3" y="3" width="26" height="26" fill="#f5efe6"/>
  <rect x="3" y="3" width="26" height="2" fill="#1f2937"/>
  <rect x="3" y="27" width="26" height="2" fill="#1f2937"/>
  <rect x="3" y="3" width="2" height="26" fill="#1f2937"/>
  <rect x="27" y="3" width="2" height="26" fill="#1f2937"/>

  <!-- Row 1 — ACCEPTED (the few that fit): accent bar + green check -->
  <rect x="7" y="7" width="13" height="4" fill="#c2410c"/>
  <!-- green check -->
  <rect x="22" y="9" width="2" height="2" fill="#15803d"/>
  <rect x="24" y="7" width="2" height="2" fill="#15803d"/>
  <rect x="23" y="8" width="2" height="2" fill="#15803d"/>

  <!-- Row 2 — refused: muted bar + ink x -->
  <rect x="7" y="13" width="10" height="3" fill="#9ca3af"/>
  <rect x="22" y="13" width="1" height="1" fill="#b91c1c"/>
  <rect x="25" y="13" width="1" height="1" fill="#b91c1c"/>
  <rect x="23" y="14" width="1" height="1" fill="#b91c1c"/>
  <rect x="22" y="15" width="1" height="1" fill="#b91c1c"/>
  <rect x="25" y="15" width="1" height="1" fill="#b91c1c"/>

  <!-- Row 3 — refused -->
  <rect x="7" y="18" width="10" height="3" fill="#9ca3af"/>
  <rect x="22" y="18" width="1" height="1" fill="#b91c1c"/>
  <rect x="25" y="18" width="1" height="1" fill="#b91c1c"/>
  <rect x="23" y="19" width="1" height="1" fill="#b91c1c"/>
  <rect x="22" y="20" width="1" height="1" fill="#b91c1c"/>
  <rect x="25" y="20" width="1" height="1" fill="#b91c1c"/>

  <!-- Row 4 — refused -->
  <rect x="7" y="23" width="10" height="3" fill="#9ca3af"/>
  <rect x="22" y="23" width="1" height="1" fill="#b91c1c"/>
  <rect x="25" y="23" width="1" height="1" fill="#b91c1c"/>
  <rect x="23" y="24" width="1" height="1" fill="#b91c1c"/>
  <rect x="22" y="25" width="1" height="1" fill="#b91c1c"/>
  <rect x="25" y="25" width="1" height="1" fill="#b91c1c"/>
</svg>
