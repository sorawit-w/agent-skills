<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="team-composer icon: three pixel-art heads arranged as a team" style="image-rendering: pixelated;">
  <title>team-composer</title>
  <g fill="#1f2937">
    <!-- Head 1 (top): cols 6-9, rows 2-5 -->
    <rect x="14" y="4" width="4" height="2"/>
    <rect x="12" y="6" width="8" height="4"/>
    <rect x="14" y="10" width="4" height="2"/>
    <!-- Head 2 (bottom-left): cols 2-5, rows 9-12 -->
    <rect x="6" y="18" width="4" height="2"/>
    <rect x="4" y="20" width="8" height="4"/>
    <rect x="6" y="24" width="4" height="2"/>
    <!-- Head 3 (bottom-right): cols 10-13, rows 9-12 -->
    <rect x="22" y="18" width="4" height="2"/>
    <rect x="20" y="20" width="8" height="4"/>
    <rect x="22" y="24" width="4" height="2"/>
  </g>
  <!-- Connecting dots (warm accent) -->
  <g fill="#c2410c">
    <rect x="16" y="14" width="2" height="2"/>
    <rect x="12" y="16" width="2" height="2"/>
    <rect x="20" y="16" width="2" height="2"/>
  </g>
</svg>
