<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="riskiest-assumption-test icon: 3x3 risk-impact matrix with top-right cell highlighted as Top 3" style="image-rendering: pixelated;">
  <title>riskiest-assumption-test</title>
  <!-- Background -->
  <rect width="32" height="32" fill="#f5efe6"/>
  <!-- 3x3 matrix grid (top half = matrix, leaving room for axis labels) -->
  <g fill="#1a1a1a">
    <!-- Outer frame -->
    <rect x="6" y="4" width="22" height="22" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Vertical grid lines -->
    <rect x="13" y="4" width="1" height="22"/>
    <rect x="20" y="4" width="1" height="22"/>
    <!-- Horizontal grid lines -->
    <rect x="6" y="11" width="22" height="1"/>
    <rect x="6" y="18" width="22" height="1"/>
  </g>
  <!-- Top-right cell highlighted (Top 3 zone: high risk + high impact) -->
  <rect x="21" y="5" width="6" height="6" fill="#d4af37" opacity="0.35"/>
  <!-- Top-3 stars in the highlight cell (3 small dots representing the cards) -->
  <g fill="#8a6f00">
    <rect x="22" y="6" width="2" height="2"/>
    <rect x="25" y="6" width="2" height="2"/>
    <rect x="22" y="9" width="2" height="2"/>
  </g>
  <!-- Card dots in other cells (showing assumptions distributed across the matrix) -->
  <g fill="#6b6b6b">
    <rect x="9" y="14" width="2" height="2"/>
    <rect x="16" y="14" width="2" height="2"/>
    <rect x="23" y="14" width="2" height="2"/>
    <rect x="9" y="21" width="2" height="2"/>
    <rect x="16" y="21" width="2" height="2"/>
  </g>
  <!-- Y-axis label tick (impact arrow up the left edge) -->
  <g fill="#1a1a1a">
    <rect x="3" y="5" width="1" height="20"/>
    <rect x="2" y="5" width="3" height="1"/>
    <rect x="2" y="6" width="1" height="1"/>
    <rect x="4" y="6" width="1" height="1"/>
  </g>
  <!-- X-axis label tick (risk arrow along the bottom) -->
  <g fill="#1a1a1a">
    <rect x="6" y="28" width="22" height="1"/>
    <rect x="27" y="27" width="1" height="3"/>
    <rect x="26" y="27" width="1" height="1"/>
    <rect x="26" y="29" width="1" height="1"/>
  </g>
</svg>
