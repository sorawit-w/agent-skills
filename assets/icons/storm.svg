<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="storm icon: pixel-art storm cloud with a warm lightning bolt" style="image-rendering: pixelated;">
  <title>storm</title>
  <!-- Cloud (ink) -->
  <g fill="#1f2937">
    <rect x="12" y="6" width="8" height="2"/>
    <rect x="9" y="8" width="14" height="2"/>
    <rect x="7" y="10" width="18" height="2"/>
    <rect x="6" y="12" width="20" height="3"/>
    <rect x="7" y="15" width="18" height="2"/>
  </g>
  <!-- Lightning bolt (warm accent) -->
  <g fill="#c2410c">
    <rect x="16" y="17" width="4" height="3"/>
    <rect x="14" y="20" width="4" height="3"/>
    <rect x="17" y="20" width="3" height="2"/>
    <rect x="13" y="23" width="6" height="2"/>
    <rect x="15" y="25" width="3" height="3"/>
  </g>
  <!-- Rain (ink) -->
  <g fill="#1f2937">
    <rect x="9" y="19" width="2" height="3"/>
    <rect x="23" y="19" width="2" height="3"/>
    <rect x="10" y="24" width="2" height="3"/>
    <rect x="22" y="24" width="2" height="3"/>
  </g>
</svg>
