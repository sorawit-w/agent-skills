<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="handshake icon: two pixel-art hands meeting in the middle" style="image-rendering: pixelated;">
  <title>handshake</title>
  <!-- Left forearm + hand (ink) -->
  <g fill="#1f2937">
    <!-- Forearm coming in from left -->
    <rect x="2"  y="14" width="6" height="4"/>
    <!-- Wrist/hand body -->
    <rect x="8"  y="13" width="4" height="6"/>
    <!-- Knuckles reaching to center -->
    <rect x="12" y="14" width="3" height="4"/>
  </g>
  <!-- Right forearm + hand (ink) -->
  <g fill="#1f2937">
    <!-- Forearm coming in from right -->
    <rect x="24" y="14" width="6" height="4"/>
    <!-- Wrist/hand body -->
    <rect x="20" y="13" width="4" height="6"/>
    <!-- Knuckles reaching to center -->
    <rect x="17" y="14" width="3" height="4"/>
  </g>
  <!-- Clasp (warm accent) — the moment of contact -->
  <g fill="#c2410c">
    <rect x="15" y="14" width="2" height="4"/>
    <rect x="14" y="13" width="4" height="1"/>
    <rect x="14" y="18" width="4" height="1"/>
  </g>
  <!-- Sleeve cuffs (subtle separation between arm and hand) -->
  <g fill="#6b7280">
    <rect x="7"  y="14" width="1" height="4"/>
    <rect x="24" y="14" width="1" height="4"/>
  </g>
</svg>
