<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="steer icon: a message redirecting the course via a bent arrow" style="image-rendering: pixelated;">
  <title>steer</title>
  <!-- message at the tail (warm) — the queued steer entering -->
  <g fill="#c2410c">
    <rect x="2" y="15" width="6" height="8"/>
  </g>
  <!-- message inner mark (paper) -->
  <g fill="#f5efe6">
    <rect x="3" y="17" width="4" height="2"/>
    <rect x="3" y="20" width="3" height="2"/>
  </g>
  <!-- shaft: horizontal then up (ink) -->
  <g fill="#1f2937">
    <rect x="8"  y="18" width="12" height="4"/>
    <rect x="16" y="12" width="4"  height="10"/>
  </g>
  <!-- arrowhead pointing up, the course-correction (warm), centered on x=18 -->
  <g fill="#c2410c">
    <rect x="10" y="9" width="16" height="3"/>
    <rect x="13" y="6" width="10" height="3"/>
    <rect x="16" y="3" width="4"  height="3"/>
  </g>
</svg>
