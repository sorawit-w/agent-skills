<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="sub-agent-coordinator icon: central hub with four satellite nodes" style="image-rendering: pixelated;">
  <title>sub-agent-coordinator</title>
  <!-- Spokes (orange) -->
  <g fill="#c2410c">
    <rect x="14" y="4" width="2" height="8"/>
    <rect x="14" y="20" width="2" height="8"/>
    <rect x="4" y="14" width="8" height="2"/>
    <rect x="20" y="14" width="8" height="2"/>
  </g>
  <!-- Hub (center) -->
  <g fill="#1f2937">
    <rect x="14" y="12" width="4" height="2"/>
    <rect x="12" y="14" width="8" height="4"/>
    <rect x="14" y="18" width="4" height="2"/>
  </g>
  <!-- Satellites -->
  <g fill="#1f2937">
    <rect x="14" y="2" width="4" height="2"/>
    <rect x="14" y="28" width="4" height="2"/>
    <rect x="2" y="14" width="2" height="4"/>
    <rect x="28" y="14" width="2" height="4"/>
  </g>
</svg>
