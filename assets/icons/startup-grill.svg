<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="startup-grill icon: kill report paper with red X marks" style="image-rendering: pixelated;">
  <title>startup-grill</title>
  <!-- Paper interior (cream) -->
  <g fill="#f5efe6">
    <rect x="4" y="4" width="24" height="24"/>
  </g>
  <!-- Paper frame (ink) -->
  <g fill="#1f2937">
    <rect x="2" y="2" width="28" height="2"/>
    <rect x="2" y="28" width="28" height="2"/>
    <rect x="2" y="2" width="2" height="28"/>
    <rect x="28" y="2" width="2" height="28"/>
  </g>
  <!-- Header bar (ink) — title row -->
  <g fill="#1f2937">
    <rect x="6" y="6" width="14" height="2"/>
  </g>
  <!-- First weakness row: red X mark -->
  <g fill="#c2410c">
    <rect x="6" y="12" width="2" height="2"/>
    <rect x="10" y="12" width="2" height="2"/>
    <rect x="8" y="14" width="2" height="2"/>
    <rect x="6" y="16" width="2" height="2"/>
    <rect x="10" y="16" width="2" height="2"/>
  </g>
  <!-- First weakness row: text line (ink) -->
  <g fill="#1f2937">
    <rect x="14" y="14" width="12" height="2"/>
  </g>
  <!-- Second weakness row: red X mark -->
  <g fill="#c2410c">
    <rect x="6" y="20" width="2" height="2"/>
    <rect x="10" y="20" width="2" height="2"/>
    <rect x="8" y="22" width="2" height="2"/>
    <rect x="6" y="24" width="2" height="2"/>
    <rect x="10" y="24" width="2" height="2"/>
  </g>
  <!-- Second weakness row: text line (ink) -->
  <g fill="#1f2937">
    <rect x="14" y="22" width="10" height="2"/>
  </g>
</svg>
