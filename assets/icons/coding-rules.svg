<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="coding-rules icon: pixel-art clipboard with rule checklist and a small opinion stamp" style="image-rendering: pixelated;">
  <title>coding-rules</title>

  <!-- clipboard body (ink) -->
  <g fill="#1f2937">
    <!-- top edge -->
    <rect x="6"  y="4"  width="20" height="2"/>
    <!-- bottom edge -->
    <rect x="6"  y="28" width="20" height="2"/>
    <!-- left edge -->
    <rect x="6"  y="4"  width="2"  height="26"/>
    <!-- right edge -->
    <rect x="24" y="4"  width="2"  height="26"/>
  </g>

  <!-- clip at top (gray) -->
  <g fill="#6b7280">
    <rect x="13" y="2" width="6" height="4"/>
    <rect x="14" y="0" width="4" height="2"/>
  </g>

  <!-- rule line 1 (with check) -->
  <rect x="11" y="10" width="10" height="1" fill="#1f2937"/>
  <rect x="9"  y="10" width="1"  height="1" fill="#c2410c"/>

  <!-- rule line 2 (with check) -->
  <rect x="11" y="14" width="10" height="1" fill="#1f2937"/>
  <rect x="9"  y="14" width="1"  height="1" fill="#c2410c"/>

  <!-- rule line 3 (with check) -->
  <rect x="11" y="18" width="10" height="1" fill="#1f2937"/>
  <rect x="9"  y="18" width="1"  height="1" fill="#c2410c"/>

  <!-- rule line 4 (with check) -->
  <rect x="11" y="22" width="10" height="1" fill="#1f2937"/>
  <rect x="9"  y="22" width="1"  height="1" fill="#c2410c"/>

  <!-- "opinionated" stamp seal in lower-right corner (warm accent) -->
  <g fill="#c2410c">
    <rect x="22" y="24" width="4" height="4"/>
    <rect x="21" y="25" width="1" height="2"/>
    <rect x="26" y="25" width="1" height="2"/>
  </g>
</svg>
