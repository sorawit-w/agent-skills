<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="gtm icon: pixel-art megaphone broadcasting signal waves" style="image-rendering: pixelated;">
  <title>gtm</title>
  <!-- Megaphone body (ink) — narrow throat on left, bell rim flaring right -->
  <g fill="#1f2937">
    <!-- Handle stub -->
    <rect x="3" y="15" width="2" height="2"/>
    <!-- Throat -->
    <rect x="5" y="14" width="3" height="4"/>
    <!-- Tapering cone — each segment widens vertically as it moves right -->
    <rect x="8"  y="12" width="2" height="8"/>
    <rect x="10" y="10" width="2" height="12"/>
    <rect x="12" y="8"  width="2" height="16"/>
    <!-- Bell mouth -->
    <rect x="14" y="6"  width="2" height="20"/>
  </g>
  <!-- Signal waves (warm accent) — three concentric arcs emanating right -->
  <g fill="#c2410c">
    <!-- Inner wave -->
    <rect x="17" y="11" width="2" height="2"/>
    <rect x="17" y="19" width="2" height="2"/>
    <rect x="18" y="13" width="2" height="2"/>
    <rect x="18" y="17" width="2" height="2"/>
    <rect x="19" y="14" width="2" height="4"/>
    <!-- Middle wave -->
    <rect x="21" y="9"  width="2" height="2"/>
    <rect x="21" y="21" width="2" height="2"/>
    <rect x="22" y="11" width="2" height="2"/>
    <rect x="22" y="19" width="2" height="2"/>
    <rect x="23" y="14" width="2" height="4"/>
    <!-- Outer wave -->
    <rect x="25" y="7"  width="2" height="2"/>
    <rect x="25" y="23" width="2" height="2"/>
    <rect x="26" y="9"  width="2" height="2"/>
    <rect x="26" y="21" width="2" height="2"/>
    <rect x="27" y="14" width="2" height="4"/>
  </g>
</svg>
