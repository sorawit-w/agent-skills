<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="pixel-art icon: a tiny pixel-art scene — lighthouse with warm light, ships at anchor, water" style="image-rendering: pixelated;">
  <title>pixel-art</title>

  <!-- water (ink) bottom -->
  <g fill="#1f2937">
    <rect x="0"  y="22" width="32" height="2"/>
    <rect x="0"  y="26" width="32" height="2"/>
    <rect x="0"  y="30" width="32" height="2"/>
  </g>

  <!-- horizon line -->
  <g fill="#1f2937">
    <rect x="0"  y="20" width="32" height="1"/>
  </g>

  <!-- lighthouse on left -->
  <g fill="#1f2937">
    <!-- top room -->
    <rect x="4" y="4"  width="6" height="3"/>
    <rect x="3" y="7"  width="8" height="2"/>
    <!-- tower body -->
    <rect x="5" y="11" width="4" height="9"/>
    <rect x="4" y="9"  width="6" height="2"/>
  </g>
  <!-- light (warm accent) -->
  <g fill="#c2410c">
    <rect x="5" y="5" width="4" height="2"/>
  </g>
  <!-- light beam reflection on water -->
  <g fill="#c2410c">
    <rect x="6" y="23" width="2" height="1"/>
    <rect x="6" y="27" width="2" height="1"/>
  </g>

  <!-- two ships on the right -->
  <g fill="#1f2937">
    <!-- ship 1 (smaller, mid) -->
    <rect x="14" y="17" width="6" height="2"/>
    <rect x="16" y="13" width="1" height="4"/>
    <!-- ship 2 (bigger, right) -->
    <rect x="22" y="17" width="8" height="2"/>
    <rect x="25" y="11" width="1" height="6"/>
    <rect x="23" y="13" width="5" height="1"/>
  </g>
</svg>
