<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="brand-workshop icon: pixel-art paintbrush with paint splat" style="image-rendering: pixelated;">
  <title>brand-workshop</title>
  <!-- Brush handle (wood-dark) -->
  <g fill="#5e3618">
    <rect x="14" y="18" width="4" height="12"/>
  </g>
  <!-- Handle highlight (wood-mid) -->
  <g fill="#7c4b2a">
    <rect x="14" y="18" width="2" height="12"/>
  </g>
  <!-- Ferrule (beige band) -->
  <g fill="#c9b58a">
    <rect x="12" y="16" width="8" height="2"/>
  </g>
  <!-- Bristles (ink) -->
  <g fill="#1f2937">
    <rect x="12" y="8" width="8" height="8"/>
    <rect x="14" y="4" width="4" height="4"/>
  </g>
  <!-- Paint splat (orange) -->
  <g fill="#c2410c">
    <rect x="24" y="10" width="4" height="2"/>
    <rect x="22" y="12" width="2" height="2"/>
    <rect x="26" y="12" width="2" height="2"/>
    <rect x="28" y="8" width="2" height="2"/>
  </g>
</svg>
