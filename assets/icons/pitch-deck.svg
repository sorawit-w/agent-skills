<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" role="img" aria-label="pitch-deck icon: slide with ascending bar chart" style="image-rendering: pixelated;">
  <title>pitch-deck</title>
  <!-- Slide interior (paper) -->
  <g fill="#f5efe6">
    <rect x="4" y="6" width="24" height="20"/>
  </g>
  <!-- Slide frame (ink) -->
  <g fill="#1f2937">
    <rect x="2" y="4" width="28" height="2"/>
    <rect x="2" y="26" width="28" height="2"/>
    <rect x="2" y="4" width="2" height="24"/>
    <rect x="28" y="4" width="2" height="24"/>
  </g>
  <!-- Ascending bars (orange) -->
  <g fill="#c2410c">
    <rect x="6" y="20" width="3" height="4"/>
    <rect x="11" y="16" width="3" height="8"/>
    <rect x="16" y="12" width="3" height="12"/>
    <rect x="21" y="8" width="3" height="16"/>
  </g>
  <!-- Baseline (ink) -->
  <g fill="#1f2937">
    <rect x="4" y="24" width="24" height="2"/>
  </g>
</svg>
